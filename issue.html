<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎟️ 後慈湖售票機 PRO</title>

<style>
body{
margin:0;
font-family:"Microsoft JhengHei";
background:#0d1b2a;
color:#fff;
}

/* 標題 */
header{
text-align:center;
font-size:32px;
padding:20px;
color:#ff9a36;
font-weight:900;
}

/* 顯示 */
#display{
font-size:100px;
text-align:center;
background:#000;
color:#00ffcc;
margin:10px;
border-radius:20px;
padding:20px;
cursor:pointer;
}

/* 按鈕 */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

button{
height:80px;
font-size:22px;
border:none;
border-radius:16px;
color:#fff;
}

.cash{background:#1d7f29;}
.card{background:#0a63b7;}
.free{background:#6a1bb0;}
.pay{background:#ff5722;}
.clear{background:#607d8b;}
.reset{background:#c62828;}

#total{
font-size:60px;
text-align:center;
margin:10px;
color:#00ffcc;
}

/* 🔢 鍵盤 */
#pad{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.padBox{
background:#222;
padding:20px;
border-radius:20px;
text-align:center;
}

#padDisplay{
font-size:50px;
margin-bottom:10px;
}

.padGrid{
display:grid;
grid-template-columns:repeat(3,80px);
gap:10px;
}

.padGrid button{
height:60px;
font-size:22px;
}
</style>
</head>

<body>

<header>🎟️ 後慈湖售票機 🌿</header>

<div id="display" onclick="openPad()">0</div>

<div class="grid">

<button class="cash" onclick="add(100)">全票 🎫 (Q)</button>
<button class="cash" onclick="add(80)">團體 👥 (W)</button>
<button class="cash" onclick="add(50)">優待 💸 (E)</button>

<button class="card" onclick="add(100)">悠遊 🎟️ (A)</button>
<button class="card" onclick="add(80)">悠遊團體 👥 (S)</button>
<button class="card" onclick="add(50)">悠遊優待 💳 (D)</button>

<button class="free" onclick="add(0)">免費 🆓 (F)</button>

<button class="pay" onclick="checkout()">結帳 💰 (Z)</button>
<button class="clear" onclick="clearInput()">清除</button>
<button class="reset" onclick="reset()">清空</button>

</div>

<div id="total">0</div>

<!-- 🔢 鍵盤 -->
<div id="pad">
<div class="padBox">

<div id="padDisplay">0</div>

<div class="padGrid">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="clearPad()">清</button>
<button onclick="press(0)">0</button>
<button onclick="okPad()">確定</button>
</div>

</div>
</div>

<script>

let input="";
let total=0;

/* 顯示 */
function update(){
document.getElementById("display").innerText=input||"0";
document.getElementById("total").innerText=total;
}

/* 加票 */
function add(price){
let qty=input===""?1:parseInt(input);
total+=qty*price;
input="";
update();
}

/* 清除 */
function clearInput(){
input="";
update();
}

function reset(){
total=0;
input="";
update();
}

/* 結帳 */
function checkout(){
  if(total===0){
    alert("⚠️ 沒有金額");
    return;
  }
  alert("🎉 結帳成功："+total);
  reset();
}

/* 🔢 鍵盤 */
let padVal="";

function openPad(){
padVal=input||"";
document.getElementById("padDisplay").innerText=padVal||"0";
document.getElementById("pad").style.display="flex";
}

function press(n){
if(padVal.length<3){
padVal+=n;
}
document.getElementById("padDisplay").innerText=padVal;
}

function clearPad(){
padVal="";
document.getElementById("padDisplay").innerText="0";
}

function okPad(){
input=padVal||"";
update();
document.getElementById("pad").style.display="none";
}

/* ⌨️ 快捷鍵 */
document.addEventListener("keydown",e=>{

if(!isNaN(e.key)){
input+=e.key;
update();
}

if(e.key==="Backspace"){
input=input.slice(0,-1);
update();
}

if(e.key.toLowerCase()==="q") add(100);
if(e.key.toLowerCase()==="w") add(80);
if(e.key.toLowerCase()==="e") add(50);

if(e.key.toLowerCase()==="a") add(100);
if(e.key.toLowerCase()==="s") add(80);
if(e.key.toLowerCase()==="d") add(50);

if(e.key.toLowerCase()==="f") add(0);

if(e.key.toLowerCase()==="z") checkout();

});

update();

</script>

</body>
</html>
