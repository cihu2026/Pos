<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🌿 後慈湖售票系統</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: "Noto Sans TC", "Microsoft JhengHei", Arial;
}

body {
  background:
    linear-gradient(rgba(0,40,20,0.5), rgba(0,0,0,0.6)),
    url("https://cihu2026.github.io/qrcode/IMG_2538.JPG")
    center/cover;
}

.container {
  display: grid;
  grid-template-columns: 2fr 1.2fr;
  height: 100vh;
  gap: 12px;
  padding: 12px;
  box-sizing: border-box;
}

.panel {
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 15px;
  color: white;
  display: flex;
  flex-direction: column;
}

.left {
  display: grid;
  grid-template-rows: 1fr 2.5fr 0.8fr;
  gap: 12px;
}

#inputQty {
  width: 100%;
  border: none;
  background: transparent;
  font-size: 80px;
  font-weight: bold;
  text-align: center;
  color: #a5d6a7;
  outline: none;
}

#inputQty::placeholder {
  color: rgba(165,214,167,0.3);
}

#currentType {
  text-align: center;
  font-size: 22px;
  margin-bottom: 5px;
  color: #e0e0e0;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
  flex-grow: 1;
}

button {
  width: 100%;
  height: 100%;
  font-size: 20px;
  font-weight: bold;
  border: none;
  border-radius: 18px;
  color: white;
  cursor: pointer;
  transition: 0.1s;
  box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}

button:active {
  transform: scale(0.95);
  filter: brightness(1.2);
}

.cash { background: #2e7d32; }
.card { background: #0277bd; }
.free { background: #6a1b9a; }
.checkout { background: #ff7043; }
.clear { background: #546e7a; }
.clear-all { background: #c62828; }

#list {
  font-size: 20px;
  line-height: 1.8;
  margin-top: 10px;
  flex-grow: 1;
}

.total-label {
  font-size: 18px;
  color: #b0bec5;
  text-align: right;
}

.total {
  font-size: 64px;
  text-align: right;
  color: white;
  font-weight: bold;
}

#warn {
  color: #ffd54f;
  font-size: 16px;
  min-height: 40px;
}

#lastTicket {
  margin-top: auto;
  font-size: 18px;
  color: #ffe082;
  text-align: right;
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 10px;
}

@media (max-width: 768px) {
  body {
    overflow: auto;
  }

  .container {
    display: flex;
    flex-direction: column;
    height: auto;
  }

  .left {
    grid-template-rows: auto;
  }

  .panel {
    padding: 12px;
  }

  #inputQty {
    font-size: 42px;
  }

  .grid {
    grid-template-columns: repeat(2,1fr);
    gap: 8px;
  }

  button {
    font-size: 18px;
    border-radius: 14px;
  }

  .total {
    font-size: 36px;
  }

  #list {
    font-size: 16px;
  }

  #lastTicket {
    font-size: 14px;
  }

  #warn {
    font-size: 14px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="left">

    <div class="panel">
      <div id="clock"></div>
      <div id="currentType">🌿 後慈湖售票系統</div>

      <input
        id="inputQty"
        type="tel"
        inputmode="numeric"
        maxlength="3"
        placeholder="0"
        oninput="syncInput()"
      />
    </div>

    <div class="panel grid">

      <button class="cash" onclick="add('現金全票','cash_full')">🎫全票(Q)</button>
      <button class="cash" onclick="add('現金團體','cash_group')">👥團體(W)</button>
      <button class="cash" onclick="add('現金優待','cash_discount')">🧓優待(E)</button>

      <button class="card" onclick="add('悠遊全票','card_full')">💳悠遊全票(A)</button>
      <button class="card" onclick="add('悠遊團體','card_group')">💳悠遊團體(S)</button>
      <button class="card" onclick="add('悠遊優待','card_discount')">💳悠遊優待(D)</button>

      <button class="free" onclick="add('免費','free')">🆓免費(F)</button>
      <button class="clear" onclick="clearInput()">⌫清除(Esc)</button>
      <button class="checkout" onclick="checkout()">💰結帳(Enter)</button>

    </div>

    <div class="panel" style="justify-content:center;">
      <button class="clear-all" onclick="reset()">❌ 全部重設(Delete)</button>
    </div>

  </div>

  <div class="panel">

    <h2 style="margin-top:0">🧾 交易明細</h2>

    <div id="list">
      🎫 現金全票: 0<br>
      👥 現金團體: 0<br>
      🧓 現金優待: 0<br>
      💳 悠遊全票: 0<br>
      💳 悠遊團體: 0<br>
      💳 悠遊優待: 0<br>
      🆓 免費項目: 0
    </div>

    <div id="warn"></div>

    <div class="total-label">應收總計</div>
    <div class="total" id="total">0</div>

    <div id="lastTicket"></div>

  </div>

</div>

<script>
var GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw63eJnsg0a70IbZXBYWktt8CCDfx0mm_MAwzMRDoxKNNvcT2FTTMpJuU8f3qfqHjo/exec";

var input = "";

var data = {
  cash_full: 0,
  cash_group: 0,
  cash_discount: 0,
  card_full: 0,
  card_group: 0,
  card_discount: 0,
  free: 0
};

var printing = false;

function syncInput() {
  input = document.getElementById("inputQty").value.replace(/\D/g, "");
  updateDisplay();
}

function updateDisplay() {
  document.getElementById("inputQty").value = input;
}

function add(name, type) {
  var qty = (input === "" || input === "0") ? 1 : parseInt(input, 10);

  if (qty > 300) {
    alert("數量超過上限");
    return;
  }

  if (!data.hasOwnProperty(type)) return;

  data[type] += qty;
  document.getElementById("currentType").innerText = "👉 已加入 " + name + " x" + qty;

  input = "";
  updateDisplay();
  calc();
}

function clearInput() {
  input = "";
  updateDisplay();
}

function reset() {
  if (!confirm("確定要清空目前所有項目嗎？")) return;

  for (var k in data) {
    data[k] = 0;
  }

  input = "";
  document.getElementById("currentType").innerText = "🌿 後慈湖售票系統";
  updateDisplay();
  calc();
}

function getTotalPeople(source) {
  var totalPeople = 0;
  for (var k in source) {
    totalPeople += Number(source[k]) || 0;
  }
  return totalPeople;
}

function getGroupTotal(source) {
  return Number(source.cash_group || 0) + Number(source.card_group || 0);
}

function getGroupPrice(source) {
  return getGroupTotal(source) >= 40 ? 80 : 100;
}

function calcTotal(source) {
  var groupPrice = getGroupPrice(source);
  var total = 0;

  total += Number(source.cash_full || 0) * 100;
  total += Number(source.cash_group || 0) * groupPrice;
  total += Number(source.cash_discount || 0) * 50;
  total += Number(source.card_full || 0) * 100;
  total += Number(source.card_group || 0) * groupPrice;
  total += Number(source.card_discount || 0) * 50;

  return total;
}

function calc() {
  var total = calcTotal(data);
  var groupTotal = getGroupTotal(data);

  document.getElementById("total").innerText = total.toLocaleString();

  document.getElementById("list").innerHTML =
    "🎫 現金全票: " + data.cash_full + "<br>" +
    "👥 現金團體: " + data.cash_group + "<br>" +
    "🧓 現金優待: " + data.cash_discount + "<br>" +
    "💳 悠遊全票: " + data.card_full + "<br>" +
    "💳 悠遊團體: " + data.card_group + "<br>" +
    "💳 悠遊優待: " + data.card_discount + "<br>" +
    "🆓 免費項目: " + data.free;

  var warn = "";

  if (groupTotal > 0 && groupTotal < 40) {
    warn += "⚠️ 團體票合計 " + groupTotal + " 人，未滿40人，目前以全票100元計算";
  }

  if (groupTotal >= 40) {
    warn += "✅ 團體票合計 " + groupTotal + " 人，已套用團體價80元";
  }

  document.getElementById("warn").innerHTML = warn;
}

function checkout() {
  if (printing) return;

  var snapshot = JSON.parse(JSON.stringify(data));
  var totalPeople = getTotalPeople(snapshot);
  var total = calcTotal(snapshot);

  if (total === 0 && snapshot.free === 0) {
    alert("⚠️ 請先選擇票種");
    return;
  }

  printing = true;
  document.getElementById("currentType").innerText = "⏳ 處理中...";

  // 票號：HCH + YYMMDD + 4位隨機數
  var now = new Date();
  var yy = String(now.getFullYear()).slice(-2);
  var mm = String(now.getMonth() + 1).padStart(2, "0");
  var dd = String(now.getDate()).padStart(2, "0");
  var randomNum = String(Math.floor(Math.random() * 10000)).padStart(4, "0");
  var ticketId = "HCH" + yy + mm + dd + randomNum;

  var order = {
    action: "saveOrder",
    ticketId: ticketId,
    cash_full: snapshot.cash_full,
    cash_group: snapshot.cash_group,
    cash_discount: snapshot.cash_discount,
    card_full: snapshot.card_full,
    card_group: snapshot.card_group,
    card_discount: snapshot.card_discount,
    free: snapshot.free,
    total: total,
    type: getGroupTotal(snapshot) > 0 ? "團體" : "散客",
    people: totalPeople
  };

  var pwin = window.open("about:blank", "_blank");

  if (!pwin) {
    alert("⚠️ 請允許彈出視窗");
    printing = false;
    document.getElementById("currentType").innerText = "🌿 後慈湖售票系統";
    return;
  }

  pwin.document.open();
  pwin.document.write("<html><body style='font-family:sans-serif;text-align:center;padding:40px;'>票券產生中...</body></html>");
  pwin.document.close();

  fetch(GAS_WEB_APP_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(order)
  })
  .then(function() {
    printTicket(ticketId, total, totalPeople, snapshot, pwin);
  })
  .catch(function(err) {
    console.error(err);
    alert("❌ 交易送出失敗，但仍將列印。請稍後確認 Google Sheet 是否有紀錄。");
    printTicket(ticketId, total, totalPeople, snapshot, pwin);
  });
}

function printTicket(ticketId, total, totalPeople, snapshot, pwin) {
  var detailHtml = "";

  var typeNames = {
    cash_full: "🎫 現金全票",
    cash_group: "👥 現金團體",
    cash_discount: "🧓 現金優待",
    card_full: "💳 悠遊全票",
    card_group: "💳 悠遊團體",
    card_discount: "💳 悠遊優待",
    free: "🆓 免費項目"
  };

  for (var key in typeNames) {
    if (snapshot[key] > 0) {
      detailHtml +=
        "<div style='display:flex;justify-content:space-between;margin:4px 0;'>" +
        "<span>" + typeNames[key] + "</span>" +
        "<span>x " + snapshot[key] + "</span>" +
        "</div>";
    }
  }

  var ticketStyles = [
    { name: "七彩水舞", bg: "https://cihu2026.github.io/qrcode/IMG_1672.JPG" },
    { name: "空拍園區", bg: "https://cihu2026.github.io/qrcode/IMG_2538.JPG" },
    { name: "白橋湖景", bg: "https://cihu2026.github.io/qrcode/IMG_2539.JPG" },
    { name: "山湖倒影", bg: "https://cihu2026.github.io/qrcode/IMG_2540.JPG" },
    { name: "竹筏湖景", bg: "https://cihu2026.github.io/qrcode/IMG_2542.JPG" }
  ];

  var style = ticketStyles[Math.floor(Math.random() * ticketStyles.length)];
  var ticketUrl = "https://cihu2026.github.io/ticket-scan/?id=" + encodeURIComponent(ticketId);
  var qrApi = "https://api.qrserver.com/v1/create-qr-code/?size=500x500&ecc=M&margin=8&data=" + encodeURIComponent(ticketUrl);

  var html =
    "<!DOCTYPE html>" +
    "<html>" +
    "<head>" +
    "<meta charset='UTF-8'>" +
    "<title>後慈湖入園券</title>" +
    "<style>" +
    "@page{size:58mm auto;margin:0;}" +
    "html,body{margin:0;padding:0;width:58mm;background:#fff;}" +
    "body{font-family:sans-serif;color:#000;}" +
    ".ticket{position:relative;overflow:hidden;background:#fff;padding:0 0 8px;margin-top:0;}" +
    ".ticket::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(0,0,0,0.025) 1px,transparent 1px);background-size:4px 4px;opacity:0.18;pointer-events:none;}" +
    ".ticket-top-image{width:100%;height:100px;overflow:hidden;position:relative;background:#fff;}" +
    ".ticket-top-image img{width:100%;height:100%;object-fit:cover;display:block;filter:contrast(1.2) brightness(1.05);}" +
    ".header{text-align:center;padding:8px 10px 0;}" +
    ".header h2{margin:2px 0;font-size:24px;font-weight:bold;}" +
    ".header p{font-size:16px;margin:4px 0;white-space:nowrap;}" +
    ".line{border-top:1px dashed #000;margin:8px 10px;}" +
    ".details{text-align:left;font-size:16px;margin:8px 12px;line-height:1.8;}" +
    ".qr-wrap{text-align:center;margin:12px 0;}" +
    ".qr-frame{display:inline-block;padding:10px;border-radius:16px;background:white;border:3px solid #1b4332;}" +
    ".qr-frame img{width:35mm;height:35mm;display:block;}" +
    ".footer{text-align:center;font-size:14px;line-height:1.6;padding-bottom:0;}" +
    ".ticket::after{content:'';position:absolute;left:0;right:0;bottom:0;height:14px;background:radial-gradient(circle at 10px -2px,transparent 12px,white 13px);background-size:20px 20px;}" +
    "@media print{html,body{width:58mm;margin:0;padding:0;background:#fff;}body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}" +
    "</style>" +
    "</head>" +
    "<body>" +
    "<div class='ticket'>" +
    "<div class='ticket-top-image'><img src='" + style.bg + "'></div>" +
    "<div class='header'>" +
    "<h2>🌿後慈湖入園券</h2>" +
    "<p>票號：" + ticketId + "</p>" +
    "</div>" +
    "<div class='line'></div>" +
    "<div class='details'>" + detailHtml + "</div>" +
    "<div class='line'></div>" +
    "<p style='font-size:20px;font-weight:bold;text-align:center;'>總人數：" + totalPeople + " 位<br>總金額：$" + total + "</p>" +
    "<div class='qr-wrap'><div class='qr-frame'><img src='" + qrApi + "'></div></div>" +
    "<div class='footer'>※限當日有效※<br>請出示此券核銷入場<br><br>" + new Date().toLocaleString() + "</div>" +
    "</div>" +
    "<script>" +
    "window.onload=function(){setTimeout(function(){window.focus();window.print();setTimeout(function(){window.close();},1000);},800);};" +
    "<\/script>" +
    "</body>" +
    "</html>";

  pwin.document.open();
  pwin.document.write(html);
  pwin.document.close();

  finishCheckout(ticketId);
}

function finishCheckout(id) {
  document.getElementById("lastTicket").innerText = "最後票號：" + id;

  for (var k in data) {
    data[k] = 0;
  }

  input = "";
  printing = false;

  document.getElementById("currentType").innerHTML = "<span style='color:#81c784'>✅ 結帳成功</span>";

  updateDisplay();
  calc();
}

document.addEventListener("keydown", function(e) {
  if (e.repeat) return;
  if (e.target.id === "inputQty") return;

  var key = e.key.toLowerCase();

  if (!isNaN(e.key) && e.key !== " ") {
    if (input.length < 3) {
      input += e.key;
      updateDisplay();
    }
  }

  if (e.key === "Backspace") {
    input = input.slice(0, -1);
    updateDisplay();
  }

  if (key === "q") add("現金全票", "cash_full");
  if (key === "w") add("現金團體", "cash_group");
  if (key === "e") add("現金優待", "cash_discount");

  if (key === "a") add("悠遊全票", "card_full");
  if (key === "s") add("悠遊團體", "card_group");
  if (key === "d") add("悠遊優待", "card_discount");

  if (key === "f") add("免費", "free");

  if (e.key === "Enter") checkout();
  if (e.key === "Escape") clearInput();
  if (e.key === "Delete") reset();
});

window.syncInput = syncInput;
window.add = add;
window.clearInput = clearInput;
window.reset = reset;
window.checkout = checkout;

calc();
</script>

</body>
</html>
