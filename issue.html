<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"><meta name="theme-color" content="#07133a"><title>後慈湖售票系統｜POS</title><style>:root{--bg:#07133a;--bg2:#123783;--text:#fff;--muted:#cbd9ff;--line:rgba(139,214,255,.34);--primary:#4fdcff;--primary2:#3975ff;--accent:#6a6dff;--cash1:#8fffc0;--cash2:#1db96b;--card1:#6ee7ff;--card2:#3975ff;--free1:#ff65ae;--free2:#8b5cf6;--danger1:#ff6fa6;--danger2:#d93476;--checkout1:#ffae5f;--checkout2:#ff65ae;--warn:#ffe66d;--icon:"💙"}body[data-theme=labubu]{--bg:#3a2419;--bg2:#8a5b3a;--muted:#ffe8c7;--line:rgba(255,241,204,.38);--primary:#f7e6c4;--primary2:#9b6b44;--accent:#ff9bb8;--cash1:#8dffb2;--cash2:#2fb66d;--card1:#f7e6c4;--card2:#9b6b44;--icon:"👾"}body[data-theme=usagi]{--bg:#fff7e9;--bg2:#ffd7ec;--text:#503243;--muted:#936878;--line:rgba(255,159,196,.52);--primary:#ff8fbd;--primary2:#ffd166;--accent:#89d8ff;--cash1:#c9ffd8;--cash2:#4ac783;--card1:#bde7ff;--card2:#79cfff;--free1:#ffd1e6;--free2:#ff9fc8;--danger1:#ff92ae;--danger2:#dc5d7b;--checkout1:#ffe17a;--checkout2:#ff9fc8;--warn:#9a6300;--icon:"🐰"}body[data-theme=snoopy]{--bg:#101827;--bg2:#334155;--muted:#e5e7eb;--primary:#f8fafc;--primary2:#64748b;--accent:#ffd166;--card1:#f8fafc;--card2:#64748b;--icon:"🐶"}body[data-theme=disney]{--bg:#11103f;--bg2:#5b21b6;--muted:#eee5ff;--primary:#7dd3fc;--primary2:#6366f1;--accent:#fbbf24;--icon:"✨"}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 10% 5%,color-mix(in srgb,var(--primary) 34%,transparent),transparent 28%),radial-gradient(circle at 88% 4%,color-mix(in srgb,var(--accent) 32%,transparent),transparent 30%),linear-gradient(145deg,var(--bg),var(--bg2) 52%,#050817);overflow-x:hidden}body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.34;background-image:radial-gradient(circle,rgba(255,255,255,.78) 1px,transparent 1.8px),radial-gradient(circle,color-mix(in srgb,var(--primary) 70%,transparent) 1px,transparent 1.8px);background-size:38px 38px,78px 78px}.container{position:relative;z-index:1;display:grid;grid-template-columns:2fr 1.15fr;min-height:100vh;gap:14px;padding:14px}.panel{backdrop-filter:blur(18px);background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.075));border:1px solid var(--line);border-radius:28px;padding:16px;color:var(--text);box-shadow:0 20px 58px rgba(5,10,38,.32)}.left{display:grid;grid-template-rows:auto auto 1fr auto;gap:14px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:1000;letter-spacing:.08em;color:var(--muted)}.dot{width:10px;height:10px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 7px color-mix(in srgb,var(--primary) 18%,transparent),0 0 22px var(--primary)}.theme-switch{display:flex;gap:6px;overflow-x:auto}.theme-btn{width:auto;min-height:32px;padding:7px 8px;border-radius:999px;font-size:11px;white-space:nowrap;background:rgba(255,255,255,.12);border:1px solid var(--line);box-shadow:none;color:var(--text);font-weight:1000}.theme-btn.active{background:linear-gradient(135deg,var(--primary),var(--accent));box-shadow:0 8px 20px color-mix(in srgb,var(--primary) 24%,transparent)}.header-card{text-align:center;position:relative;overflow:hidden}.header-card:after{content:var(--icon);position:absolute;right:20px;top:16px;font-size:32px;opacity:.72}#clock{font-size:19px;font-weight:900;margin-bottom:8px}#currentType{font-size:30px;font-weight:1000;margin-bottom:10px;text-shadow:0 10px 28px color-mix(in srgb,var(--primary) 38%,transparent)}.input-label{font-size:15px;color:var(--muted);margin-bottom:8px;font-weight:800}#inputQty{width:100%;border:1px solid var(--line);border-radius:26px;background:rgba(255,255,255,.14);font-size:86px;font-weight:1000;text-align:center;color:var(--primary);outline:none;box-shadow:0 0 24px color-mix(in srgb,var(--primary) 12%,transparent)}.quick-note{font-size:14px;color:var(--muted);text-align:center;margin-top:10px;line-height:1.5}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}button{width:100%;min-height:96px;font-size:23px;font-weight:1000;border:none;border-radius:24px;color:white;cursor:pointer;transition:.1s;box-shadow:0 12px 26px rgba(0,0,0,.24)}button:active{transform:scale(.96);filter:brightness(1.12)}.cash{background:linear-gradient(135deg,var(--cash2),var(--cash1));color:#052c1b}.card-btn{background:linear-gradient(135deg,var(--card2),var(--card1));color:#09213a}.free{background:linear-gradient(135deg,var(--free2),var(--free1))}.checkout{background:linear-gradient(135deg,var(--checkout1),var(--checkout2));font-size:29px;color:#3a2400}.clear{background:linear-gradient(135deg,#475569,#94a3b8)}.clear-all{background:linear-gradient(135deg,var(--danger2),var(--danger1));min-height:76px}.side-panel{display:flex;flex-direction:column}.side-title{margin:0 0 12px;font-size:27px;font-weight:1000}#list{font-size:21px;line-height:1.9;flex-grow:1}.ticket-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px dashed color-mix(in srgb,var(--muted) 26%,transparent)}.ticket-row span:last-child{font-size:24px;font-weight:1000}#warn{color:var(--warn);font-size:17px;line-height:1.6;min-height:44px;margin-top:10px;font-weight:900}.total-label{font-size:18px;color:var(--muted);text-align:right;margin-top:auto;font-weight:900}.total{font-size:88px;line-height:1;text-align:right;color:var(--primary);text-shadow:0 0 28px color-mix(in srgb,var(--primary) 48%,transparent);font-weight:1000;margin:8px 0 14px}#lastTicket{margin-top:10px;padding:14px;border-radius:18px;background:rgba(255,255,255,.13);font-size:20px;font-weight:1000;text-align:center;color:var(--warn);border:1px solid var(--line)}@media(max-width:768px){body{overflow:auto}.container{display:flex;flex-direction:column;min-height:auto;padding:10px}.panel{padding:13px;border-radius:24px}.topbar{align-items:flex-start;flex-direction:column}.theme-switch{width:100%}#clock{font-size:17px}#currentType{font-size:22px}#inputQty{font-size:54px}.grid{grid-template-columns:repeat(2,1fr);gap:9px}button{min-height:78px;font-size:18px;border-radius:18px}.checkout{font-size:21px}.clear-all{min-height:62px}.side-title{font-size:22px}#list{font-size:17px}.total{font-size:52px}#lastTicket{font-size:15px}#warn{font-size:14px}}</style></head><body data-theme="stitch"><div class="container"><div class="left"><div class="panel topbar"><div class="brand"><span class="dot"></span> HOUCIHU POS</div><div class="theme-switch"><button type="button" class="theme-btn" data-theme="stitch">💙史迪奇</button><button type="button" class="theme-btn" data-theme="labubu">👾拉布布</button><button type="button" class="theme-btn" data-theme="usagi">🐰烏薩奇</button><button type="button" class="theme-btn" data-theme="snoopy">🐶史努比</button><button type="button" class="theme-btn" data-theme="disney">✨迪士尼</button></div></div><div class="panel header-card"><div id="clock"></div><div id="currentType">💙 後慈湖售票系統</div><div class="input-label">請輸入數量，不輸入則預設 1 張</div><input id="inputQty" type="tel" inputmode="numeric" maxlength="3" placeholder="0" oninput="syncInput()"><div class="quick-note">快捷鍵：Q/W/E 現金　A/S/D 悠遊　F 免費　Enter 結帳</div></div><div class="panel grid"><button class="cash" onclick="add('現金全票','cash_full')">🎫 現金全票<br>Q</button><button class="cash" onclick="add('現金團體','cash_group')">👥 現金團體<br>W</button><button class="cash" onclick="add('現金優待','cash_discount')">🧓 現金優待<br>E</button><button class="card-btn" onclick="add('悠遊全票','card_full')">💳 悠遊全票<br>A</button><button class="card-btn" onclick="add('悠遊團體','card_group')">💳 悠遊團體<br>S</button><button class="card-btn" onclick="add('悠遊優待','card_discount')">💳 悠遊優待<br>D</button><button class="free" onclick="add('免費','free')">🆓 免費<br>F</button><button class="clear" onclick="clearInput()">⌫ 清除<br>Esc</button><button class="checkout" onclick="checkout()">💰 結帳<br>Enter</button></div><div class="panel"><button class="clear-all" onclick="reset()">❌ 全部重設 Delete</button></div></div><div class="panel side-panel"><h2 class="side-title">🧾 交易明細</h2><div id="list"></div><div id="warn"></div><div class="total-label">應收總計</div><div class="total" id="total">0</div><div id="lastTicket">尚未結帳</div></div></div><script>var GAS_WEB_APP_URL="https://script.google.com/macros/s/AKfycbw63eJnsg0a70IbZXBYWktt8CCDfx0mm_MAwzMRDoxKNNvcT2FTTMpJuU8f3qfqHjo/exec";var input="";var data={cash_full:0,cash_group:0,cash_discount:0,card_full:0,card_group:0,card_discount:0,free:0};var printing=false;var TICKET_STYLES=[{name:"七彩水舞",bg:"IMG_1672.JPG"},{name:"空拍園區",bg:"IMG_2538.JPG"},{name:"白橋湖景",bg:"IMG_2539.JPG"},{name:"山湖倒影",bg:"IMG_2540.JPG"},{name:"竹筏湖景",bg:"IMG_2542.JPG"}];TICKET_STYLES.forEach(function(s){var img=new Image();img.src=s.bg});var THEME_INFO={stitch:{icon:"💙",name:"史迪奇星空版"},labubu:{icon:"👾",name:"Labubu 怪可愛星空版"},usagi:{icon:"🐰",name:"烏薩奇奶油星空版"},snoopy:{icon:"🐶",name:"史努比黑白星空版"},disney:{icon:"✨",name:"迪士尼夢幻星空版"}};function normalizeTheme(t){return t==="doraemon"||t==="chiikawa"?"usagi":t}function setTheme(theme){var next=normalizeTheme(theme);if(!THEME_INFO[next])next="stitch";document.body.dataset.theme=next;try{localStorage.setItem("houcihu_pos_theme",next)}catch(e){}document.querySelectorAll(".theme-btn").forEach(function(btn){btn.classList.toggle("active",btn.dataset.theme===next)});if(!printing&&getTotalPeople()===0)document.getElementById("currentType").textContent=THEME_INFO[next].icon+" 後慈湖售票系統｜"+THEME_INFO[next].name}function initTheme(){var theme="stitch";try{theme=localStorage.getItem("houcihu_pos_theme")||"stitch"}catch(e){}document.querySelectorAll(".theme-btn").forEach(function(btn){btn.onclick=function(){setTheme(btn.dataset.theme)}});setTheme(theme)}function updateClock(){document.getElementById("clock").textContent=new Date().toLocaleString("zh-TW",{hour12:false})}setInterval(updateClock,1000);updateClock();function syncInput(){input=(document.getElementById("inputQty").value||"").replace(/\D/g,"").slice(0,3);document.getElementById("inputQty").value=input}function qty(){var n=parseInt(input||"1",10);return isNaN(n)||n<=0?1:n}function clearInput(){input="";document.getElementById("inputQty").value=""}function add(type,key){var n=qty();data[key]+=n;document.getElementById("currentType").textContent=type+" +"+n;clearInput();calc()}function reset(){if(getTotalPeople()>0&&!confirm("確定全部重設？"))return;Object.keys(data).forEach(function(k){data[k]=0});clearInput();document.getElementById("lastTicket").textContent="尚未結帳";calc();setTheme(document.body.dataset.theme||"stitch")}function getTotalPeople(){return Object.values(data).reduce(function(a,b){return a+b},0)}function getGroupTotal(){return data.cash_group+data.card_group}function getGroupPrice(){return getGroupTotal()>=40?80:100}function calcTotal(){var g=getGroupPrice();return data.cash_full*100+data.cash_group*g+data.cash_discount*50+data.card_full*100+data.card_group*g+data.card_discount*50}function row(name,count,price){if(!count)return"";return '<div class="ticket-row"><span>'+name+' × '+count+'</span><span>$'+(count*price)+'</span></div>'}function calc(){var g=getGroupPrice(),html="";html+=row("現金全票",data.cash_full,100);html+=row("現金團體",data.cash_group,g);html+=row("現金優待",data.cash_discount,50);html+=row("悠遊全票",data.card_full,100);html+=row("悠遊團體",data.card_group,g);html+=row("悠遊優待",data.card_discount,50);html+=row("免費",data.free,0);document.getElementById("list").innerHTML=html||"尚無票券";document.getElementById("total").textContent=calcTotal();document.getElementById("warn").textContent=getGroupTotal()>0&&getGroupTotal()<40?"⚠️ 團體票未滿 40 人，暫以全票 100 元計算":""}function checkout(){if(getTotalPeople()<=0){alert("尚未加入票券");return}var total=calcTotal(),people=getTotalPeople(),ticketId="HCH"+Date.now().toString().slice(-8)+Math.floor(Math.random()*90+10);printing=true;document.getElementById("lastTicket").textContent="列印中："+ticketId;fetch(GAS_WEB_APP_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"saveOrder",ticketId:ticketId,cash_full:data.cash_full,cash_group:data.cash_group,cash_discount:data.cash_discount,card_full:data.card_full,card_group:data.card_group,card_discount:data.card_discount,free:data.free,total:total,type:"入園票",people:people})}).catch(function(e){console.warn(e)});printTicket(ticketId,total,people);finishCheckout(ticketId)}function printTicket(ticketId,total,people){var style=TICKET_STYLES[Math.floor(Math.random()*TICKET_STYLES.length)];var qr="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data="+encodeURIComponent("https://cihu2026.github.io/ticket-scan/?id="+ticketId);var w=window.open("","_blank","width=380,height=720");var detail="";Object.entries(data).forEach(function(p){if(p[1]>0)detail+="<div>"+p[0]+" × "+p[1]+"</div>"});w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>'+ticketId+'</title><style>@page{size:58mm auto;margin:0}body{width:58mm;margin:0;padding:6mm 3mm;text-align:center;font-family:sans-serif}.title{font-size:18px;font-weight:900}.id{font-size:13px;margin:4px 0}.people{font-size:30px;font-weight:900;margin:6px 0}.total{font-size:20px;font-weight:900}.detail{font-size:12px;line-height:1.5;margin:4px 0}.note{font-size:11px;margin-top:5px}img{width:34mm;height:34mm}</style></head><body><div class="title">後慈湖入園券</div><div class="id">'+ticketId+'</div><img src="'+qr+'"><div class="people">'+people+' 人</div><div class="total">$ '+total+'</div><div class="detail">'+detail+'</div><div class="note">請持本券至 B 點驗票入園<br>'+new Date().toLocaleString("zh-TW",{hour12:false})+'<br>'+style.name+'</div><script>setTimeout(function(){print();setTimeout(function(){close()},500)},600)<\/script></body></html>');w.document.close()}function finishCheckout(ticketId){Object.keys(data).forEach(function(k){data[k]=0});calc();document.getElementById("lastTicket").textContent="已結帳："+ticketId;printing=false;setTheme(document.body.dataset.theme||"stitch")}document.addEventListener("keydown",function(e){var k=e.key.toLowerCase();if(k==="q")add("現金全票","cash_full");else if(k==="w")add("現金團體","cash_group");else if(k==="e")add("現金優待","cash_discount");else if(k==="a")add("悠遊全票","card_full");else if(k==="s")add("悠遊團體","card_group");else if(k==="d")add("悠遊優待","card_discount");else if(k==="f")add("免費","free");else if(e.key==="Enter")checkout();else if(e.key==="Escape")clearInput();else if(e.key==="Delete")reset()});window.add=add;window.checkout=checkout;window.reset=reset;window.clearInput=clearInput;window.syncInput=syncInput;initTheme();calc();</script></body></html>
