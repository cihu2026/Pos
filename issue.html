<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { margin:0; height:100%; overflow:hidden; font-family:"Noto Sans TC", Arial; }
  body {
    background: linear-gradient(rgba(0,40,20,0.5), rgba(0,0,0,0.6)),
    url("https://images.unsplash.com/photo-1501785888041-af3ef285b470") center/cover;
  }
  .container { display:grid; grid-template-columns: 2fr 1.2fr; height:100vh; gap:12px; padding:12px; box-sizing: border-box; }
  .panel {
    backdrop-filter: blur(12px); background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2); border-radius:20px;
    padding:15px; color:white; display: flex; flex-direction: column;
  }
  .left { display:grid; grid-template-rows: 1fr 2.5fr 0.8fr; gap:12px; }
  #inputQty { width: 100%; border: none; background: transparent; font-size: 80px; font-weight: bold; text-align: center; color: #a5d6a7; outline: none; }
  #inputQty::placeholder { color: rgba(165, 214, 167, 0.3); }
  #currentType { text-align:center; font-size:22px; margin-bottom: 5px; color: #e0e0e0; }
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; flex-grow: 1; }
  button { width:100%; height:100%; font-size:20px; font-weight: bold; border:none; border-radius:18px; color:white; cursor:pointer; transition: 0.1s; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
  button:active { transform: scale(0.95); filter: brightness(1.2); }
  .cash { background:#2e7d32; }
  .card { background:#0277bd; }
  .free { background:#6a1b9a; }
  .checkout { background:#ff7043; }
  .clear { background:#546e7a; }
  .clear-all { background:#c62828; }
  #list { font-size:20px; line-height:1.8; margin-top: 10px; flex-grow: 1; }
  .total-label { font-size: 18px; color: #b0bec5; text-align: right; }
  .total { font-size:64px; text-align:right; color:#80cbc4; font-weight: bold; }
  #warn { color:#ffd54f; font-size:16px; min-height: 40px; }
  #lastTicket { margin-top: auto; font-size:18px; color:#ffe082; text-align:right; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
/* ===============================
   📱 手機版優化（不影響桌機）
   =============================== */
@media (max-width: 768px) {
  body {
    overflow: auto;
  }

  /* 整體改為單欄 */
  .container {
    display: flex;
    flex-direction: column;
    height: auto;
  }

  .left {
    grid-template-rows: auto;
  }

  /* 面板間距縮小 */
  .panel {
    padding: 12px;
  }

  /* 數字輸入不要那麼大 */
  #inputQty {
    font-size: 42px;
  }

  /* 票種按鈕：改成 2 欄 */
  .grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  /* 按鈕高度降低 */
  button {
    font-size: 18px;
    border-radius: 14px;
  }

  /* 總金額縮小 */
  .total {
    font-size: 36px;
  }

  /* 明細字體縮小 */
  #list {
    font-size: 16px;
  }

  #lastTicket {
    font-size: 14px;
  }

  /* 警告文字換行 */
  #warn {
    font-size: 14px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="left">
    <div class="panel">
      <div id="currentType">🌿 後慈湖售票系統</div>
      <input id="inputQty" type="text" inputmode="numeric" maxlength="3" placeholder="0" oninput="syncInput()"/>
    </div>

    <div class="panel grid">
      <button class="cash" onclick="add('現金全票','cash_full')">🎫全票(Q)</button>
      <button class="cash" onclick="add('現金團體','cash_group')">👥團體(W)</button>
      <button class="cash" onclick="add('現金優待','cash_discount')">🧓優待(E)</button>
      <button class="card" onclick="add('悠遊全票','card_full')">💳悠遊全票(A)</button>
      <button class="card" onclick="add('悠遊團體','card_group')">💳悠遊團體(S)</button>
      <button class="card" onclick="add('悠遊優待','card_discount')">💳悠遊優待(D)</button>
      <button class="free" onclick="add('免費','free')">🆓免費(F)</button>
      <button class="clear" onclick="clearInput()">⌫清除(Esc)</button>
      <button class="checkout" onclick="checkout()">💰結帳(Enter)</button>
    </div>

    <div class="panel" style="justify-content: center;">
      <button class="clear-all" onclick="reset()">❌ 全部重設 (Delete)</button>
    </div>
  </div>

  <div class="panel">
    <h2 style="margin-top:0">🧾 交易明細</h2>
    <div id="list">
      🎫 現金全票: 0<br>
      👥 現金團體: 0<br>
      🧓 現金優待: 0<br>
      💳 悠遊全票: 0<br>
      💳 悠遊團體: 0<br>
      💳 悠遊優待: 0<br>
      🆓 免費項目: 0
    </div>
    <div id="warn"></div>
    <div class="total-label">應收總計</div>
    <div class="total" id="total">0</div>
    <div id="lastTicket"></div>
  </div>
</div>

<script>
let input = "";
let data = { cash_full:0, cash_group:0, cash_discount:0, card_full:0, card_group:0, card_discount:0, free:0 };
let printing = false;

function syncInput() { input = document.getElementById("inputQty").value.replace(/\D/g, ""); }
function updateDisplay(){ document.getElementById("inputQty").value = input; }

function add(name, type){
  let qty = (input === "" || input === "0") ? 1 : parseInt(input);
  data[type] += qty;
  document.getElementById("currentType").innerText = "👉 已加入 " + name + " x" + qty;
  input = "";
  updateDisplay();
  calc();
}

function clearInput(){ input = ""; updateDisplay(); }

function reset(){
  if(!confirm("確定要清空目前所有項目嗎？")) return;
  for(let k in data) data[k]=0;
  input = "";
  document.getElementById("currentType").innerText = "🌿 後慈湖售票系統";
  updateDisplay();
  calc();
}

function calc(){
  let total = 0;
  total += data.cash_full * 100;
  total += (data.cash_group >= 40 ? 80 : 100) * data.cash_group;
  total += data.cash_discount * 50;
  total += data.card_full * 100;
  total += (data.card_group >= 40 ? 80 : 100) * data.card_group;
  total += data.card_discount * 50;

  document.getElementById("total").innerText = total.toLocaleString();
  document.getElementById("list").innerHTML = `
    🎫 現金全票: ${data.cash_full}<br>
    👥 現金團體: ${data.cash_group}<br>
    🧓 現金優待: ${data.cash_discount}<br>
    💳 悠遊全票: ${data.card_full}<br>
    💳 悠遊團體: ${data.card_group}<br>
    💳 悠遊優待: ${data.card_discount}<br>
    🆓 免費項目: ${data.free}
  `;

  let warn = "";
  if(data.cash_group > 0 && data.cash_group < 40) warn += "⚠️ 現金團體未滿40人 (原價計算)<br>";
  if(data.card_group > 0 && data.card_group < 40) warn += "⚠️ 悠遊團體未滿40人 (原價計算)";
  document.getElementById("warn").innerHTML = warn;
}

function checkout(){
  if (printing) return;
  let total = parseInt(document.getElementById("total").innerText.replace(/,/g, ""));
  if(total === 0 && data.free === 0){ alert("⚠️ 請先選擇票種"); return; }
  if(!confirm("確認結帳？\n總金額：$" + total)) return;

  printing = true;
  document.getElementById("currentType").innerText = "⏳ 正在存檔中...";

  let ticketId = "HCH" + Date.now().toString().slice(-8) + Math.floor(Math.random() * 90 + 10);
  let totalPeople = Object.values(data).reduce((a, b) => a + b, 0);
  let order = { ticketId: ticketId, ...data, total: total, type: "後慈湖門票", people: totalPeople };

  // --- ✨ 新增：建立列印詳細票種清單 ---
  let detailHtml = "";
  const typeNames = {
    cash_full: "🎫 現金全票", cash_group: "👥 現金團體", cash_discount: "🧓 現金優待",
    card_full: "💳 悠遊全票", card_group: "💳 悠遊團體", card_discount: "💳 悠遊優待",
    free: "🆓 免費項目"
  };
  for (let key in typeNames) {
    if (data[key] > 0) {
      detailHtml += `<div style="display:flex; justify-content:space-between; margin: 4px 0;">
                       <span>${typeNames[key]}</span>
                       <span>x ${data[key]}</span>
                     </div>`;
    }
  }

  google.script.run
    .withSuccessHandler(function(){
      // 🚀 請確保這裡的網址與您部署的網址一致
      let appUrl = "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";
      let ticketUrl = appUrl + "?page=status&id=" + ticketId; 
      let qrApi = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(ticketUrl);
      
      let pwin = window.open("about:blank", "_blank");
      if (!pwin) {
        alert("⚠️ 請允許彈出式視窗，才能列印票券");
        printing = false;
        return;
        }
      pwin.document.write(`
        <html>
        <head>
          <style>
            body { font-family: sans-serif; padding: 15px; text-align: center; color: #000; width: 250px; }
            .line { border-top: 1px dashed #000; margin: 10px 0; }
            .details { text-align: left; font-size: 14px; margin: 10px 0; }
          </style>
        </head>
        <body>
          <h2 style="margin:10px 0;">🌿後慈湖入園券</h2>
          <p style="font-size: 28px;">票號：${ticketId}</p>
          <div class="line"></div>
          <div class="details">${detailHtml}</div>
          <div class="line"></div>
          <p style="font-size: 25px; font-weight: bold;">總人數：${totalPeople} 位<br>總金額：$${total}</p>
          <img src="${qrApi}" style="width:180px; margin: 15px 0;">
          <p style="font-size: 20px;">請出示此券核銷入場<br>${new Date().toLocaleString()}</p>
          <script>
            window.onload = function() { window.print(); setTimeout(function() { window.close(); }, 500); };
          <\/script>
        </body>
        </html>
      `);
      pwin.document.close();
      finishCheckout(ticketId);
    })
    .withFailureHandler(function(err){
      alert("❌ 存檔失敗：" + err.message);
      printing = false;
    })
    .saveOrder(order);
}

function finishCheckout(id) {
  document.getElementById("lastTicket").innerText = "最後票號：" + id;
  for(let k in data) data[k]=0;
  input = "";
  printing = false;
  document.getElementById("currentType").innerText = "✅ 結帳成功";
  updateDisplay();
  calc();
}

/* ⌨️ 快捷鍵 */
document.addEventListener("keydown", function(e){
  if (e.target.id === "inputQty") return;
  let key = e.key.toLowerCase();
  if (!isNaN(e.key)) { if (input.length < 3) { input += e.key; updateDisplay(); } }
  if (e.key === "Backspace") { input = input.slice(0, -1); updateDisplay(); }
  if (key === "q") add('現金全票','cash_full');
  if (key === "w") add('現金團體','cash_group');
  if (key === "e") add('現金優待','cash_discount');
  if (key === "a") add('悠遊全票','card_full');
  if (key === "s") add('悠遊團體','card_group');
  if (key === "d") add('悠遊優待','card_discount');
  if (key === "f") add('免費','free');
  if (e.key === "Enter") checkout();
  if (e.key === "Escape") clearInput();
  if (e.key === "Delete") reset();
});


</script>

</body>
</html>
