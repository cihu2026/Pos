<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🎟️ 後慈湖售票系統</title>

<style>
body{
margin:0;
font-family:"Microsoft JhengHei";
background:#1f2a27;
color:#e4ebe7;
}

.container{
max-width:420px;
margin:auto;
padding:15px;
}

header{
text-align:center;
font-size:20px;
color:#cfd8d3;
margin-bottom:10px;
}

/* 顯示 */
.display-card,
.detail-card{
background:#2a3733;
border-radius:18px;
padding:20px;
margin-bottom:12px;
}

#display{
width:100%;
font-size:70px;
text-align:center;
background:transparent;
border:none;
color:#f0f5f2;
outline:none;
}

/* 明細 */
.detail-card{
background:#24322e;
border-radius:18px;
padding:15px;
margin-bottom:12px;
font-size:15px;
line-height:1.8;
}

/* 按鈕 */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

button{
height:60px;
border:none;
border-radius:14px;
font-size:16px;
color:#fff;
background:#2f403b;
}

button:active{
transform:scale(0.96);
}

/* 顏色 */
.cash{background:#3d5a52;}
.card{background:#3b4f63;}
.free{background:#564061;}
.pay{background:#6b5532;font-weight:600;}
.clear{background:#4f5a57;}
.reset{background:#5a3d3d;}

.total{
text-align:center;
font-size:42px;
margin-top:10px;
border-top:1px solid rgba(255,255,255,0.1);
padding-top:10px;
}
</style>
</head>

<body>

<div class="container">

<header>🌿 後慈湖售票系統</header>

<div class="display-card">
<input id="display" type="text" inputmode="numeric" placeholder="0">
</div>

<div class="grid">
<button class="cash" onclick="add(100,'full')">🎫 全票 (Q)</button>
<button class="cash" onclick="add(80,'group')">👥 團體 (W)</button>
<button class="cash" onclick="add(50,'discount')">👦 優待 (E)</button>

<button class="card" onclick="add(100,'card_full')">💳 悠遊全票 (A)</button>
<button class="card" onclick="add(80,'card_group')">💳 悠遊團體 (S)</button>
<button class="card" onclick="add(50,'card_discount')">💳 悠遊優待 (D)</button>

<button class="free" onclick="add(0,'free')">🆓 免費 (F)</button>

<button class="pay" onclick="checkout()">💰 結帳 (Z)</button>
<button class="clear" onclick="clearInput()">✖ 清除</button>
<button class="reset" onclick="resetAll()">❌ 重設</button>
</div>

<div class="detail-card" id="detail"></div>

<div class="total" id="total">0</div>

</div>

<script>

let input="";
let total=0;
let isSubmitting=false;

let data={
full:0,
group:0,
discount:0,
card_full:0,
card_group:0,
card_discount:0,
free:0
};

/* 輸入 */
document.getElementById("display").addEventListener("input",e=>{
input = e.target.value.replace(/\D/g,'').slice(0,4);
update();
});

/* 更新 */
function update(){
document.getElementById("display").value=input||"";
document.getElementById("total").innerText=total.toLocaleString();

document.getElementById("detail").innerHTML=`
📄 交易明細<br><br>
🎫 全票：${data.full}<br>
👥 團體：${data.group}<br>
👦 優待：${data.discount}<br>
💳 悠遊全票：${data.card_full}<br>
💳 悠遊團體：${data.card_group}<br>
💳 悠遊優待：${data.card_discount}<br>
🆓 免費：${data.free}
`;
}

/* 加票 */
function add(price,type){

navigator.vibrate && navigator.vibrate(15);

let qty=input?Number(input):1;
if(isNaN(qty)) qty=1;

total+=qty*price;
if(type) data[type]+=qty;

input="";
update();
}

/* 清除 */
function clearInput(){
input="";
update();
}

/* 重設 */
function resetAll(){
total=0;
input="";
for(let k in data){data[k]=0;}
update();
}

/* 結帳 */
function checkout(){

if(isSubmitting) return;

if(total===0){
alert("⚠️ 沒有金額");
return;
}

isSubmitting=true;

fetch("你的API",{
method:"POST",
body:JSON.stringify({total,data})
})
.then(()=>resetAll())
.catch(()=>alert("❌ 結帳失敗"))
.finally(()=>isSubmitting=false);
}

/* ⭐ 鍵盤修正（含ASD） */
document.addEventListener("keydown",e=>{

const key=e.key.toLowerCase();

if(["q","w","e","a","s","d","f","z"].includes(key)){
e.preventDefault();
}

if(key==="q"){add(100,'full');return;}
if(key==="w"){add(80,'group');return;}
if(key==="e"){add(50,'discount');return;}

if(key==="a"){add(100,'card_full');return;}
if(key==="s"){add(80,'card_group');return;}
if(key==="d"){add(50,'card_discount');return;}

if(key==="f"){add(0,'free');return;}
if(key==="z"){checkout();return;}

});

window.onload=()=>{
document.getElementById("display").focus();
};

update();

</script>

</body>
</html>
