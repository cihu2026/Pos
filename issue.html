<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#08143f">
<title>後慈湖售票系統｜POS Premium Themes</title>
<style>
:root{--ink:#18343a;--muted:#6f8588;--paper:#fffdf8;--mist:#eef6f3;--lake:#0D6E73;--lake2:#0B4D57;--pine:#1A7F5A;--gold:#B58A45;--amber:#B7791F;--rose:#C94B63;--line:#d9e8e4;--shadow:0 22px 60px rgba(15,79,95,.16);--accent:#0D6E73;--icon:"湖"}
body[data-theme=stitch]{--ink:#f7fbff;--muted:#cbd9ff;--paper:rgba(255,255,255,.13);--mist:#07133a;--lake:#4fdcff;--lake2:#123783;--pine:#72efb1;--gold:#ffe66d;--amber:#ffae5f;--rose:#ff6fa6;--line:rgba(139,214,255,.34);--shadow:0 24px 64px rgba(5,10,38,.32);--accent:#7c7bff;--icon:"💙"}
body[data-theme=labubu]{--ink:#fff7ea;--muted:#ffe0bd;--paper:rgba(255,248,235,.14);--mist:#2f211a;--lake:#f7dba8;--lake2:#8a5b3a;--pine:#a8ffbf;--gold:#ffe58a;--amber:#d99a5f;--rose:#ff9bb8;--line:rgba(255,232,199,.42);--shadow:0 24px 64px rgba(47,33,26,.34);--accent:#ff9bb8;--icon:"👾"}
body[data-theme=usagi]{--ink:#553041;--muted:#976778;--paper:rgba(255,253,246,.86);--mist:#fff8ed;--lake:#ff8fbd;--lake2:#ffd8ec;--pine:#47c985;--gold:#ffe38a;--amber:#ffb84d;--rose:#ffaccf;--line:rgba(255,155,196,.46);--shadow:0 22px 55px rgba(255,143,189,.16);--accent:#8fd9ff;--icon:"🐰"}
body[data-theme=snoopy]{--ink:#111827;--muted:#475569;--paper:#ffffff;--mist:#f8fafc;--lake:#111827;--lake2:#334155;--pine:#22c55e;--gold:#ffd166;--amber:#f59e0b;--rose:#ef4444;--line:rgba(15,23,42,.18);--shadow:0 22px 55px rgba(15,23,42,.12);--accent:#64748b;--icon:"🐶"}
body[data-theme=disney]{--ink:#fff;--muted:#efe5ff;--paper:rgba(255,255,255,.14);--mist:#130b3f;--lake:#8bd9ff;--lake2:#6d28d9;--pine:#a7f3d0;--gold:#fbbf24;--amber:#fbbf24;--rose:#f9a8d4;--line:rgba(251,191,36,.35);--shadow:0 24px 64px rgba(19,11,63,.34);--accent:#c084fc;--icon:"✨"}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif}body{color:var(--ink);background:radial-gradient(circle at 12% 8%,color-mix(in srgb,var(--lake) 16%,transparent),transparent 30%),radial-gradient(circle at 90% 8%,color-mix(in srgb,var(--gold) 14%,transparent),transparent 27%),linear-gradient(180deg,#f9fcfa,var(--mist));overflow-x:hidden}body[data-theme=stitch],body[data-theme=labubu],body[data-theme=disney]{background:radial-gradient(circle at 10% 6%,color-mix(in srgb,var(--lake) 30%,transparent),transparent 30%),radial-gradient(circle at 88% 4%,color-mix(in srgb,var(--accent) 27%,transparent),transparent 30%),linear-gradient(145deg,var(--mist),var(--lake2) 58%,#050817)}.container{display:grid;grid-template-columns:minmax(0,2fr) minmax(330px,1.05fr);min-height:100vh;gap:14px;padding:14px}.panel{position:relative;background:color-mix(in srgb,var(--paper) 94%,transparent);border:1px solid var(--line);border-radius:30px;padding:16px;color:var(--ink);box-shadow:var(--shadow);backdrop-filter:blur(16px);overflow:hidden}.left{display:grid;grid-template-rows:auto auto 1fr auto;gap:14px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:900;letter-spacing:.13em;color:var(--muted)}.seal{width:32px;height:32px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,var(--lake),var(--accent));color:#fff;font-weight:900}.theme-switch{display:flex;gap:7px;overflow-x:auto}.theme-btn{width:auto;min-height:32px;padding:7px 10px;border-radius:999px;font-size:11px;white-space:nowrap;background:rgba(255,255,255,.17);border:1px solid var(--line);box-shadow:none;color:var(--ink);font-weight:900}.theme-btn.active{background:linear-gradient(135deg,var(--lake),var(--accent));color:#fff;box-shadow:0 9px 20px color-mix(in srgb,var(--lake) 22%,transparent)}.header-card{text-align:center;background:linear-gradient(135deg,color-mix(in srgb,var(--lake2) 96%,#000 0%),color-mix(in srgb,var(--lake) 82%,#fff 0%));color:#fff}.header-card:after{content:var(--icon);position:absolute;right:20px;top:16px;font-size:31px;opacity:.75}.header-card:before{content:"";position:absolute;left:0;right:0;bottom:0;height:6px;background:linear-gradient(90deg,var(--gold),#e6d3a4,var(--pine))}#clock{position:relative;font-size:17px;font-weight:850;margin-bottom:8px;color:#dff4f1}#currentType{position:relative;font-size:29px;font-weight:900;margin-bottom:10px}.input-label{position:relative;font-size:15px;color:#dff4f1;margin-bottom:8px;font-weight:800}#inputQty{position:relative;width:100%;border:1px solid rgba(255,255,255,.28);border-radius:27px;background:rgba(255,255,255,.14);font-size:84px;font-weight:900;text-align:center;color:#fff;outline:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.12)}#inputQty::placeholder{color:rgba(255,255,255,.46)}.quick-note{position:relative;font-size:14px;color:#e8f8f5;text-align:center;margin-top:10px;line-height:1.5;font-weight:750}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}button{width:100%;min-height:96px;font-size:21px;font-weight:900;border:none;border-radius:25px;cursor:pointer;transition:.12s;box-shadow:0 12px 24px rgba(0,0,0,.12)}button:active{transform:scale(.966);filter:brightness(1.03)}.cash{background:linear-gradient(135deg,var(--pine),#bff3d2);color:#06331e}.card-btn{background:linear-gradient(135deg,var(--lake),#a9e6ee);color:#05313a}.free{background:linear-gradient(135deg,var(--rose),#ffd4df);color:#4c1020}.checkout{background:linear-gradient(135deg,var(--gold),var(--amber));font-size:27px;color:#3c2703}.clear{background:linear-gradient(135deg,#64748b,#cbd5e1);color:#0f172a}.clear-all{background:linear-gradient(135deg,#334155,#111827);color:#fff;min-height:74px}.side-panel{display:flex;flex-direction:column}.side-title{position:relative;margin:0 0 12px;font-size:27px;font-weight:900;letter-spacing:.03em}.summary-chip{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.summary-chip div{padding:11px;border-radius:18px;background:rgba(255,255,255,.18);border:1px solid var(--line)}.summary-chip span{display:block;color:var(--muted);font-size:12px;font-weight:900}.summary-chip b{font-size:20px}#list{position:relative;font-size:20px;line-height:1.9;flex-grow:1}.ticket-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px dashed color-mix(in srgb,var(--muted) 30%,transparent)}.ticket-row span:last-child{font-size:22px;font-weight:900}#warn{position:relative;color:var(--amber);font-size:16px;line-height:1.6;min-height:42px;margin-top:10px;font-weight:900}.total-label{position:relative;font-size:18px;color:var(--muted);text-align:right;margin-top:auto;font-weight:900}.total{position:relative;font-size:86px;line-height:1;text-align:right;color:var(--lake2);font-weight:900;margin:8px 0 14px;font-variant-numeric:tabular-nums}body[data-theme=stitch] .total,body[data-theme=labubu] .total,body[data-theme=disney] .total{color:var(--lake)}#lastTicket{position:relative;margin-top:10px;padding:14px;border-radius:20px;background:rgba(255,255,255,.16);font-size:18px;font-weight:900;text-align:center;color:var(--amber);border:1px solid var(--line)}@media(max-width:840px){body{overflow:auto}.container{display:flex;flex-direction:column;min-height:auto;padding:10px}.panel{padding:13px;border-radius:24px}.topbar{align-items:flex-start;flex-direction:column}.theme-switch{width:100%}#clock{font-size:16px}#currentType{font-size:22px}#inputQty{font-size:56px}.grid{grid-template-columns:repeat(2,1fr);gap:9px}button{min-height:78px;font-size:18px;border-radius:20px}.checkout{font-size:21px}.clear-all{min-height:62px}.side-title{font-size:22px}#list{font-size:17px}.ticket-row span:last-child{font-size:20px}.total{font-size:54px}#lastTicket{font-size:15px}#warn{font-size:14px}}
</style>
</head>
<body data-theme="stitch">
<div class="container"><div class="left"><div class="panel topbar"><div class="brand"><span class="seal">💙</span> HOUCIHU POS</div><div class="theme-switch"><button type="button" class="theme-btn" data-theme="stitch">💙史迪奇</button><button type="button" class="theme-btn" data-theme="labubu">👾拉布布</button><button type="button" class="theme-btn" data-theme="usagi">🐰烏薩奇</button><button type="button" class="theme-btn" data-theme="snoopy">🐶史努比</button><button type="button" class="theme-btn" data-theme="disney">✨迪士尼</button><button type="button" class="theme-btn" data-theme="formal">湖畔霧青</button></div></div>
<div class="panel header-card"><div id="clock"></div><div id="currentType">💙 後慈湖售票系統｜史迪奇深藍</div><div class="input-label">請輸入數量，不輸入則預設 1 張</div><input id="inputQty" type="tel" inputmode="numeric" maxlength="3" placeholder="0" oninput="syncInput()"><div class="quick-note">快捷鍵：Q/W/E 現金　A/S/D 悠遊　F 免費　Enter 結帳</div></div>
<div class="panel grid"><button class="cash" onclick="add('現金全票','cash_full')">🎫 現金全票<br>Q</button><button class="cash" onclick="add('現金團體','cash_group')">👥 現金團體<br>W</button><button class="cash" onclick="add('現金優待','cash_discount')">🧓 現金優待<br>E</button><button class="card-btn" onclick="add('悠遊全票','card_full')">💳 悠遊全票<br>A</button><button class="card-btn" onclick="add('悠遊團體','card_group')">💳 悠遊團體<br>S</button><button class="card-btn" onclick="add('悠遊優待','card_discount')">💳 悠遊優待<br>D</button><button class="free" onclick="add('免費','free')">🆓 免費<br>F</button><button class="clear" onclick="clearInput()">⌫ 清除<br>Esc</button><button class="checkout" onclick="checkout()">💰 結帳<br>Enter</button></div>
<div class="panel"><button class="clear-all" onclick="reset()">❌ 全部重設 Delete</button></div></div>
<div class="panel side-panel"><h2 class="side-title">🧾 交易明細</h2><div class="summary-chip"><div><span>票券人數</span><b id="peopleCount">0</b></div><div><span>團體狀態</span><b id="groupPrice">未使用</b></div></div><div id="list"></div><div id="warn"></div><div class="total-label">應收總計</div><div class="total" id="total">0</div><div id="lastTicket">尚未結帳</div></div></div>
<script>
var GAS_WEB_APP_URL="https://script.google.com/macros/s/AKfycbw63eJnsg0a70IbZXBYWktt8CCDfx0mm_MAwzMRDoxKNNvcT2FTTMpJuU8f3qfqHjo/exec";
var input="";var data={cash_full:0,cash_group:0,cash_discount:0,card_full:0,card_group:0,card_discount:0,free:0};var printing=false;
var TICKET_STYLES=[{name:"七彩水舞",bg:"IMG_1672.JPG"},{name:"空拍園區",bg:"IMG_2538.JPG"},{name:"白橋湖景",bg:"IMG_2539.JPG"},{name:"山湖倒影",bg:"IMG_2540.JPG"},{name:"竹筏湖景",bg:"IMG_2542.JPG"}];
TICKET_STYLES.forEach(function(s){var img=new Image();img.src=s.bg});
var THEME_INFO={formal:{icon:"湖",name:"湖畔霧青"},stitch:{icon:"💙",name:"史迪奇深藍"},labubu:{icon:"👾",name:"Labubu 奶咖"},usagi:{icon:"🐰",name:"烏薩奇米粉"},snoopy:{icon:"🐶",name:"史努比石墨"},disney:{icon:"✨",name:"迪士尼紫金"}};
function normalizeTheme(t){return t==="doraemon"||t==="chiikawa"?"usagi":(t==="lake"?"stitch":(THEME_INFO[t]?t:"stitch"))}
function setTheme(theme){var next=normalizeTheme(theme);document.body.dataset.theme=next;try{localStorage.setItem("houcihu_pos_theme",next)}catch(e){}document.querySelectorAll(".theme-btn").forEach(function(btn){btn.classList.toggle("active",btn.dataset.theme===next)});document.querySelector(".seal").textContent=THEME_INFO[next].icon;if(!printing&&getTotalPeople()===0)document.getElementById("currentType").textContent=THEME_INFO[next].icon+" 後慈湖售票系統｜"+THEME_INFO[next].name;document.querySelector('meta[name="theme-color"]').setAttribute("content",next==="formal"?"#0D6E73":"#08143f")}
function initTheme(){var theme="stitch";try{theme=localStorage.getItem("houcihu_pos_theme")||"stitch"}catch(e){}document.querySelectorAll(".theme-btn").forEach(function(btn){btn.onclick=function(){setTheme(btn.dataset.theme)}});setTheme(theme)}
function updateClock(){document.getElementById("clock").textContent=new Date().toLocaleString("zh-TW",{hour12:false})}setInterval(updateClock,1000);updateClock();
function syncInput(){input=(document.getElementById("inputQty").value||"").replace(/\D/g,"").slice(0,3);document.getElementById("inputQty").value=input}
function qty(){var n=parseInt(input||"1",10);return isNaN(n)||n<=0?1:n}
function clearInput(){input="";document.getElementById("inputQty").value=""}
function add(type,key){var n=qty();data[key]+=n;document.getElementById("currentType").textContent=type+" +"+n;clearInput();calc()}
function reset(){if(getTotalPeople()>0&&!confirm("確定全部重設？"))return;Object.keys(data).forEach(function(k){data[k]=0});clearInput();document.getElementById("lastTicket").textContent="尚未結帳";calc();setTheme(document.body.dataset.theme||"stitch")}
function getTotalPeople(){return Object.values(data).reduce(function(a,b){return a+b},0)}
function getGroupTotal(){return data.cash_group+data.card_group}
function getGroupPrice(){return getGroupTotal()>=40?80:100}
function getGroupStatus(){var gt=getGroupTotal();if(gt<=0)return "未使用";return gt>=40?"團體80":"未滿40"}
function calcTotal(){var g=getGroupPrice();return data.cash_full*100+data.cash_group*g+data.cash_discount*50+data.card_full*100+data.card_group*g+data.card_discount*50}
function row(name,count,price){if(!count)return"";return '<div class="ticket-row"><span>'+name+' × '+count+'</span><span>$'+(count*price)+'</span></div>'}
function calc(){var g=getGroupPrice(),html="";html+=row("現金全票",data.cash_full,100);html+=row("現金團體",data.cash_group,g);html+=row("現金優待",data.cash_discount,50);html+=row("悠遊全票",data.card_full,100);html+=row("悠遊團體",data.card_group,g);html+=row("悠遊優待",data.card_discount,50);html+=row("免費",data.free,0);document.getElementById("list").innerHTML=html||"尚無票券";document.getElementById("total").textContent=calcTotal();document.getElementById("peopleCount").textContent=getTotalPeople();document.getElementById("groupPrice").textContent=getGroupStatus();document.getElementById("warn").textContent=getGroupTotal()>0&&getGroupTotal()<40?"⚠️ 團體票未滿 40 人，暫以全票 100 元計算":""}
function checkout(){if(getTotalPeople()<=0){alert("尚未加入票券");return}var total=calcTotal(),people=getTotalPeople(),ticketId="HCH"+Date.now().toString().slice(-8)+Math.floor(Math.random()*90+10);printing=true;document.getElementById("lastTicket").textContent="列印中："+ticketId;fetch(GAS_WEB_APP_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"saveOrder",ticketId:ticketId,cash_full:data.cash_full,cash_group:data.cash_group,cash_discount:data.cash_discount,card_full:data.card_full,card_group:data.card_group,card_discount:data.card_discount,free:data.free,total:total,type:"入園票",people:people})}).catch(function(e){console.warn(e)});printTicket(ticketId,total,people);finishCheckout(ticketId)}
function printTicket(ticketId,total,people){var style=TICKET_STYLES[Math.floor(Math.random()*TICKET_STYLES.length)];var qr="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data="+encodeURIComponent("https://cihu2026.github.io/ticket-scan/?id="+ticketId);var w=window.open("","_blank","width=380,height=720");var detail="";Object.entries(data).forEach(function(p){if(p[1]>0)detail+="<div>"+p[0]+" × "+p[1]+"</div>"});w.document.open();w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>'+ticketId+'</title><style>@page{size:58mm auto;margin:0}body{width:58mm;margin:0;padding:6mm 3mm;text-align:center;font-family:sans-serif}.title{font-size:18px;font-weight:900}.id{font-size:13px;margin:4px 0}.people{font-size:30px;font-weight:900;margin:6px 0}.total{font-size:20px;font-weight:900}.detail{font-size:12px;line-height:1.5;margin:4px 0}.note{font-size:11px;margin-top:5px}img{width:34mm;height:34mm}</style></head><body><div class="title">後慈湖入園券</div><div class="id">'+ticketId+'</div><img src="'+qr+'"><div class="people">'+people+' 人</div><div class="total">$ '+total+'</div><div class="detail">'+detail+'</div><div class="note">請持本券至 B 點驗票入園<br>'+new Date().toLocaleString("zh-TW",{hour12:false})+'<br>'+style.name+'</div></body></html>');w.document.close();setTimeout(function(){try{w.focus();w.print()}catch(e){}},700)}
function finishCheckout(ticketId){Object.keys(data).forEach(function(k){data[k]=0});calc();document.getElementById("lastTicket").textContent="已結帳："+ticketId;printing=false;setTheme(document.body.dataset.theme||"stitch")}
document.addEventListener("keydown",function(e){var k=e.key.toLowerCase();if(k==="q")add("現金全票","cash_full");else if(k==="w")add("現金團體","cash_group");else if(k==="e")add("現金優待","cash_discount");else if(k==="a")add("悠遊全票","card_full");else if(k==="s")add("悠遊團體","card_group");else if(k==="d")add("悠遊優待","card_discount");else if(k==="f")add("免費","free");else if(e.key==="Enter")checkout();else if(e.key==="Escape")clearInput();else if(e.key==="Delete")reset()});
window.add=add;window.checkout=checkout;window.reset=reset;window.clearInput=clearInput;window.syncInput=syncInput;initTheme();calc();
</script>
</body>
</html>
