<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0f3d">
<title>後慈湖售票系統｜POS</title>
<style>
:root{--bg:#0b0f3d;--bg2:#102a73;--card:rgba(255,255,255,.13);--line:rgba(154,213,255,.24);--text:#f8fbff;--muted:#c7d9ff;--primary:#41d9ff;--primary2:#3975ff;--accent:#8b5cf6;--cash1:#86ffb1;--cash2:#20b96a;--card1:#6ee7ff;--card2:#3975ff;--free1:#ff8bd1;--free2:#8b5cf6;--danger1:#ff6fa6;--danger2:#d83474;--warn:#ffe66d;--checkout1:#ffb35c;--checkout2:#ff8bd1;--shadow:0 20px 58px rgba(5,10,38,.46)}body[data-theme="bunny"]{--bg:#3a1237;--bg2:#8b2c72;--line:rgba(255,190,224,.34);--muted:#ffe1f1;--primary:#ff8bd1;--primary2:#fb6fb7;--accent:#ffd1e8;--cash1:#b9ffda;--cash2:#2dd48f;--card1:#ffd1e8;--card2:#f472b6;--free1:#c4b5fd;--free2:#8b5cf6;--danger1:#ff6fa6;--danger2:#be185d;--checkout1:#ffd166;--checkout2:#fb7185}body[data-theme="bear"]{--bg:#332207;--bg2:#7a4f0e;--line:rgba(255,220,128,.34);--muted:#ffeab5;--primary:#ffd166;--primary2:#f59e0b;--accent:#ffb35c;--cash1:#dcfce7;--cash2:#22c55e;--card1:#fed7aa;--card2:#f97316;--free1:#fef3c7;--free2:#d97706;--danger1:#fb7185;--danger2:#be123c;--checkout1:#fde047;--checkout2:#f97316}body[data-theme="forest"]{--bg:#052719;--bg2:#0f5132;--line:rgba(134,255,177,.3);--muted:#c8f7d4;--primary:#86ffb1;--primary2:#16a34a;--accent:#2dd4bf;--cash1:#bbf7d0;--cash2:#15803d;--card1:#7dd3fc;--card2:#0284c7;--free1:#c4b5fd;--free2:#7c3aed;--danger1:#fb7185;--danger2:#be123c;--checkout1:#facc15;--checkout2:#22c55e}body[data-theme="ocean"]{--bg:#03263a;--bg2:#075985;--line:rgba(125,211,252,.34);--muted:#d2f4ff;--primary:#7dd3fc;--primary2:#0284c7;--accent:#2dd4bf;--cash1:#99f6e4;--cash2:#0d9488;--card1:#bae6fd;--card2:#2563eb;--free1:#a5b4fc;--free2:#6366f1;--danger1:#fb7185;--danger2:#be123c;--checkout1:#38bdf8;--checkout2:#2dd4bf}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{min-height:100%;font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif}body{color:var(--text);background:radial-gradient(circle at 10% 5%,color-mix(in srgb,var(--primary) 34%,transparent),transparent 28%),radial-gradient(circle at 88% 4%,color-mix(in srgb,var(--accent) 32%,transparent),transparent 30%),radial-gradient(circle at 92% 92%,color-mix(in srgb,var(--free1) 22%,transparent),transparent 28%),linear-gradient(145deg,var(--bg),var(--bg2) 50%,#050817);overflow-x:hidden}body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.42;background-image:radial-gradient(circle,rgba(255,255,255,.72) 1px,transparent 1.8px),radial-gradient(circle,color-mix(in srgb,var(--primary) 70%,transparent) 1px,transparent 1.8px),radial-gradient(circle,color-mix(in srgb,var(--free1) 64%,transparent) 1px,transparent 1.8px);background-size:44px 44px,70px 70px,96px 96px;background-position:0 0,18px 24px,42px 9px}.container{position:relative;z-index:1;display:grid;grid-template-columns:2fr 1.15fr;min-height:100vh;gap:14px;padding:14px}.panel{backdrop-filter:blur(18px);background:linear-gradient(180deg,var(--card),rgba(255,255,255,.065));border:1px solid var(--line);border-radius:28px;padding:16px;color:white;box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.1)}.left{display:grid;grid-template-rows:auto auto 1fr auto;gap:14px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:1000;letter-spacing:.08em;color:var(--muted)}.dot{width:10px;height:10px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 7px color-mix(in srgb,var(--primary) 18%,transparent),0 0 22px var(--primary)}.theme-switch{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}.theme-btn{width:auto;min-height:36px;padding:8px 10px;border-radius:999px;font-size:12px;white-space:nowrap;background:rgba(255,255,255,.1);border:1px solid var(--line);box-shadow:none;color:white}.theme-btn.active{background:linear-gradient(135deg,var(--primary),var(--accent));box-shadow:0 8px 20px color-mix(in srgb,var(--primary) 24%,transparent)}.header-card{text-align:center;position:relative;overflow:hidden}.header-card:after{content:"";position:absolute;right:-80px;top:-90px;width:210px;height:210px;border-radius:50%;background:color-mix(in srgb,var(--primary) 18%,transparent);pointer-events:none}#clock{position:relative;font-size:19px;font-weight:900;color:#fff;margin-bottom:8px;text-shadow:0 0 18px rgba(0,0,0,.55)}#currentType{position:relative;font-size:30px;font-weight:1000;color:#fff;margin-bottom:10px;text-shadow:0 10px 28px color-mix(in srgb,var(--primary) 38%,transparent)}.input-label{position:relative;font-size:15px;color:var(--muted);margin-bottom:8px;font-weight:800}#inputQty{position:relative;width:100%;border:1px solid var(--line);border-radius:26px;background:rgba(2,6,23,.48);font-size:86px;font-weight:1000;text-align:center;color:var(--primary);outline:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 0 24px color-mix(in srgb,var(--primary) 12%,transparent)}#inputQty::placeholder{color:color-mix(in srgb,var(--primary) 28%,transparent)}.quick-note{position:relative;font-size:14px;color:var(--muted);text-align:center;margin-top:10px;line-height:1.5}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}button{width:100%;min-height:96px;font-size:23px;font-weight:1000;border:none;border-radius:24px;color:white;cursor:pointer;transition:.1s;box-shadow:0 12px 26px rgba(0,0,0,.28)}button:active{transform:scale(.96);filter:brightness(1.12)}.cash{background:linear-gradient(135deg,var(--cash2),var(--cash1));color:#052c1b}.card-btn{background:linear-gradient(135deg,var(--card2),var(--card1))}.free{background:linear-gradient(135deg,var(--free2),var(--free1))}.checkout{background:linear-gradient(135deg,var(--checkout1),var(--checkout2));font-size:29px}.clear{background:linear-gradient(135deg,#475569,#94a3b8)}.clear-all{background:linear-gradient(135deg,var(--danger2),var(--danger1));min-height:76px}.side-panel{display:flex;flex-direction:column}.side-title{margin:0 0 12px;font-size:27px;font-weight:1000;letter-spacing:.05em}#list{font-size:21px;line-height:1.9;flex-grow:1}.ticket-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px dashed color-mix(in srgb,var(--muted) 26%,transparent)}.ticket-row span:last-child{font-size:24px;font-weight:1000;color:#fff}#warn{color:var(--warn);font-size:17px;line-height:1.6;min-height:44px;margin-top:10px;font-weight:900}.total-label{font-size:18px;color:var(--muted);text-align:right;margin-top:auto;font-weight:900}.total{font-size:88px;line-height:1;text-align:right;color:var(--primary);text-shadow:0 0 28px color-mix(in srgb,var(--primary) 48%,transparent);font-weight:1000;margin:8px 0 14px}#lastTicket{margin-top:10px;padding:14px;border-radius:18px;background:rgba(255,255,255,.13);font-size:20px;font-weight:1000;text-align:center;color:var(--warn);border:1px solid var(--line)}@media(max-width:768px){body{overflow:auto}.container{display:flex;flex-direction:column;min-height:auto;padding:10px}.panel{padding:13px;border-radius:24px}.topbar{align-items:flex-start;flex-direction:column}.theme-switch{width:100%}#clock{font-size:17px}#currentType{font-size:22px}#inputQty{font-size:54px;border-radius:20px}.grid{grid-template-columns:repeat(2,1fr);gap:9px}button{min-height:78px;font-size:18px;border-radius:18px}.checkout{font-size:21px}.clear-all{min-height:62px}.side-title{font-size:22px}#list{font-size:17px}.ticket-row span:last-child{font-size:20px}.total{font-size:52px}#lastTicket{font-size:15px}#warn{font-size:14px}}@media(max-width:430px){.grid{grid-template-columns:1fr 1fr}.theme-btn{font-size:11px;padding:7px 9px}}
</style>
</head>
<body data-theme="stitch">
<div class="container">
  <div class="left">
    <div class="panel topbar"><div class="brand"><span class="dot"></span> HOUCIHU POS</div><div class="theme-switch"><button type="button" class="theme-btn" data-theme="stitch">💙 藍紫</button><button type="button" class="theme-btn" data-theme="bunny">🐰 兔兔</button><button type="button" class="theme-btn" data-theme="bear">🧸 小熊</button><button type="button" class="theme-btn" data-theme="forest">🌿 森林</button><button type="button" class="theme-btn" data-theme="ocean">🐬 海洋</button></div></div>
    <div class="panel header-card"><div id="clock"></div><div id="currentType">💙 後慈湖售票系統</div><div class="input-label">請輸入數量，不輸入則預設 1 張</div><input id="inputQty" type="tel" inputmode="numeric" maxlength="3" placeholder="0" oninput="syncInput()"><div class="quick-note">快捷鍵：Q/W/E 現金　A/S/D 悠遊　F 免費　Enter 結帳</div></div>
    <div class="panel grid"><button class="cash" onclick="add('現金全票','cash_full')">🎫 現金全票<br>Q</button><button class="cash" onclick="add('現金團體','cash_group')">👥 現金團體<br>W</button><button class="cash" onclick="add('現金優待','cash_discount')">🧓 現金優待<br>E</button><button class="card-btn" onclick="add('悠遊全票','card_full')">💳 悠遊全票<br>A</button><button class="card-btn" onclick="add('悠遊團體','card_group')">💳 悠遊團體<br>S</button><button class="card-btn" onclick="add('悠遊優待','card_discount')">💳 悠遊優待<br>D</button><button class="free" onclick="add('免費','free')">🆓 免費<br>F</button><button class="clear" onclick="clearInput()">⌫ 清除<br>Esc</button><button class="checkout" onclick="checkout()">💰 結帳<br>Enter</button></div>
    <div class="panel"><button class="clear-all" onclick="reset()">❌ 全部重設 Delete</button></div>
  </div>
  <div class="panel side-panel"><h2 class="side-title">🧾 交易明細</h2><div id="list"></div><div id="warn"></div><div class="total-label">應收總計</div><div class="total" id="total">0</div><div id="lastTicket">尚未結帳</div></div>
</div>
<script>
var GAS_WEB_APP_URL="https://script.google.com/macros/s/AKfycbw63eJnsg0a70IbZXBYWktt8CCDfx0mm_MAwzMRDoxKNNvcT2FTTMpJuU8f3qfqHjo/exec";
var input="";var data={cash_full:0,cash_group:0,cash_discount:0,card_full:0,card_group:0,card_discount:0,free:0};var printing=false;
var TICKET_STYLES=[{name:"七彩水舞",bg:"IMG_1672.JPG"},{name:"空拍園區",bg:"IMG_2538.JPG"},{name:"白橋湖景",bg:"IMG_2539.JPG"},{name:"山湖倒影",bg:"IMG_2540.JPG"},{name:"竹筏湖景",bg:"IMG_2542.JPG"}];TICKET_STYLES.forEach(function(s){var img=new Image();img.src=s.bg});
function setTheme(theme){document.body.setAttribute("data-theme",theme);try{localStorage.setItem("houcihu_pos_theme",theme)}catch(e){}document.querySelectorAll(".theme-btn").forEach(function(btn){btn.classList.toggle("active",btn.dataset.theme===theme)});var map={stitch:"💙 後慈湖售票系統",bunny:"🐰 後慈湖售票系統",bear:"🧸 後慈湖售票系統",forest:"🌿 後慈湖售票系統",ocean:"🐬 後慈湖售票系統"};if(getTotalPeople(data)===0&&!printing){document.getElementById("currentType").innerText=map[theme]||map.stitch}}
function initTheme(){var theme="stitch";try{theme=localStorage.getItem("houcihu_pos_theme")||"stitch"}catch(e){}document.querySelectorAll(".theme-btn").forEach(function(btn){btn.onclick=function(){setTheme(btn.dataset.theme)}});setTheme(theme)}
function updateClock(){var el=document.getElementById("clock");if(el){el.innerText=new Date().toLocaleString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"})}}setInterval(updateClock,1000);updateClock();
function syncInput(){input=document.getElementById("inputQty").value.replace(/\D/g,"");updateDisplay()}function updateDisplay(){document.getElementById("inputQty").value=input}
function add(name,type){var qty=(input===""||input==="0")?1:parseInt(input,10);if(qty>300){alert("數量超過上限");return}if(!data.hasOwnProperty(type))return;data[type]+=qty;document.getElementById("currentType").innerText="👉 已加入 "+name+" × "+qty;input="";updateDisplay();calc()}
function clearInput(){input="";updateDisplay()}function reset(){if(!confirm("確定要清空目前所有項目嗎？"))return;for(var k in data){data[k]=0}input="";document.getElementById("currentType").innerText="💙 後慈湖售票系統";document.getElementById("lastTicket").innerText="尚未結帳";updateDisplay();calc();initTheme()}
function row(label,value){return "<div class='ticket-row'><span>"+label+"</span><span>"+value+"</span></div>"}function getTotalPeople(source){var totalPeople=0;for(var k in source){totalPeople+=Number(source[k])||0}return totalPeople}function getGroupTotal(source){return Number(source.cash_group||0)+Number(source.card_group||0)}function getGroupPrice(source){return getGroupTotal(source)>=40?80:100}
function calcTotal(source){var groupPrice=getGroupPrice(source);var total=0;total+=Number(source.cash_full||0)*100;total+=Number(source.cash_group||0)*groupPrice;total+=Number(source.cash_discount||0)*50;total+=Number(source.card_full||0)*100;total+=Number(source.card_group||0)*groupPrice;total+=Number(source.card_discount||0)*50;return total}
function calc(){var total=calcTotal(data);var groupTotal=getGroupTotal(data);document.getElementById("total").innerText=total.toLocaleString();document.getElementById("list").innerHTML=row("🎫 現金全票",data.cash_full)+row("👥 現金團體",data.cash_group)+row("🧓 現金優待",data.cash_discount)+row("💳 悠遊全票",data.card_full)+row("💳 悠遊團體",data.card_group)+row("💳 悠遊優待",data.card_discount)+row("🆓 免費項目",data.free);var warn="";if(groupTotal>0&&groupTotal<40){warn+="⚠️ 團體票合計 "+groupTotal+" 人，未滿 40 人，目前以全票 100 元計算"}if(groupTotal>=40){warn+="✅ 團體票合計 "+groupTotal+" 人，已套用團體價 80 元"}document.getElementById("warn").innerHTML=warn}
function checkout(){if(printing)return;var snapshot=JSON.parse(JSON.stringify(data));var totalPeople=getTotalPeople(snapshot);var total=calcTotal(snapshot);if(total===0&&snapshot.free===0){alert("⚠️ 請先選擇票種");return}printing=true;document.getElementById("currentType").innerText="⏳ 處理中，請稍候...";var now=new Date();var yy=String(now.getFullYear()).slice(-2);var mm=String(now.getMonth()+1).padStart(2,"0");var dd=String(now.getDate()).padStart(2,"0");var randomNum=String(Math.floor(Math.random()*10000)).padStart(4,"0");var ticketId="HCH"+yy+mm+dd+randomNum;var order={action:"saveOrder",ticketId:ticketId,cash_full:snapshot.cash_full,cash_group:snapshot.cash_group,cash_discount:snapshot.cash_discount,card_full:snapshot.card_full,card_group:snapshot.card_group,card_discount:snapshot.card_discount,free:snapshot.free,total:total,type:getGroupTotal(snapshot)>0?"團體":"散客",people:totalPeople};var pwin=window.open("about:blank","_blank");if(!pwin){alert("⚠️ 請允許彈出視窗");printing=false;document.getElementById("currentType").innerText="💙 後慈湖售票系統";return}pwin.document.open();pwin.document.write("<html><body style='font-family:sans-serif;text-align:center;padding:40px;'>票券產生中...</body></html>");pwin.document.close();fetch(GAS_WEB_APP_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(order)}).then(function(){printTicket(ticketId,total,totalPeople,snapshot,pwin)}).catch(function(err){console.error(err);alert("❌ 交易送出失敗，但仍將列印。請稍後確認 Google Sheet 是否有紀錄。");printTicket(ticketId,total,totalPeople,snapshot,pwin)})}
function printTicket(ticketId,total,totalPeople,snapshot,pwin){var detailHtml="";var typeNames={cash_full:"🎫 現金全票",cash_group:"👥 現金團體",cash_discount:"🧓 現金優待",card_full:"💳 悠遊全票",card_group:"💳 悠遊團體",card_discount:"💳 悠遊優待",free:"🆓 免費項目"};for(var key in typeNames){if(snapshot[key]>0){detailHtml+="<div style='display:flex;justify-content:space-between;margin:4px 0'><span>"+typeNames[key]+"</span><span>x "+snapshot[key]+"</span></div>"}}var style=TICKET_STYLES[Math.floor(Math.random()*TICKET_STYLES.length)];var ticketUrl="https://cihu2026.github.io/ticket-scan/?id="+encodeURIComponent(ticketId);var qrApi="https://api.qrserver.com/v1/create-qr-code/?size=500x500&ecc=M&margin=8&data="+encodeURIComponent(ticketUrl);var html="<!DOCTYPE html><html><head><meta charset='UTF-8'><title>後慈湖入園券</title><style>@page{size:58mm auto;margin:0}html,body{margin:0;padding:0;width:58mm;background:#fff}body{font-family:sans-serif;color:#000}.ticket{position:relative;overflow:hidden;background:#fff;padding:0 0 8px;margin-top:0}.ticket:before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(0,0,0,.025) 1px,transparent 1px);background-size:4px 4px;opacity:.18;pointer-events:none}.ticket-top-image{width:100%;height:100px;overflow:hidden;background:#fff}.ticket-top-image img{width:100%;height:100%;object-fit:cover;display:block;filter:contrast(1.2) brightness(1.05)}.header{text-align:center;padding:8px 10px 0}.header h2{margin:2px 0;font-size:24px;font-weight:bold}.header p{font-size:16px;margin:4px 0;white-space:nowrap}.line{border-top:1px dashed #000;margin:8px 10px}.details{text-align:left;font-size:16px;margin:8px 12px;line-height:1.8}.qr-wrap{text-align:center;margin:12px 0}.qr-frame{display:inline-block;padding:10px;border-radius:16px;background:white;border:3px solid #1b4332}.qr-frame img{width:35mm;height:35mm;display:block}.footer{text-align:center;font-size:14px;line-height:1.6;padding-bottom:0}@media print{html,body{width:58mm;margin:0;padding:0;background:#fff}body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body><div class='ticket'><div class='ticket-top-image'><img src='"+style.bg+"'></div><div class='header'><h2>🌿後慈湖入園券</h2><p>票號："+ticketId+"</p></div><div class='line'></div><div class='details'>"+detailHtml+"</div><div class='line'></div><p style='font-size:20px;font-weight:bold;text-align:center'>總人數："+totalPeople+" 位<br>總金額：$"+total+"</p><div class='qr-wrap'><div class='qr-frame'><img src='"+qrApi+"'></div></div><div class='footer'>※限當日有效※<br>請出示此券核銷入場<br><br>"+new Date().toLocaleString()+"</div></div></body></html>";pwin.document.open();pwin.document.write(html);pwin.document.close();setTimeout(function(){try{pwin.focus();pwin.print()}catch(err){console.error(err)}},2500);setTimeout(function(){try{pwin.close()}catch(e){}},8000);finishCheckout(ticketId)}
function finishCheckout(id){document.getElementById("lastTicket").innerText="最後票號："+id;for(var k in data){data[k]=0}input="";printing=false;document.getElementById("currentType").innerText="✅ 結帳成功";updateDisplay();calc()}
document.addEventListener("keydown",function(e){if(e.repeat)return;if(e.target.id==="inputQty")return;var key=e.key.toLowerCase();if(!isNaN(e.key)&&e.key!==" "){if(input.length<3){input+=e.key;updateDisplay()}}if(e.key==="Backspace"){input=input.slice(0,-1);updateDisplay()}if(key==="q")add("現金全票","cash_full");if(key==="w")add("現金團體","cash_group");if(key==="e")add("現金優待","cash_discount");if(key==="a")add("悠遊全票","card_full");if(key==="s")add("悠遊團體","card_group");if(key==="d")add("悠遊優待","card_discount");if(key==="f")add("免費","free");if(e.key==="Enter")checkout();if(e.key==="Escape")clearInput();if(e.key==="Delete")reset()});
window.syncInput=syncInput;window.add=add;window.clearInput=clearInput;window.reset=reset;window.checkout=checkout;initTheme();calc();
</script>
</body>
</html>
