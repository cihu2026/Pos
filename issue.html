<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後慈湖售票系統</title>

<style>
body{
margin:0;
font-family:"Noto Sans TC", sans-serif;
background:linear-gradient(rgba(0,40,20,0.5),rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1501785888041-af3ef285b470") center/cover;
color:white;
}

.container{
display:grid;
grid-template-columns:2fr 1fr;
height:100vh;
gap:12px;
padding:12px;
}

.panel{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:20px;
padding:15px;
display:flex;
flex-direction:column;
}

#inputQty{
font-size:70px;
text-align:center;
background:none;
border:none;
color:#a5d6a7;
outline:none;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

button{
border:none;
border-radius:16px;
padding:15px;
font-size:18px;
font-weight:bold;
color:white;
cursor:pointer;
}

.cash{background:#2e7d32;}
.card{background:#1565c0;}
.free{background:#6a1b9a;}
.checkout{background:#ff7043;}
.clear{background:#546e7a;}
.clear-all{background:#c62828;}

.total{
font-size:60px;
text-align:right;
color:#80cbc4;
}

@media(max-width:768px){
.container{display:flex;flex-direction:column;height:auto;}
#inputQty{font-size:40px;}
.grid{grid-template-columns:repeat(2,1fr);}
.total{font-size:36px;}
}
</style>
</head>

<body>

<div class="container">

<!-- 左側 -->
<div class="panel">

<div id="currentType">後慈湖售票系統</div>

<input id="inputQty" placeholder="0" inputmode="numeric">

<div class="grid">
<button class="cash" onclick="add('現金全票','cash_full')">全票</button>
<button class="cash" onclick="add('現金團體','cash_group')">團體</button>
<button class="cash" onclick="add('現金優待','cash_discount')">優待</button>

<button class="card" onclick="add('悠遊全票','card_full')">悠遊全票</button>
<button class="card" onclick="add('悠遊團體','card_group')">悠遊團體</button>
<button class="card" onclick="add('悠遊優待','card_discount')">悠遊優待</button>

<button class="free" onclick="add('免費','free')">免費</button>
<button class="clear" onclick="clearInput()">清除</button>
<button class="checkout" onclick="checkout()">結帳</button>
</div>

<button class="clear-all" onclick="reset()">全部清空</button>

</div>

<!-- 右側 -->
<div class="panel">
<h3>交易明細</h3>

<div id="list"></div>
<div id="warn"></div>

<div>應收總計</div>
<div class="total" id="total">0</div>

<div id="lastTicket"></div>

</div>

</div>

<script>

let input="";
let data={
cash_full:0,
cash_group:0,
cash_discount:0,
card_full:0,
card_group:0,
card_discount:0,
free:0
};

document.getElementById("inputQty").addEventListener("input",e=>{
input=e.target.value.replace(/\D/g,"");
});

function add(name,type){
let qty=input===""?1:parseInt(input);
data[type]+=qty;

document.getElementById("currentType").innerText=`加入 ${name} x${qty}`;
input="";
document.getElementById("inputQty").value="";

calc();
}

function calc(){
let total=0;

total+=data.cash_full*100;
total+=(data.cash_group>=40?80:100)*data.cash_group;
total+=data.cash_discount*50;

total+=data.card_full*100;
total+=(data.card_group>=40?80:100)*data.card_group;
total+=data.card_discount*50;

document.getElementById("total").innerText=total.toLocaleString();

document.getElementById("list").innerHTML=`
現金全票：${data.cash_full}<br>
現金團體：${data.cash_group}<br>
現金優待：${data.cash_discount}<br>
悠遊全票：${data.card_full}<br>
悠遊團體：${data.card_group}<br>
悠遊優待：${data.card_discount}<br>
免費：${data.free}
`;

let warn="";
if(data.cash_group>0 && data.cash_group<40)
warn+="⚠ 現金團體未滿40人<br>";

if(data.card_group>0 && data.card_group<40)
warn+="⚠ 悠遊團體未滿40人";

document.getElementById("warn").innerHTML=warn;
}

function clearInput(){
input="";
document.getElementById("inputQty").value="";
}

function reset(){
if(!confirm("確定清空？"))return;
for(let k in data) data[k]=0;
calc();
}

function checkout(){
let total=parseInt(document.getElementById("total").innerText.replace(/,/g,""));
if(total===0 && data.free===0){
alert("請先選票");
return;
}

alert("結帳成功\n金額："+total);

document.getElementById("lastTicket").innerText="完成時間："+new Date().toLocaleString();

reset();
}

</script>

</body>
</html>
