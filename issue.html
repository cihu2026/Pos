<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>🎟️ 後慈湖售票機 PRO</title>

<style>
body{
  margin:0;
  font-family:"Microsoft JhengHei";
  background:#0d1b2a;
  color:#fff;
}

/* 標題 */
header{
  text-align:center;
  padding:20px;
  font-size:32px;
  font-weight:900;
  color:#ff9a36;
}

/* 整體 */
.wrap{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:10px;
  padding:10px;
  height:calc(100vh - 80px);
}

/* 左側 */
.left{
  display:grid;
  grid-template-rows:120px auto 100px;
  gap:10px;
}

.panel{
  background:#1b263b;
  border-radius:20px;
  padding:10px;
}

/* 🔢 顯示 */
#display{
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:90px;
  font-weight:900;
  color:#00ffcc;
  cursor:pointer;
}

/* 按鈕 */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

button{
  border:none;
  border-radius:15px;
  font-size:22px;
  color:#fff;
}

/* 顏色 */
.cash{background:#1b5e20;}
.card{background:#01579b;}
.free{background:#4a148c;}
.pay{background:#ff5722;}
.clear{background:#546e7a;}
.reset{background:#c62828;}

/* 右側 */
#detail{
  font-size:20px;
  line-height:1.8;
}

#total{
  font-size:60px;
  text-align:right;
  color:#80cbc4;
}

/* 🔢 鍵盤 */
#pad{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  justify-content:center;
  align-items:center;
}

.padBox{
  background:#222;
  padding:20px;
  border-radius:20px;
}

#padDisplay{
  font-size:50px;
  margin-bottom:10px;
  text-align:right;
}

.padGrid{
  display:grid;
  grid-template-columns:repeat(3,70px);
  gap:10px;
}

.padGrid button{
  height:60px;
  font-size:22px;
}
</style>
</head>

<body>

<header>🎟️ 後慈湖售票機 PRO</header>

<div class="wrap">

<div class="left">

<div class="panel" id="display">0</div>

<div class="panel grid">

<button class="cash" onclick="add('cash_full')">全票</button>
<button class="cash" onclick="add('cash_group')">團體</button>
<button class="cash" onclick="add('cash_discount')">優待</button>

<button class="card" onclick="add('card_full')">悠遊全票</button>
<button class="card" onclick="add('card_group')">悠遊團體</button>
<button class="card" onclick="add('card_discount')">悠遊優待</button>

<button class="free" onclick="add('free')">免費</button>

</div>

<div class="panel grid">
<button class="pay" onclick="checkout()">結帳</button>
<button class="clear" onclick="clearInput()">CE</button>
<button class="reset" onclick="resetAll()">清空</button>
</div>

</div>

<div class="panel">
<h2>🧾 明細</h2>
<div id="detail"></div>
<div id="total">0</div>
</div>

</div>

<!-- 🔢 鍵盤 -->
<div id="pad">
<div class="padBox">

<div id="padDisplay">0</div>

<div class="padGrid">
<button onclick="num(1)">1</button>
<button onclick="num(2)">2</button>
<button onclick="num(3)">3</button>

<button onclick="num(4)">4</button>
<button onclick="num(5)">5</button>
<button onclick="num(6)">6</button>

<button onclick="num(7)">7</button>
<button onclick="num(8)">8</button>
<button onclick="num(9)">9</button>

<button onclick="clearPad()">清</button>
<button onclick="num(0)">0</button>
<button onclick="ok()">確定</button>
</div>

</div>
</div>

<script>

let input="";
let padVal="";

let data={
cash_full:0,cash_group:0,cash_discount:0,
card_full:0,card_group:0,card_discount:0,
free:0
};

/* 點擊顯示 */
document.getElementById("display").onclick=()=>{
  padVal=input;
  document.getElementById("pad").style.display="flex";
  updatePad();
};

function updateDisplay(){
  document.getElementById("display").innerText=input||"0";
}

function updatePad(){
  document.getElementById("padDisplay").innerText=padVal||"0";
}

function num(n){
  padVal+=n;
  updatePad();
}

function clearPad(){
  padVal="";
  updatePad();
}

function ok(){
  input=padVal;
  document.getElementById("pad").style.display="none";
  updateDisplay();
}

/* 加票 */
function add(type){
  let qty=input?parseInt(input):1;
  data[type]+=qty;
  input="";
  updateDisplay();
  render();
}

function clearInput(){
  input="";
  updateDisplay();
}

function resetAll(){
  for(let k in data) data[k]=0;
  input="";
  updateDisplay();
  render();
}

function render(){

  let total=0;

  total+=data.cash_full*100;
  total+=data.cash_group*(data.cash_group>=40?80:100);
  total+=data.cash_discount*50;

  total+=data.card_full*100;
  total+=data.card_group*(data.card_group>=40?80:100);
  total+=data.card_discount*50;

  document.getElementById("total").innerText=total;

  document.getElementById("detail").innerHTML=`
  現金全票:${data.cash_full}<br>
  現金團體:${data.cash_group}<br>
  現金優待:${data.cash_discount}<br>
  悠遊全票:${data.card_full}<br>
  悠遊團體:${data.card_group}<br>
  悠遊優待:${data.card_discount}<br>
  免費:${data.free}
  `;
}

function checkout(){
  alert("完成！");
  resetAll();
}

updateDisplay();
render();

</script>

</body>
</html>
