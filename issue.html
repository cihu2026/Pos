<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#06251e">
<title>後慈湖售票系統｜櫃台 POS</title>
<style>
:root{--text:#f8fafc;--muted:rgba(248,250,252,.68);--line:rgba(255,255,255,.18);--green:#22c55e;--blue:#38bdf8;--amber:#f59e0b;--red:#fb7185;--shadow:0 28px 90px rgba(0,0,0,.42)}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{min-height:100%;font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;color:var(--text)}body{min-height:100svh;overflow:hidden;background:radial-gradient(circle at 10% 8%,rgba(34,197,94,.34),transparent 28%),radial-gradient(circle at 95% 5%,rgba(56,189,248,.24),transparent 30%),linear-gradient(rgba(2,20,14,.72),rgba(2,8,6,.84)),url("https://cihu2026.github.io/qrcode/IMG_2538.JPG") center/cover fixed}body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);background-size:42px 42px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.72),transparent 80%)}.app{position:relative;z-index:1;width:min(1280px,100%);min-height:100svh;margin:0 auto;padding:14px clamp(10px,2vw,24px) calc(14px + env(safe-area-inset-bottom));display:grid;grid-template-rows:auto 1fr;gap:12px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:28px;background:rgba(255,255,255,.11);backdrop-filter:blur(22px);box-shadow:0 16px 42px rgba(0,0,0,.22)}.brand{display:flex;align-items:center;gap:12px;min-width:0}.logo{width:42px;height:42px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,#047857,#22c55e);box-shadow:0 12px 30px rgba(34,197,94,.24);font-size:23px}.brand h1{font-size:18px;letter-spacing:.08em;white-space:nowrap}.brand small{display:block;color:var(--muted);font-size:11px;margin-top:3px;letter-spacing:.08em}.pills{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}.pill{padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:#fff;font-size:12px;font-weight:900;white-space:nowrap}.pill.ok{color:#bbf7d0;background:rgba(34,197,94,.14);border-color:rgba(34,197,94,.28)}.layout{display:grid;grid-template-columns:1.28fr .72fr;gap:12px;min-height:0}.left{display:grid;grid-template-rows:1fr 2.1fr .62fr;gap:12px;min-height:0}.panel{border-radius:30px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.075));backdrop-filter:blur(24px);box-shadow:var(--shadow);padding:16px;min-height:0}.input-panel{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center}.input-box{min-height:150px;display:grid;place-items:center;border-radius:28px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.12);position:relative;overflow:hidden}.input-box:before{content:"輸入數量";position:absolute;top:14px;left:16px;color:var(--muted);font-size:13px;font-weight:900;letter-spacing:.12em}#inputQty{width:100%;border:0;background:transparent;outline:0;color:#bbf7d0;text-align:center;font-size:82px;font-weight:1000;letter-spacing:.02em}#inputQty::placeholder{color:rgba(187,247,208,.26)}.current-card{min-width:270px;height:150px;padding:18px;border-radius:28px;background:linear-gradient(135deg,rgba(34,197,94,.22),rgba(56,189,248,.12));border:1px solid rgba(187,247,208,.22);display:flex;flex-direction:column;justify-content:space-between}.current-card span{color:var(--muted);font-size:12px;font-weight:900;letter-spacing:.14em}#currentType{font-size:22px;font-weight:1000;line-height:1.35}.keyhint{display:flex;gap:6px;flex-wrap:wrap;color:rgba(255,255,255,.78);font-size:11px;font-weight:850}.keyhint b{padding:4px 7px;border-radius:9px;background:rgba(255,255,255,.12)}.ticket-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;height:100%}button{font-family:inherit;border:0;color:#fff;cursor:pointer;user-select:none}button:active{transform:scale(.976);filter:brightness(1.08)}.ticket-btn{position:relative;min-height:112px;border-radius:25px;padding:15px;text-align:left;overflow:hidden;box-shadow:0 17px 38px rgba(0,0,0,.28);transition:.16s ease}.ticket-btn:hover{transform:translateY(-2px)}.ticket-btn:after{content:"";position:absolute;width:120px;height:120px;border-radius:50%;right:-44px;bottom:-54px;background:rgba(255,255,255,.16)}.ticket-btn .icon{font-size:28px;line-height:1;position:relative;z-index:1}.ticket-btn strong{display:block;margin-top:11px;font-size:20px;line-height:1.2;position:relative;z-index:1}.ticket-btn small{display:block;margin-top:6px;color:rgba(255,255,255,.78);font-size:12px;font-weight:900;position:relative;z-index:1}.ticket-btn .price{position:absolute;right:15px;top:15px;font-size:24px;font-weight:1000;z-index:1}.cash{background:linear-gradient(135deg,#047857,#22c55e)}.card{background:linear-gradient(135deg,#075985,#38bdf8)}.free{background:linear-gradient(135deg,#6d28d9,#a78bfa)}.control-grid{display:grid;grid-template-columns:1fr 1fr 1.4fr;gap:10px;height:100%}.control-btn{border-radius:24px;font-size:20px;font-weight:1000;letter-spacing:.06em;box-shadow:0 16px 38px rgba(0,0,0,.24)}.clear{background:linear-gradient(135deg,#334155,#64748b)}.clear-all{background:linear-gradient(135deg,#be123c,#fb7185)}.checkout{background:linear-gradient(135deg,#c2410c,#fb923c)}.side{display:grid;grid-template-rows:auto auto 1fr auto auto;gap:12px;min-height:0}.side h2{font-size:20px;letter-spacing:.08em}.sub{color:var(--muted);font-size:12px;font-weight:850;line-height:1.7}.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.box{padding:12px;border-radius:18px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.13);text-align:center}.box span{display:block;color:var(--muted);font-size:11px;font-weight:900}.box b{display:block;margin-top:5px;font-size:24px}#list{overflow:auto;display:grid;gap:8px;padding-right:2px}.empty{height:100%;min-height:130px;display:grid;place-items:center;text-align:center;color:var(--muted);border:1px dashed rgba(255,255,255,.2);border-radius:22px;font-weight:900;line-height:1.8}.row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:12px;border-radius:18px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12)}.row strong{font-size:15px}.row small{display:block;color:var(--muted);margin-top:3px;font-size:12px;font-weight:850}.row b{font-size:20px}#warn{min-height:42px;padding:12px;border-radius:18px;background:rgba(245,158,11,.13);border:1px solid rgba(245,158,11,.25);color:#fde68a;font-size:14px;font-weight:950;line-height:1.5}#warn:empty{display:none}.total-card{padding:18px;border-radius:28px;background:linear-gradient(135deg,rgba(34,197,94,.18),rgba(34,197,94,.08));border:1px solid rgba(34,197,94,.26)}.total-label{color:#bbf7d0;font-size:13px;font-weight:900;letter-spacing:.12em;text-align:right}.total{font-size:58px;text-align:right;font-weight:1000;line-height:1.05}#lastTicket{min-height:44px;padding:12px;border-radius:18px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.1);color:#fde68a;font-size:14px;font-weight:900;text-align:right;line-height:1.5}@media(max-width:920px){body{overflow:auto;background-attachment:scroll}.app{height:auto;display:block}.layout{grid-template-columns:1fr}.left{grid-template-rows:auto auto auto}.input-panel{grid-template-columns:1fr}.current-card{width:100%;min-width:0;height:auto;min-height:118px}.ticket-grid{grid-template-columns:repeat(2,1fr)}.control-grid{grid-template-columns:1fr}.control-btn{min-height:58px}.side{margin-top:12px}}@media(max-width:520px){.app{padding:10px}.topbar{border-radius:22px;align-items:flex-start}.brand h1{font-size:15px}.pills{max-width:48%}.pill{font-size:11px;padding:7px 9px}.panel{padding:12px;border-radius:24px}#inputQty{font-size:54px}.input-box{min-height:118px}.ticket-grid{grid-template-columns:1fr}.ticket-btn{min-height:88px}.ticket-btn strong{font-size:18px}.summary-grid{grid-template-columns:1fr 1fr}.summary-grid .box:last-child{grid-column:1/-1}.total{font-size:42px}}
</style>
</head>
<body>
<div class="app">
<header class="topbar"><div class="brand"><div class="logo">🌿</div><div><h1>後慈湖售票系統</h1><small>HOUCIHU COUNTER POS</small></div></div><div class="pills"><div class="pill ok">● ONLINE</div><div class="pill" id="clock">--:--</div><div class="pill">58mm 熱感票券</div></div></header>
<main class="layout">
<section class="left">
<div class="panel input-panel"><div class="input-box"><input id="inputQty" type="tel" inputmode="numeric" maxlength="3" placeholder="0" oninput="syncInput()" autocomplete="off"></div><div class="current-card"><span>目前狀態</span><div id="currentType">請選擇票種或輸入數量</div><div class="keyhint"><b>Q/W/E</b><b>A/S/D</b><b>F 免費</b><b>Enter 結帳</b></div></div></div>
<div class="panel ticket-grid"><button class="ticket-btn cash" onclick="add('現金全票','cash_full')"><div class="icon">🎫</div><span class="price">$100</span><strong>現金全票</strong><small>快捷鍵 Q</small></button><button class="ticket-btn cash" onclick="add('現金團體','cash_group')"><div class="icon">👥</div><span class="price">$80</span><strong>現金團體</strong><small>滿 40 人｜快捷鍵 W</small></button><button class="ticket-btn cash" onclick="add('現金優待','cash_discount')"><div class="icon">🧓</div><span class="price">$50</span><strong>現金優待</strong><small>快捷鍵 E</small></button><button class="ticket-btn card" onclick="add('悠遊全票','card_full')"><div class="icon">💳</div><span class="price">$100</span><strong>悠遊全票</strong><small>快捷鍵 A</small></button><button class="ticket-btn card" onclick="add('悠遊團體','card_group')"><div class="icon">💳</div><span class="price">$80</span><strong>悠遊團體</strong><small>滿 40 人｜快捷鍵 S</small></button><button class="ticket-btn card" onclick="add('悠遊優待','card_discount')"><div class="icon">💳</div><span class="price">$50</span><strong>悠遊優待</strong><small>快捷鍵 D</small></button><button class="ticket-btn free" onclick="add('免費','free')"><div class="icon">🆓</div><span class="price">$0</span><strong>免費票</strong><small>仍需開票｜快捷鍵 F</small></button></div>
<div class="panel control-grid"><button class="control-btn clear" onclick="clearInput()">⌫ 清除輸入 Esc</button><button class="control-btn clear-all" onclick="reset()">❌ 全部重設 Delete</button><button class="control-btn checkout" onclick="checkout()">💰 結帳列印 Enter</button></div>
</section>
<aside class="panel side"><div><h2>🧾 交易明細</h2><div class="sub">團體票採現金團體＋悠遊團體合併計算，滿 40 人自動套用 $80。</div></div><div class="summary-grid"><div class="box"><span>總人數</span><b id="sumPeople">0</b></div><div class="box"><span>團體人數</span><b id="sumGroup">0</b></div><div class="box"><span>票號狀態</span><b id="saveState">待結帳</b></div></div><div id="list"><div class="empty">尚未加入票種<br>可直接按快捷鍵快速售票</div></div><div id="warn"></div><div class="total-card"><div class="total-label">應收總計</div><div class="total" id="total">0</div></div><div id="lastTicket">最後票號：—</div></aside>
</main>
</div>
<script>
var GAS_WEB_APP_URL="https://script.google.com/macros/s/AKfycbw63eJnsg0a70IbZXBYWktt8CCDfx0mm_MAwzMRDoxKNNvcT2FTTMpJuU8f3qfqHjo/exec";
var input="";var data={cash_full:0,cash_group:0,cash_discount:0,card_full:0,card_group:0,card_discount:0,free:0};var printing=false;
var typeMeta={cash_full:{icon:"🎫",name:"現金全票",price:100},cash_group:{icon:"👥",name:"現金團體",price:null},cash_discount:{icon:"🧓",name:"現金優待",price:50},card_full:{icon:"💳",name:"悠遊全票",price:100},card_group:{icon:"💳",name:"悠遊團體",price:null},card_discount:{icon:"💳",name:"悠遊優待",price:50},free:{icon:"🆓",name:"免費票",price:0}};
function syncInput(){input=document.getElementById("inputQty").value.replace(/\D/g,"");updateDisplay()}function updateDisplay(){document.getElementById("inputQty").value=input}function getQty(){return input===""||input==="0"?1:parseInt(input,10)}
function add(name,type){var qty=getQty();if(qty>300){alert("數量超過上限");return}if(!data.hasOwnProperty(type))return;data[type]+=qty;document.getElementById("currentType").innerText="已加入「"+name+"」 x "+qty;input="";updateDisplay();calc()}
function clearInput(){input="";updateDisplay();document.getElementById("currentType").innerText="已清除輸入數字"}
function reset(){if(!confirm("確定要清空目前所有項目嗎？"))return;for(var k in data){data[k]=0}input="";document.getElementById("currentType").innerText="已重設本筆交易";document.getElementById("saveState").innerText="待結帳";updateDisplay();calc()}
function getTotalPeople(source){var n=0;for(var k in source){n+=Number(source[k])||0}return n}function getGroupTotal(source){return Number(source.cash_group||0)+Number(source.card_group||0)}function getGroupPrice(source){return getGroupTotal(source)>=40?80:100}
function calcTotal(source){var gp=getGroupPrice(source),total=0;total+=Number(source.cash_full||0)*100;total+=Number(source.cash_group||0)*gp;total+=Number(source.cash_discount||0)*50;total+=Number(source.card_full||0)*100;total+=Number(source.card_group||0)*gp;total+=Number(source.card_discount||0)*50;return total}
function calc(){var total=calcTotal(data),people=getTotalPeople(data),groupTotal=getGroupTotal(data),gp=getGroupPrice(data);document.getElementById("total").innerText=total.toLocaleString("zh-TW");document.getElementById("sumPeople").innerText=people;document.getElementById("sumGroup").innerText=groupTotal;var html="";for(var key in typeMeta){var qty=Number(data[key]||0);if(!qty)continue;var m=typeMeta[key],price=key.indexOf("group")>-1?gp:m.price;html+="<div class='row'><div><strong>"+m.icon+" "+m.name+"</strong><small>單價 $"+price+" × "+qty+"</small></div><b>$"+(price*qty).toLocaleString("zh-TW")+"</b></div>"}document.getElementById("list").innerHTML=html||"<div class='empty'>尚未加入票種<br>可直接按快捷鍵快速售票</div>";var warn="";if(groupTotal>0&&groupTotal<40)warn="⚠️ 團體票合計 "+groupTotal+" 人，未滿 40 人，目前以全票 $100 計算";if(groupTotal>=40)warn="✅ 團體票合計 "+groupTotal+" 人，已套用團體價 $80";document.getElementById("warn").innerHTML=warn}
function checkout(){if(printing)return;var snapshot=JSON.parse(JSON.stringify(data));var people=getTotalPeople(snapshot);var total=calcTotal(snapshot);if(total===0&&snapshot.free===0){alert("⚠️ 請先選擇票種");return}printing=true;document.getElementById("currentType").innerText="處理中，正在產生票券...";document.getElementById("saveState").innerText="送出中";var now=new Date();var yy=String(now.getFullYear()).slice(-2);var mm=String(now.getMonth()+1).padStart(2,"0");var dd=String(now.getDate()).padStart(2,"0");var rn=String(Math.floor(Math.random()*10000)).padStart(4,"0");var ticketId="HCH"+yy+mm+dd+rn;var order={action:"saveOrder",ticketId:ticketId,cash_full:snapshot.cash_full,cash_group:snapshot.cash_group,cash_discount:snapshot.cash_discount,card_full:snapshot.card_full,card_group:snapshot.card_group,card_discount:snapshot.card_discount,free:snapshot.free,total:total,type:getGroupTotal(snapshot)>0?"團體":"散客",people:people};var pwin=window.open("about:blank","_blank");if(!pwin){alert("⚠️ 請允許彈出視窗，否則無法列印票券");printing=false;document.getElementById("saveState").innerText="待結帳";return}pwin.document.open();pwin.document.write("<html><body style='font-family:sans-serif;text-align:center;padding:40px;'>票券產生中...</body></html>");pwin.document.close();fetch(GAS_WEB_APP_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(order)}).then(function(){document.getElementById("saveState").innerText="已送出";printTicket(ticketId,total,people,snapshot,pwin)}).catch(function(err){console.error(err);document.getElementById("saveState").innerText="送出失敗";alert("❌ 交易送出失敗，但仍將列印。請稍後確認 Google Sheet 是否有紀錄。");printTicket(ticketId,total,people,snapshot,pwin)})}
function printTicket(ticketId,total,people,snapshot,pwin){var detailHtml="";var gp=getGroupPrice(snapshot);for(var key in typeMeta){var qty=Number(snapshot[key]||0);if(!qty)continue;var m=typeMeta[key];detailHtml+="<div style='display:flex;justify-content:space-between;margin:4px 0'><span>"+m.name+"</span><b>x "+qty+"</b></div>"}var ticketUrl="https://cihu2026.github.io/ticket-scan/?id="+encodeURIComponent(ticketId);var qrApi="https://api.qrserver.com/v1/create-qr-code/?size=500x500&ecc=M&margin=8&data="+encodeURIComponent(ticketUrl);var html="<!DOCTYPE html><html><head><meta charset='UTF-8'><title>後慈湖入園券</title><style>@page{size:58mm auto;margin:0}html,body{margin:0;padding:0;width:58mm;background:#fff;color:#111}body{font-family:Microsoft JhengHei,Arial,sans-serif;-webkit-print-color-adjust:exact;print-color-adjust:exact}.ticket{padding:10px 9px 8px;background:#fff}.head{text-align:center}.head h2{font-size:23px;margin:2px 0}.head p{font-size:13px;margin:4px 0;font-weight:700}.line{border-top:1px dashed #111;margin:8px 0}.detail{font-size:14px;line-height:1.65}.sum{text-align:center;font-weight:900;font-size:20px;line-height:1.45;margin:6px 0}.qr{text-align:center;margin:9px 0}.qrbox{display:inline-block;padding:8px;border:3px solid #1b4332;border-radius:14px}.qrbox img{width:35mm;height:35mm;display:block}.footer{text-align:center;font-size:12px;line-height:1.55}.small{font-size:11px;color:#333}</style></head><body><div class='ticket'><div class='head'><h2>🌿 後慈湖入園券</h2><p>票號："+ticketId+"</p></div><div class='line'></div><div class='detail'>"+detailHtml+"</div><div class='line'></div><div class='sum'>總人數："+people+" 位<br>總金額：$"+total.toLocaleString("zh-TW")+"</div><div class='qr'><div class='qrbox'><img src='"+qrApi+"'></div></div><div class='footer'>※ 限當日有效 ※<br>請出示此券核銷入場<br><span class='small'>"+new Date().toLocaleString("zh-TW")+"</span></div></div></body></html>";pwin.document.open();pwin.document.write(html);pwin.document.close();setTimeout(function(){pwin.focus();pwin.print()},700);setTimeout(function(){try{pwin.close()}catch(e){}},1800);finishCheckout(ticketId)}
function finishCheckout(id){document.getElementById("lastTicket").innerText="最後票號："+id;for(var k in data){data[k]=0}input="";printing=false;document.getElementById("currentType").innerText="結帳完成，請取票";document.getElementById("saveState").innerText="完成";updateDisplay();calc()}
document.addEventListener("keydown",function(e){if(e.repeat)return;if(e.target&&e.target.id==="inputQty")return;var key=e.key.toLowerCase();if(!isNaN(e.key)&&e.key!==" "){if(input.length<3){input+=e.key;updateDisplay()}}if(e.key==="Backspace"){input=input.slice(0,-1);updateDisplay()}if(key==="q")add("現金全票","cash_full");if(key==="w")add("現金團體","cash_group");if(key==="e")add("現金優待","cash_discount");if(key==="a")add("悠遊全票","card_full");if(key==="s")add("悠遊團體","card_group");if(key==="d")add("悠遊優待","card_discount");if(key==="f")add("免費","free");if(e.key==="Enter")checkout();if(e.key==="Escape")clearInput();if(e.key==="Delete")reset()});function tick(){document.getElementById("clock").textContent=new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"})}tick();setInterval(tick,30000);calc();
</script>
</body>
</html>
