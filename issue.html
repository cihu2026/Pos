<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🎟️ 後慈湖售票機 PRO</title>

<style>
body{
margin:0;
font-family:"Microsoft JhengHei";
background:#0d1b2a;
color:#fff;
}

header{
text-align:center;
font-size:32px;
padding:20px;
color:#ff9a36;
font-weight:900;
}

#display{
width:100%;
font-size:100px;
text-align:center;
background:#000;
color:#00ffcc;
margin:10px;
border-radius:20px;
padding:20px;
border:none;
outline:none;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

button{
height:80px;
font-size:22px;
border:none;
border-radius:16px;
color:#fff;
}

.cash{background:#1d7f29;}
.card{background:#0a63b7;}
.free{background:#6a1bb0;}
.pay{background:#ff5722;}
.clear{background:#607d8b;}
.reset{background:#c62828;}

#detail{
font-size:22px;
text-align:center;
line-height:1.8;
padding:10px;
}

#total{
font-size:60px;
text-align:center;
margin:10px;
color:#00ffcc;
}
</style>
</head>

<body>

<header>🎟️ 後慈湖售票機 🌿</header>

<input id="display"
type="text"
inputmode="numeric"
placeholder="0"
oninput="handleInput(this.value)">

<div class="grid">

<button class="cash" onclick="add(100,'full')">全票 🎫 (Q)</button>
<button class="cash" onclick="add(80,'group')">團體 👥 (W)</button>
<button class="cash" onclick="add(50,'discount')">優待 💸 (E)</button>

<button class="card" onclick="add(100,'card_full')">悠遊 🎟️ (A)</button>
<button class="card" onclick="add(80,'card_group')">悠遊團體 👥 (S)</button>
<button class="card" onclick="add(50,'card_discount')">悠遊優待 💳 (D)</button>

<button class="free" onclick="add(0,'free')">免費 🆓 (F)</button>

<button class="pay" onclick="checkout()">結帳 💰 (Z)</button>
<button class="clear" onclick="clearInput()">清除</button>
<button class="reset" onclick="resetAll()">清空</button>

</div>

<div id="detail"></div>
<div id="total">0</div>

<script>

let input="";
let total=0;
let isSubmitting=false; // ⭐ 防重送

let data={
full:0,
group:0,
discount:0,
card_full:0,
card_group:0,
card_discount:0,
free:0
};

/* 輸入 */
function handleInput(val){
input = val.replace(/\D/g,'').slice(0,4);
update();
}

/* 更新 */
function update(){

document.getElementById("display").value = input || "";

document.getElementById("total").innerText = total.toLocaleString();

document.getElementById("detail").innerHTML=`
🎫 全票：${data.full}<br>
👥 團體：${data.group}<br>
💸 優待：${data.discount}<br>
🎟️ 悠遊全票：${data.card_full}<br>
👥 悠遊團體：${data.card_group}<br>
💳 悠遊優待：${data.card_discount}<br>
🆓 免費票：${data.free}
`;
}

/* 加票 */
function add(price,type){

let qty = input ? Number(input) : 1;

if(isNaN(qty)) qty = 1;

total += qty * price;

if(type) data[type] += qty;

input="";
update();

let el=document.getElementById("display");
el.focus();
el.select(); // ⭐ 自動選取
}

/* 清除 */
function clearInput(){
input="";
update();
}

/* 清空 */
function resetAll(){
total=0;
input="";
for(let k in data){data[k]=0;}
update();
}

/* 結帳 */
function checkout(){

if(isSubmitting) return; // ⭐ 防連點

if(total===0){
alert("⚠️ 沒有金額");
return;
}

isSubmitting=true;

let order={
  total:total,
  detail:data
};

fetch("https://script.google.com/macros/s/AKfycbwc0oR7OiMUIc3k785S_UMiUsTTGDUsgUjOEularvE4FhrZclEfWTyuq3IUKmQx-ZaA/exec",{
  method:"POST",
  headers:{
    "Content-Type":"application/json"
  },
  body:JSON.stringify(order)
})
.then(res=>{
  if(!res.ok) throw new Error("網路錯誤");
  return res.json();
})
.then(res=>{

  if(!res.id){
    throw new Error("沒有回傳票號");
  }

  let url = "https://script.google.com/macros/s/AKfycbwc0oR7OiMUIc3k785S_UMiUsTTGDUsgUjOEularvE4FhrZclEfWTyuq3IUKmQx-ZaA/exec?page=ticket&id="+res.id;

  window.open(url,"_blank");

  resetAll();

})
.catch(err=>{
  alert("❌ 結帳失敗：" + err.message);
})
.finally(()=>{
  isSubmitting=false;
});

}

/* 快捷鍵 */
document.addEventListener("keydown",e=>{

const key=e.key.toLowerCase();

if(key==="q"){add(100,'full');return;}
if(key==="w"){add(80,'group');return;}
if(key==="e"){add(50,'discount');return;}

if(key==="a"){add(100,'card_full');return;}
if(key==="s"){add(80,'card_group');return;}
if(key==="d"){add(50,'card_discount');return;}

if(key==="f"){add(0,'free');return;}
if(key==="z"){checkout();return;}

});

/* focus */
window.onload=function(){
let el=document.getElementById("display");
el.focus();
el.select();
}

update();

</script>

</body>
</html>
