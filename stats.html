<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>📊 後慈湖即時統計 v2.0</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:"Microsoft JhengHei",sans-serif;
  background:
  linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.65)),
  url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1600&q=80")
  center/cover no-repeat fixed;
  color:#fff;
  min-height:100vh;
}

/* 🌿 AL-2026 hidden signature */

header{
  text-align:center;
  padding:20px 10px;
  font-size:38px;
  font-weight:900;
  color:#ffb15a;
  text-shadow:0 4px 10px rgba(0,0,0,.6);
}

.wrap{
  padding:18px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}

.card{
  background:rgba(255,255,255,.10);
  backdrop-filter:blur(10px);
  border-radius:24px;
  padding:28px;
  box-shadow:0 10px 25px rgba(0,0,0,.35);
  text-align:center;
}

.label{
  font-size:26px;
  color:#ddd;
  margin-bottom:10px;
}

.value{
  font-size:68px;
  font-weight:900;
  color:#7effd7;
}

.sub{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}

.full{
  grid-column:1 / -1;
}

footer{
  text-align:center;
  padding:16px;
  font-size:18px;
  color:#ddd;
}

button{
  margin-top:15px;
  border:none;
  padding:14px 26px;
  border-radius:14px;
  font-size:20px;
  font-weight:700;
  background:#1d7f29;
  color:#fff;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

@media(max-width:900px){

  header{
    font-size:28px;
  }

  .wrap{
    grid-template-columns:1fr;
  }

  .value{
    font-size:54px;
  }

  .label{
    font-size:22px;
  }

  .sub{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>📊 後慈湖即時統計 v2.0 🌿</header>

<div class="wrap">

  <div class="card">
    <div class="label">👥 今日入園人數</div>
    <div class="value" id="people">0</div>
  </div>

  <div class="card">
    <div class="label">💰 今日營收</div>
    <div class="value" id="money">$0</div>
  </div>

  <div class="card">
    <div class="label">🎟️ 總售出票數</div>
    <div class="value" id="sold">0</div>
  </div>

  <div class="card">
    <div class="label">🟢 已驗票</div>
    <div class="value" id="used">0</div>
  </div>

  <div class="card full">
    <div class="label">🟡 未使用票券</div>
    <div class="value" id="unused">0</div>

    <button onclick="loadStats()">🔄 立即更新</button>
  </div>

</div>

<footer>
後慈湖售票系統 v2.0 PRO
</footer>

<script>

function formatMoney(n){
  return "$" + Number(n).toLocaleString("zh-TW");
}

function showData(res){

  document.getElementById("people").innerText = res.totalPeople || 0;
  document.getElementById("money").innerText  = formatMoney(res.totalMoney || 0);
  document.getElementById("sold").innerText   = res.sold || 0;
  document.getElementById("used").innerText   = res.used || 0;
  document.getElementById("unused").innerText = res.unused || 0;
}

/* Apps Script 模式 */
function loadStats(){

  if(typeof google !== "undefined" &&
     google.script &&
     google.script.run){

      google.script.run
      .withSuccessHandler(showData)
      .getStats();

  }else{

    /* GitHub 模擬資料 */
    showData({
      totalPeople:128,
      totalMoney:12800,
      sold:66,
      used:52,
      unused:14
    });
  }
}

/* 每15秒更新一次 */
setInterval(loadStats,15000);

loadStats();

</script>

</body>
</html>
