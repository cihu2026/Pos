<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>📊 後慈湖統計</title>

<style>
body{
margin:0;
font-family:"Microsoft JhengHei";
background:#1c2623;
color:#e4ebe7;
}

.container{
max-width:420px;
margin:auto;
padding:15px;
}

header{
text-align:center;
font-size:20px;
color:#cfd8d3;
margin-bottom:10px;
}

/* 卡片 */
.card{
background:#24322e;
border-radius:18px;
padding:18px;
margin-bottom:12px;
}

/* 標題 */
.title{
font-size:16px;
color:#cfd8d3;
margin-bottom:10px;
}

/* 大數字 */
.big{
font-size:40px;
text-align:center;
margin-top:5px;
}

/* 明細 */
.list{
font-size:15px;
line-height:1.8;
color:#c9d3ce;
}

/* 重新整理 */
.refresh{
text-align:center;
margin-top:10px;
}

button{
padding:10px 20px;
border:none;
border-radius:12px;
background:#3d5a52;
color:#fff;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<header>📊 今日統計</header>

<div class="card">
<div class="title">💰 今日總金額</div>
<div id="money" class="big">0</div>
</div>

<div class="card">
<div class="title">👥 今日總人數</div>
<div id="people" class="big">0</div>
</div>

<div class="card">
<div class="title">📄 票種明細</div>
<div id="detail" class="list">讀取中...</div>
</div>

<div class="refresh">
<button onclick="load()">🔄 重新整理</button>
</div>

</div>

<script>

function load(){

fetch("https://script.google.com/macros/s/AKfycbwc0oR7OiMUIc3k785S_UMiUsTTGDUsgUjOEularvE4FhrZclEfWTyuq3IUKmQx-ZaA/exec?page=stats")
.then(res=>res.json())
.then(res=>{

document.getElementById("money").innerText = res.totalMoney.toLocaleString();

document.getElementById("people").innerText = res.totalPeople;

document.getElementById("detail").innerHTML = `
🎫 全票：${res.full}<br>
👥 團體：${res.group}<br>
👦 優待：${res.discount}<br>
💳 悠遊全票：${res.card_full}<br>
💳 悠遊團體：${res.card_group}<br>
💳 悠遊優待：${res.card_discount}<br>
🆓 免費：${res.free}
`;

})
.catch(()=>{
document.getElementById("detail").innerText="❌ 無法讀取資料";
});

}

load();

</script>

</body>
</html>
