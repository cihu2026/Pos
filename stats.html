<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 即時統計</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Iansui&display=swap');
html,body,button,input,select,textarea{font-family:"Iansui","Noto Sans TC","Microsoft JhengHei",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;}
body {
  font-family:"Iansui","Noto Sans TC", Arial;
  background: #0f1f17;
  color: #fff;
  text-align: center;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 20px;
  margin: 15px 0;
  font-size: 24px;
}

.big {
  font-size: 48px;
  font-weight: bold;
  color: #00ff99;
}
html,body,button,input,select,textarea,*{font-family:"Iansui","Noto Sans TC","Microsoft JhengHei",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif!important}

html,body,button,button *,input,select,textarea,option,a,.theme-btn,.chip,.nav,.mini{font-family:"Iansui","Noto Sans TC","Microsoft JhengHei",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif !important;}

</style>
</head>

<body>

<h2>📊 即時統計（雲端版）</h2>

<div class="card">
  👥 現場人數
  <div id="current" class="big">0</div>
</div>

<div class="card">
  ⬆️ 入園人數
  <div id="checkin">0</div>
</div>

<div class="card">
  ⬇️ 出園人數
  <div id="checkout">0</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec";

async function loadStats() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    document.getElementById("checkin").innerText = data.checkin;
    document.getElementById("checkout").innerText = data.checkout;
    document.getElementById("current").innerText = data.current;

  } catch (err) {
    console.error("讀取失敗", err);
  }
}

// 每3秒更新
setInterval(loadStats, 3000);

// 初始
loadStats();
</script>

</body>
</html>
