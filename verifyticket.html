<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#08143f">
<title>後慈湖電子驗票系統</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root{
  --bg:#07133a;
  --bg2:#123783;
  --text:#fff;
  --muted:#cbd9ff;
  --line:rgba(139,214,255,.34);
  --primary:#4fdcff;
  --accent:#7c7bff;
  --green:#5df0a2;
  --green2:#1db96b;
  --red:#d93476;
  --orange:#ffae5f;
  --blush:#ff65ae;
  --warn:#ffe66d;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif}
body{
  margin:0;
  padding:10px 10px calc(120px + env(safe-area-inset-bottom));
  color:var(--text);
  text-align:center;
  background:
    radial-gradient(circle at 10% 6%,rgba(79,220,255,.34),transparent 28%),
    radial-gradient(circle at 88% 4%,rgba(124,123,255,.3),transparent 30%),
    linear-gradient(145deg,var(--bg),var(--bg2) 56%,#050817);
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.32;
  background-image:
    radial-gradient(circle,rgba(255,255,255,.84) 1px,transparent 1.8px),
    radial-gradient(circle,rgba(255,230,109,.7) 1px,transparent 1.9px);
  background-size:38px 38px,76px 76px;
  background-position:0 0,22px 18px;
}
.app{
  position:relative;
  z-index:1;
  width:min(620px,100%);
  margin:auto;
  display:grid;
  gap:14px;
  padding-bottom:calc(80px + env(safe-area-inset-bottom));
}
.card,.status-box{
  border:1px solid var(--line);
  border-radius:30px;
  background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.08));
  -webkit-backdrop-filter:blur(22px);
  backdrop-filter:blur(22px);
  box-shadow:0 22px 62px rgba(5,10,38,.28);
  overflow:hidden;
}
.hero{padding:20px 16px;border-radius:34px}
.eyebrow{margin:0 0 6px;color:var(--green);font-size:12px;font-weight:1000;letter-spacing:2px}
h1{margin:0;font-size:28px;font-weight:1000;letter-spacing:.03em}
.subtitle{margin:8px 0 0;color:var(--muted);font-size:14px;font-weight:850;line-height:1.55}
.verify-card{padding:18px 16px 20px}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;text-align:left}
.title{display:flex;align-items:center;gap:9px;font-size:18px;font-weight:1000}
.ico{display:grid;place-items:center;width:42px;height:42px;border-radius:18px;background:rgba(255,255,255,.14);border:1px solid var(--line)}
.note{font-size:12px;color:var(--muted);font-weight:900}
button,input{font:inherit}
button{border:0;cursor:pointer;touch-action:manipulation}
button:active{transform:scale(.97)}
.start{
  display:block;
  width:100%;
  min-height:70px;
  border-radius:25px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;
  font-size:20px;
  font-weight:1000;
}
#reader{
  display:none;
  width:100%;
  min-height:260px;
  max-height:330px;
  aspect-ratio:1.2/1;
  margin:16px 0 18px;
  border-radius:27px;
  overflow:hidden;
  background:#000;
  border:1px solid var(--line);
}
body.scanner-on #reader{display:block}
#reader video{width:100%!important;height:100%!important;object-fit:cover!important;border-radius:27px!important}
.form-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:12px}
input{
  display:block;
  width:100%;
  min-height:64px;
  padding:0 16px;
  border-radius:24px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.14);
  color:var(--text);
  text-align:center;
  font-size:20px;
  font-weight:1000;
  outline:none;
}
input::placeholder{color:rgba(203,217,255,.72)}
.send{
  min-height:64px;
  border-radius:24px;
  background:linear-gradient(135deg,var(--orange),var(--blush));
  color:#fff;
  font-size:18px;
  font-weight:1000;
}
.status-box{
  padding:18px 16px;
  min-height:106px;
  display:grid;
  place-items:center;
  font-size:20px;
  font-weight:1000;
  line-height:1.55;
  white-space:pre-line;
}
.success{border-color:rgba(93,240,162,.55);background:linear-gradient(180deg,rgba(93,240,162,.28),rgba(255,255,255,.08))}
.error{border-color:rgba(255,101,174,.62);background:linear-gradient(180deg,rgba(217,52,118,.32),rgba(255,255,255,.08))}
.warning{border-color:rgba(255,230,109,.62);background:linear-gradient(180deg,rgba(255,230,109,.28),rgba(255,255,255,.08));color:#fff}
.hint{padding:12px;color:var(--muted);font-size:13px;font-weight:800;line-height:1.65}
@media(max-width:390px){
  body{padding:8px 8px calc(125px + env(safe-area-inset-bottom))}
  h1{font-size:24px}
  .hero,.verify-card{padding:16px 14px 18px;border-radius:28px}
  #reader{min-height:238px;max-height:300px;border-radius:25px}
  input,.send{min-height:60px;border-radius:22px}
  .send{font-size:17px}
}
</style>
</head>
<body>
<div class="app">
  <section class="card hero">
    <p class="eyebrow">HOUCIHU VERIFY GATE</p>
    <h1>後慈湖電子驗票系統</h1>
    <p class="subtitle">掃描 QR Code 或手動輸入票號驗票</p>
  </section>

  <section class="card verify-card">
    <div class="head">
      <div class="title"><span class="ico">📷</span><span>掃描驗票</span></div>
      <div class="note">QR Code / 票號</div>
    </div>

    <button type="button" id="startBtn" class="start">📷 啟動掃描驗票</button>
    <div id="reader"></div>

    <div class="form-grid">
      <input id="manualTicketInput" placeholder="請手動輸入票號" inputmode="text" autocomplete="off" autocapitalize="characters" enterkeyhint="done">
      <button type="button" id="manualSubmitBtn" class="send">🎫 驗票</button>
    </div>
  </section>

  <div id="resultStatus" class="status-box">請點擊啟動相機，或手動輸入票號驗票</div>
  <div class="card hint">💡 掃描框會在按下啟動後才展開。若相機無法啟動，請確認 Safari 相機權限與 HTTPS 網址。</div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbw63eJnsg0a70IbZXBYWktt8CCDfx0mm_MAwzMRDoxKNNvcT2FTTMpJuU8f3qfqHjo/exec";
let qr=null;
let isProcessing=false;
let lastManualClick=0;
const statusEl=document.getElementById("resultStatus");
const startBtn=document.getElementById("startBtn");
const manualInput=document.getElementById("manualTicketInput");
const manualBtn=document.getElementById("manualSubmitBtn");
const beep=new Audio("https://www.soundjay.com/buttons/beep-07a.mp3");

startBtn.addEventListener("click",startScanner);
manualBtn.addEventListener("click",submitManualTicket);
manualInput.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();submitManualTicket(e)}});

function setStatus(type,msg){
  statusEl.className="status-box "+(type||"");
  statusEl.textContent=msg;
}

function startScanner(){
  if(qr)return;
  if(location.protocol!=="https:"){
    setStatus("error","❌ 必須使用 HTTPS 才能開啟相機");
    return;
  }
  if(typeof Html5Qrcode==="undefined"){
    setStatus("error","❌ 掃描套件尚未載入，請重新整理頁面");
    return;
  }

  document.body.classList.add("scanner-on");
  startBtn.textContent="⏳ 啟動中...";
  startBtn.disabled=true;
  setStatus("warning","📷 請允許相機權限…");

  try{
    qr=new Html5Qrcode("reader",{verbose:false});
    qr.start(
      {facingMode:"environment"},
      {
        fps:20,
        qrbox:(w,h)=>{
          const size=Math.floor(Math.min(w,h)*0.68);
          return {width:Math.max(180,Math.min(size,260)),height:Math.max(180,Math.min(size,260))};
        },
        aspectRatio:1,
        disableFlip:true
      },
      onScanSuccess
    ).then(()=>{
      startBtn.style.display="none";
      setStatus("warning","🔍 相機已啟動，請掃描 QR Code");
    }).catch(err=>{
      console.error(err);
      qr=null;
      document.body.classList.remove("scanner-on");
      startBtn.textContent="📷 重試啟動掃描";
      startBtn.disabled=false;
      setStatus("error","❌ 相機啟動失敗\n請確認權限是否允許");
    });
  }catch(err){
    console.error(err);
    qr=null;
    document.body.classList.remove("scanner-on");
    startBtn.textContent="📷 重試啟動掃描";
    startBtn.disabled=false;
    setStatus("error","❌ 相機啟動失敗");
  }
}

function submitManualTicket(e){
  if(e)e.preventDefault();
  const now=Date.now();
  if(now-lastManualClick<500)return;
  lastManualClick=now;

  const raw=manualInput.value.trim();
  if(!raw){
    setStatus("error","🚫 請先輸入票號，再按驗票");
    manualInput.focus();
    return;
  }
  manualInput.blur();
  manualInput.value="";
  verify(extractTicketId(raw));
}

function onScanSuccess(text){
  if(isProcessing)return;
  isProcessing=true;
  beep.play().catch(()=>{});
  if(navigator.vibrate)navigator.vibrate(120);

  const id=extractTicketId(text);
  pauseScanner();
  verify(id,true);
}

function extractTicketId(text){
  const raw=String(text||"").trim();
  if(!raw)return"";
  try{
    const url=new URL(raw,location.href);
    const id=url.searchParams.get("id");
    if(id!==null)return id.trim();
  }catch(e){}
  const m=raw.match(/[?&]id=([^&]+)/);
  if(m){
    try{return decodeURIComponent(m[1].replace(/\+/g," ")).trim()}catch(e){return m[1].trim()}
  }
  return raw;
}

function pauseScanner(){
  try{
    if(qr&&typeof qr.getState==="function"&&qr.getState()===2&&typeof qr.pause==="function")qr.pause(true);
  }catch(e){}
}

function resumeScanner(){
  isProcessing=false;
  try{
    if(qr&&typeof qr.getState==="function"&&qr.getState()===3&&typeof qr.resume==="function")qr.resume();
  }catch(e){}
}

function verify(id,fromScanner=false){
  if(!id){
    isProcessing=false;
    setStatus("error","🚫 票號格式錯誤");
    if(fromScanner)setTimeout(resumeScanner,800);
    return;
  }

  setStatus("warning","⌛ 正在驗票\n"+id);

  if(window.google&&google.script&&google.script.run){
    google.script.run
      .withSuccessHandler(msg=>handleVerifyResult(msg,fromScanner))
      .withFailureHandler(()=>handleVerifyError(fromScanner))
      .verifyTicket(id);
    return;
  }

  fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    cache:"no-store",
    body:JSON.stringify({id:id,action:"verify"})
  })
  .then(r=>{
    if(!r.ok)throw new Error("HTTP "+r.status);
    return r.json();
  })
  .then(res=>handleVerifyResult(res,fromScanner))
  .catch(err=>{
    console.error(err);
    handleVerifyError(fromScanner);
  });
}

function handleVerifyResult(res,fromScanner){
  isProcessing=false;
  let ok=false;
  let msg="";

  if(typeof res==="string"){
    ok=res.includes("🟢")||res.includes("成功")||res.includes("OK");
    msg=res;
  }else if(res&&typeof res==="object"){
    ok=!!res.ok;
    const detail=res.detail||{};
    msg=res.msg||res.message||(ok?"✅ 驗票成功":"⛔ 驗票未通過");
    if(ok){
      const people=detail.people!==undefined?detail.people:"";
      const current=res.current!==undefined?"\n目前場內 "+res.current+" 人":"";
      msg="✅ 驗票成功"+(people!==""?"\n本張票 "+people+" 人":"")+current;
    }
  }else{
    msg="⚠️ 無法判讀驗票結果";
  }

  setStatus(ok?"success":"error",msg);
  if(fromScanner)setTimeout(resumeScanner,1600);
}

function handleVerifyError(fromScanner){
  isProcessing=false;
  setStatus("error","⚠️ 系統錯誤或網路不穩\n請稍後再試，或改用手動輸入票號");
  if(fromScanner)setTimeout(resumeScanner,1200);
}
</script>
</body>
</html>
