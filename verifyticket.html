<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: "Noto Sans TC", sans-serif;
  background:#121212;
  color:white;
  text-align:center;
  padding:15px;
}
h2 { color:#9be7ff; font-size:28px; }

#reader {
  max-width:600px;
  margin:10px auto;
  border-radius:25px;
  overflow:hidden;
  border:4px solid #444;
  background:#000;
}

.status-box {
  margin:25px auto;
  padding:25px;
  font-size:24px;
  font-weight:900;
  border-radius:20px;
  min-height:100px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.success { background:#2ecc71; color:white; }
.error { background:#e74c3c; color:white; }
.warning { background:#f1c40f; color:black; }

.btn-start {
  width:90%;
  max-width:500px;
  padding:25px;
  font-size:26px;
  border-radius:60px;
  border:none;
  background:linear-gradient(135deg,#3498db,#2980b9);
  color:white;
}
</style>
</head>

<body>

<h2>🎟️ 後慈湖驗票系統</h2>

<div id="reader"></div>

<button id="startBtn" class="btn-start">📷 啟動相機驗票</button>

<div id="resultStatus" class="status-box">請點擊啟動相機</div>

<script>
let qr;
let isProcessing = false;
const statusEl = document.getElementById("resultStatus");
const startBtn = document.getElementById("startBtn");
const beep = new Audio("https://www.soundjay.com/buttons/beep-07a.mp3");

startBtn.onclick = startScanner;

function startScanner(){
  startBtn.style.display = "none";
  statusEl.className="status-box warning";
  statusEl.innerText="📷 請允許相機權限…";

  // ✅ HTTPS 檢查
  if (location.protocol !== "https:"){
    showError("❌ 必須使用 HTTPS 才能開啟相機");
    return;
  }

  qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    {
      fps: 15,
      qrbox: (w,h)=>{
        const size = Math.floor(Math.min(w,h)*0.7);
        return { width:size, height:size };
      },
      aspectRatio:1.0
    },
    onScanSuccess
  ).then(()=>{
    statusEl.innerText="✅ 相機已啟動，請掃描 QR Code";
  }).catch(err=>{
    showError("❌ 相機啟動失敗\n請確認權限是否允許");
  });
}

function onScanSuccess(text){
  if (isProcessing) return;
  isProcessing = true;

  beep.play().catch(()=>{});
  if (navigator.vibrate) navigator.vibrate(120);

  qr.stop(); // ✅ 關鍵：一定要先停相機

  const id = text.includes("id=")
    ? text.split("id=")[1].split("&")[0]
    : text;

  verify(id);
}

function verify(id){
  statusEl.className="status-box warning";
  statusEl.innerText="⌛ 正在核銷\n"+id;

  google.script.run
    .withSuccessHandler(msg=>{
      isProcessing=false;
      statusEl.className = msg.includes("🟢")
        ? "status-box success"
        : "status-box error";
      statusEl.innerText = msg;

      setTimeout(restartScan, 2500);
    })
    .withFailureHandler(()=>{
      showError("⚠️ 系統錯誤");
    })
    .verifyTicket(id);
}

function restartScan(){
  statusEl.className="status-box";
  statusEl.innerText="🟢 請掃描下一張票";

  qr.start(
    { facingMode: "environment" },
    { fps:15, qrbox:250, aspectRatio:1 },
    onScanSuccess
  );
}

function showError(msg){
  statusEl.className="status-box error";
  statusEl.innerText=msg;
  startBtn.style.display="block";
}
</script>

</body>
</html>
