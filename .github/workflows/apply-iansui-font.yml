name: Apply Iansui font

on:
  push:
    paths:
      - '.github/workflows/apply-iansui-font.yml'

permissions:
  contents: write

jobs:
  update-font:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply Iansui to all pages
        shell: python
        run: |
          from pathlib import Path
          import re

          font_import = "@import url('https://fonts.googleapis.com/css2?family=Iansui&display=swap');"
          font_stack = '"Iansui","Noto Sans TC","Microsoft JhengHei",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif'
          inherit_rule = f'html,body,button,input,select,textarea{{font-family:{font_stack};}}'

          changed = []
          for path in list(Path('.').rglob('*.html')) + list(Path('.').rglob('*.css')):
              if '.git' in path.parts:
                  continue
              text = path.read_text(encoding='utf-8')
              original = text

              # Replace existing Google Fonts imports with Iansui.
              text = re.sub(
                  r"@import\s+url\(['\"]https://fonts\.googleapis\.com/css2\?family=[^'\"]+['\"]\);",
                  font_import,
                  text
              )

              # Ensure HTML pages load Iansui even when no Google Fonts import existed.
              if path.suffix.lower() == '.html' and 'family=Iansui' not in text and '<style>' in text:
                  text = text.replace('<style>', '<style>\n' + font_import, 1)

              # Put Iansui first anywhere Noto Sans TC was previously used.
              text = re.sub(
                  r'font-family\s*:\s*([^;{}]*?)"Noto Sans TC"([^;{}]*);',
                  lambda m: 'font-family:' + (
                      m.group(1) + '"Iansui","Noto Sans TC"' + m.group(2)
                      if 'Iansui' not in m.group(0)
                      else m.group(1) + '"Noto Sans TC"' + m.group(2)
                  ) + ';',
                  text
              )

              # Ensure all controls use the same font.
              if path.suffix.lower() == '.html' and inherit_rule not in text:
                  anchor = font_import
                  if anchor in text:
                      text = text.replace(anchor, anchor + '\n' + inherit_rule, 1)

              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(str(path))

          print('Updated files:')
          print('\n'.join(changed) if changed else '(none)')

      - name: Remove one-time workflow
        run: rm -f .github/workflows/apply-iansui-font.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes needed"
          else
            git commit -m "Use Iansui font across POS pages"
            git push origin main
          fi
