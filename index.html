<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>🎟️ 後慈湖售票系統 v1.2 FINAL</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:"Microsoft JhengHei","PingFang TC",sans-serif;
    min-height:100vh;
    background:
    linear-gradient(rgba(8,18,34,.55),rgba(8,18,34,.78)),
    url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1600&q=80")
    center/cover no-repeat fixed;
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow:hidden;
}

/* 🌿 hidden signature AL-2026 */

header{
    width:100%;
    text-align:center;
    padding:42px 18px 22px;
}

.logo{
    font-size:46px;
    margin-bottom:8px;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,.45));
}

.title{
    font-size:34px;
    font-weight:900;
    color:#ffb15a;
    letter-spacing:2px;
    text-shadow:0 4px 12px rgba(0,0,0,.55);
}

.sub{
    margin-top:8px;
    font-size:16px;
    letter-spacing:3px;
    color:rgba(255,255,255,.78);
}

.panel{
    width:100%;
    max-width:420px;
    padding:0 22px;
}

.menu{
    background:rgba(255,255,255,.10);
    backdrop-filter:blur(12px);
    border-radius:28px;
    padding:24px;
    box-shadow:0 14px 28px rgba(0,0,0,.32);
    border:1px solid rgba(255,255,255,.08);
}

.nav-btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    padding:20px 22px;
    margin-bottom:16px;
    border-radius:22px;
    text-decoration:none;
    color:#fff;
    font-size:24px;
    font-weight:800;
    transition:.15s ease;
    box-shadow:0 8px 16px rgba(0,0,0,.25);
}

.nav-btn:last-child{
    margin-bottom:0;
}

.nav-btn:active{
    transform:scale(.97);
}

.left{
    display:flex;
    align-items:center;
}

.icon{
    font-size:30px;
    margin-right:14px;
}

.arrow{
    font-size:24px;
    opacity:.75;
}

.main{
    background:linear-gradient(135deg,#1d7f29,#2ea043);
}

.verify{
    background:linear-gradient(135deg,#0a63b7,#2b7cd3);
}

.stats{
    background:linear-gradient(135deg,#7a4b00,#c17d11);
}

.quick{
    margin-top:18px;
    text-align:center;
    font-size:15px;
    color:rgba(255,255,255,.72);
    line-height:1.8;
}

.badges{
    margin-top:18px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.badge{
    padding:8px 14px;
    border-radius:999px;
    background:rgba(255,255,255,.12);
    font-size:13px;
    color:#fff;
}

footer{
    margin-top:auto;
    padding:26px;
    font-size:13px;
    color:rgba(255,255,255,.42);
    letter-spacing:2px;
}

/* 📱 */
@media(max-width:480px){

    .logo{
        font-size:38px;
    }

    .title{
        font-size:28px;
    }

    .nav-btn{
        font-size:21px;
        padding:18px;
    }

    .icon{
        font-size:26px;
    }
}
</style>
</head>

<body>

<header>

    <div class="logo">🏞️</div>

    <div class="title">後慈湖售票系統</div>

    <div class="sub">V1.2 FINAL 🌿</div>

</header>

<div class="panel">

    <div class="menu">

        <a href="https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec" class="nav-btn main">
            <div class="left">
                <span class="icon">🎟️</span>
                開始售票
            </div>
            <span class="arrow">›</span>
        </a>

        <a href="https://cihu2026.github.io/ticket-scan/" class="nav-btn verify">
            <div class="left">
                <span class="icon">📱</span>
                驗票入口
            </div>
            <span class="arrow">›</span>
        </a>

        <a href="stats.html" class="nav-btn stats">
            <div class="left">
                <span class="icon">📊</span>
                今日統計
            </div>
            <span class="arrow">›</span>
        </a>

        <div class="quick">
            ⚡ GitHub Pages 正式營運版<br>
            支援手機 / 平板 / 電腦
        </div>

        <div class="badges">
            <div class="badge">QR 驗票</div>
            <div class="badge">POS 系統</div>
            <div class="badge">即時統計</div>
        </div>

    </div>

</div>

<footer>
Houcihu Scenic Ticketing System
</footer>

</body>
</html>
