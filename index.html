<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>🎟️ 後慈湖售票系統 PRO</title>

<style>
:root {
    --glass-bg: rgba(255, 255, 255, 0.1);
    --glass-border: rgba(255, 255, 255, 0.2);
    --shadow: 0 15px 35px rgba(0,0,0,0.4);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:"Microsoft JhengHei","PingFang TC",sans-serif;
    min-height:100vh;
    background: 
        radial-gradient(circle at 10% 10%, rgba(31, 163, 91, 0.15), transparent 40%),
        linear-gradient(rgba(8,18,34,0.7),rgba(8,18,34,0.9)),
        url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat fixed;
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
}

/* 🌿 Header */
header{
    width:100%;
    text-align:center;
    padding:60px 18px 30px;
}

.logo{
    font-size:58px;
    margin-bottom:12px;
    display: inline-block;
    filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
    animation: float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0) scale(1)}
    50%{transform:translateY(-10px) scale(1.05)}
}

.title{
    font-size:36px;
    font-weight:900;
    letter-spacing:3px;
    background: linear-gradient(135deg, #fff, #ffd89b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
}

.sub{
    margin-top:10px;
    font-size:14px;
    letter-spacing:5px;
    color:rgba(255,255,255,0.5);
}

/* 🧊 面板容器 */
.panel{
    width:100%;
    max-width:420px;
    padding:0 22px;
}

.menu{
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius:32px;
    padding:28px;
    box-shadow: var(--shadow);
    border: 1px solid var(--glass-border);
}

/* 🔘 按鈕優化 */
.nav-btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    padding:22px 24px;
    margin-bottom:18px;
    border-radius:24px;
    text-decoration:none;
    color:#fff;
    font-size:22px;
    font-weight:800;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position:relative;
    overflow:hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.nav-btn:last-child { margin-bottom: 0; }

.nav-btn:active{
    transform: scale(0.95);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

/* 🎨 色彩漸層增強 */
.main{
    background: linear-gradient(135deg, #1fa35b, #38d996);
    border: 1px solid rgba(255,255,255,0.2);
}

.verify{
    background: linear-gradient(135deg, #1b6ed8, #4fa3ff);
    border: 1px solid rgba(255,255,255,0.2);
}

.stats{
    background: linear-gradient(135deg, #c58a00, #ffd34d);
    color:#2b1c00;
    border: 1px solid rgba(255,255,255,0.2);
}

/* Icon 與裝飾 */
.left{
    display:flex;
    align-items:center;
}

.icon{
    font-size:28px;
    margin-right:16px;
    transition: transform 0.3s ease;
}

.nav-btn:hover .icon{
    transform: rotate(-10deg) scale(1.2);
}

.arrow{
    font-size:24px;
    opacity:.5;
    transition: transform 0.3s ease;
}

.nav-btn:hover .arrow {
    transform: translateX(5px);
    opacity: 1;
}

/* 底部資訊區 */
.quick{
    margin-top:24px;
    text-align:center;
    font-size:15px;
    color:rgba(255,255,255,0.6);
    line-height:1.8;
}

.badges{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.badge{
    padding:8px 16px;
    border-radius:12px;
    background: rgba(255,255,255,0.08);
    font-size:12px;
    backdrop-filter:blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
}

/* footer */
footer{
    margin-top:auto;
    padding:30px;
    font-size:12px;
    color:rgba(255,255,255,0.3);
    letter-spacing:2.5px;
    text-transform: uppercase;
}

/* 📱 響應式微調 */
@media(max-width:480px){
    .title{font-size:30px;}
    .nav-btn{font-size:20px; padding:18px 20px;}
    .logo{font-size:52px;}
}
</style>
</head>

<body>

<header>
    <div class="logo">🏞️</div>
    <div class="title">後慈湖售票系統</div>
    <div class="sub">PRO SYSTEM</div>
</header>

<div class="panel">

    <div class="menu">

        <a href="https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec" class="nav-btn main">
            <div class="left">
                <span class="icon">🎟️</span>
                開始售票
            </div>
            <span class="arrow">›</span>
        </a>

        <a href="https://cihu2026.github.io/ticket-scan/" class="nav-btn verify">
            <div class="left">
                <span class="icon">📱</span>
                驗票入口 B 點
            </div>
            <span class="arrow">›</span>
        </a>

        <a href="https://cihu2026.github.io/Monitor/" class="nav-btn stats">
            <div class="left">
                <span class="icon">📊</span>
                今日統計
            </div>
            <span class="arrow">›</span>
        </a>

        <a href="https://cihu2026.github.io/Out/" class="nav-btn verify">
            <div class="left">
                <span class="icon">🚪</span>
                出園 / A 點
            </div>
            <span class="arrow">›</span>
        </a>

        <div class="quick">
            ⚡ 即時營運系統<br>
            支援多設備同步
        </div>

        <div class="badges">
            <div class="badge">QR 驗票</div>
            <div class="badge">POS 系統</div>
            <div class="badge">Realtime</div>
        </div>

    </div>

</div>

<footer>
Houcihu Scenic Area Ticket System
</footer>

</body>
</html>
