<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>後慈湖售票系統</title>
    <style>
        /* 基礎設定：防止手機縮放與版面跑位 */
        body {
            margin: 0;
            padding: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            background: linear-gradient(180deg, #0d1b2a 0%, #1b263b 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            padding: 60px 20px 40px;
            font-size: 32px;
            font-weight: 900;
            color: #ff9a36;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        /* 導覽按鈕設計 */
        .btn {
            display: block;
            margin: 15px 0;
            width: 85%;
            max-width: 320px;
            padding: 22px 0;
            background: #2d6a4f;
            color: white;
            text-decoration: none;
            border-radius: 16px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s, background 0.2s;
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊藍框 */
        }

        /* 手機按下的觸感回饋 */
        .btn:active {
            transform: scale(0.96);
            background: #40916c;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* 第一個按鈕特別顯眼 */
        .btn-primary {
            background: #1d7f29;
            border: 2px solid #52b788;
        }

        .footer-info {
            margin-top: auto;
            padding-bottom: 30px;
            font-size: 14px;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

    <header>🎟️ 後慈湖售票<br>v1.1 PRO</header>

    <a href="#" class="btn btn-primary">🎟️ 開始售票</a>
    <a href="verify.html" class="btn">📱 驗票入口</a>
    <a href="stats.html" class="btn">📊 今日統計</a>

    <div class="footer-info">桃園市政府觀光導覽管理系統</div>

</body>
</html>
