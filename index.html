<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#f6a8d8"><title>後慈湖整合系統</title><style>:root{--bg1:#ffd6ee;--bg2:#b9a7ff;--bg3:#7860d7;--a:#72caff;--b:#ff91d6;--icon:"💙"}body[data-theme=labubu]{--bg1:#ffe2bd;--bg2:#e8ad78;--bg3:#9a6949;--a:#ffc96f;--b:#ff9ab8;--icon:"👾"}body[data-theme=usagi]{--bg1:#ffe1f3;--bg2:#f4a5d0;--bg3:#a45d97;--a:#ff91d6;--b:#ffd9f1;--icon:"🐰"}body[data-theme=snoopy]{--bg1:#f8fbff;--bg2:#d7e0ee;--bg3:#7b879a;--a:#9fb1c8;--b:#ffe57a;--icon:"🐶"}body[data-theme=disney]{--bg1:#f5dcff;--bg2:#b99cff;--bg3:#684bc1;--a:#b18cff;--b:#ffd96d;--icon:"✨"}*{box-sizing:border-box;margin:0;padding:0}body{min-height:100svh;padding:10px 10px 96px;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',sans-serif;color:#fff;background:linear-gradient(180deg,var(--bg1),var(--bg2) 45%,var(--bg3));overflow-x:hidden}body:before{content:"";position:fixed;inset:0;background-image:radial-gradient(2px 2px at 30px 40px,rgba(255,255,255,.65),transparent),radial-gradient(1.5px 1.5px at 130px 100px,rgba(255,255,255,.45),transparent),radial-gradient(2px 2px at 260px 150px,rgba(255,255,255,.5),transparent);background-size:430px 210px;pointer-events:none}.app{position:relative;z-index:1;display:grid;gap:12px;max-width:760px;margin:auto}.panel,.nav,.mini{border-radius:28px;background:rgba(255,255,255,.23);border:1px solid rgba(255,255,255,.36);box-shadow:0 14px 30px rgba(86,44,126,.15);backdrop-filter:blur(18px)}.top{padding:15px}.brand{font-size:15px;font-weight:900;letter-spacing:.16em}.themes{display:flex;gap:9px;margin-top:14px;overflow-x:auto}.theme{border:0;border-radius:999px;padding:10px 15px;background:rgba(255,255,255,.25);color:#fff;font-size:15px;font-weight:900;white-space:nowrap}.theme.on{background:linear-gradient(135deg,var(--a),var(--b))}.hero{position:relative;padding:25px 24px 23px;min-height:330px;overflow:hidden}.hero:after{content:var(--icon);position:absolute;right:24px;top:25px;font-size:46px}.hero:before{content:"♡ ✦ ✧";position:absolute;right:22px;bottom:20px;font-size:18px;letter-spacing:6px;opacity:.68}.mark{width:74px;height:74px;border-radius:24px;display:grid;place-items:center;background:rgba(255,255,255,.24);font-size:37px;margin-bottom:20px}.kicker{display:inline-block;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.18);font-size:11px;font-weight:900;letter-spacing:.12em;margin-bottom:17px}.hero h1{font-size:37px;line-height:1.16;font-weight:900}.desc{font-size:16px;line-height:1.58;margin-top:16px;font-weight:750;max-width:92%}.info{padding:19px 23px}.label{font-size:15px;font-weight:900;opacity:.85;margin-bottom:9px}.value{font-size:22px;font-weight:900}.grid{display:grid;gap:10px}.nav{min-height:76px;padding:14px 18px;text-decoration:none;color:#fff;display:flex;align-items:center;gap:17px}.ico{width:45px;height:45px;border-radius:16px;display:grid;place-items:center;background:rgba(255,255,255,.22);font-size:25px}.txt strong{display:block;font-size:20px}.txt small{display:block;margin-top:4px;font-size:13px;font-weight:800;opacity:.84}.sub{display:grid;gap:10px}.mini{padding:15px;text-align:center;text-decoration:none;color:#fff;font-weight:900}footer{text-align:center;font-size:12px;font-weight:800;letter-spacing:.12em;padding:6px 0 10px;opacity:.78}</style></head><body data-theme="stitch"><main class="app"><section class="panel top"><div class="brand">HOUCIHU PORTAL</div><div class="themes"><button class="theme" data-theme="stitch">💙 史迪奇</button><button class="theme" data-theme="labubu">👾 Labubu</button><button class="theme" data-theme="usagi">🐰 烏薩奇</button><button class="theme" data-theme="snoopy">🐶 史努比</button><button class="theme" data-theme="disney">✨ 迪士尼</button></div></section><section class="panel hero"><div class="mark" id="themeIcon">💙</div><div class="kicker">ROLE THEME FIELD SYSTEM</div><h1>後慈湖<br>整合系統</h1><p class="desc">售票、驗票、候補、出園與人流整合入口。<br>可切換角色色系。</p></section><section class="panel info"><div class="label">入口模式</div><div class="value">一站式整合</div></section><section class="panel info"><div class="label">色系模式</div><div class="value" id="themeName">史迪奇</div></section><section class="grid"><a class="nav" href="https://cihu2026.github.io/Pos/issue.html"><div class="ico">🎟️</div><div class="txt"><strong>售票</strong><small>POS 櫃台</small></div></a><a class="nav" href="https://cihu2026.github.io/ticket-scan/"><div class="ico">📱</div><div class="txt"><strong>驗票</strong><small>B 點 QR</small></div></a><a class="nav" href="https://cihu2026.github.io/houcihu-onsite-waitlist-system/"><div class="ico">📝</div><div class="txt"><strong>候補</strong><small>登記叫號</small></div></a><a class="nav" href="https://cihu2026.github.io/Out/"><div class="ico">🚪</div><div class="txt"><strong>出園</strong><small>A 點離園</small></div></a><a class="nav" href="https://cihu2026.github.io/Monitor/"><div class="ico">📊</div><div class="txt"><strong>人流</strong><small>即時看板</small></div></a><a class="nav" href="https://cihu2026.github.io/VIP/"><div class="ico">🏛️</div><div class="txt"><strong>公務團</strong><small>接待行程</small></div></a></section><section class="sub"><a class="mini" href="https://cihu2026.github.io/houcihu-onsite-waitlist-system/admin-login.html">候補後台</a><a class="mini" href="https://cihu2026.github.io/Monitor/">即時人流</a></section><footer>Designed & Developed by Abby Luo</footer></main><script>const n={stitch:['💙','史迪奇'],labubu:['👾','Labubu'],usagi:['🐰','烏薩奇'],snoopy:['🐶','史努比'],disney:['✨','迪士尼']};function s(t){if(!n[t])t='stitch';document.body.dataset.theme=t;themeIcon.textContent=n[t][0];themeName.textContent=n[t][1];document.querySelectorAll('.theme').forEach(b=>b.classList.toggle('on',b.dataset.theme===t))}document.querySelectorAll('.theme').forEach(b=>b.onclick=()=>s(b.dataset.theme));s('stitch');</script></body></html>
