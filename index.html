<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#08143f">
<title>後慈湖整合系統｜星系美化版</title>
<style>
:root{--ink:#fff;--muted:#cbd9ff;--a:#4fdcff;--b:#123783;--c:#72efb1;--gold:#ffe66d;--rose:#ff6fa6;--line:rgba(255,255,255,.25);--glass:rgba(255,255,255,.13)}body[data-theme=labubu]{--a:#f7dba8;--b:#8a5b3a;--c:#a8ffbf;--gold:#ffe58a;--rose:#ff9bb8;--muted:#ffe0bd}body[data-theme=usagi]{--a:#ff8fbd;--b:#8c4b83;--c:#8fd9ff;--gold:#ffe38a;--rose:#ffaccf;--muted:#ffd5e9}body[data-theme=snoopy]{--a:#e5e7eb;--b:#111827;--c:#ffd166;--gold:#ffd166;--rose:#ef4444;--muted:#cbd5e1}body[data-theme=disney]{--a:#8bd9ff;--b:#6d28d9;--c:#fbbf24;--gold:#fbbf24;--rose:#f9a8d4;--muted:#efe5ff}body[data-theme=formal]{--a:#0D6E73;--b:#0B4D57;--c:#1A7F5A;--gold:#d9bf79;--rose:#C94B63;--muted:#d7f0ee}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{min-height:100svh;padding:14px;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',sans-serif;color:var(--ink);background:radial-gradient(circle at 20% 12%,rgba(79,220,255,.35),transparent 20%),radial-gradient(circle at 82% 15%,rgba(168,85,247,.28),transparent 22%),radial-gradient(circle at 72% 78%,rgba(255,111,166,.18),transparent 22%),linear-gradient(180deg,#030713,#08102e 46%,#121b49);overflow-x:hidden}body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(2px 2px at 24px 32px,rgba(255,255,255,.95),transparent),radial-gradient(1.5px 1.5px at 118px 84px,rgba(255,255,255,.8),transparent),radial-gradient(2px 2px at 230px 146px,rgba(255,255,255,.72),transparent),radial-gradient(1.5px 1.5px at 360px 48px,rgba(255,255,255,.8),transparent),radial-gradient(2px 2px at 500px 130px,rgba(255,255,255,.76),transparent);background-size:560px 220px;opacity:.72}.app{position:relative;z-index:1;max-width:980px;margin:auto;display:grid;gap:13px}.top,.hero,.mini{background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.08));border:1px solid var(--line);box-shadow:0 20px 52px rgba(0,0,0,.28);backdrop-filter:blur(16px)}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 13px;border-radius:26px}.brand{font-size:12px;font-weight:900;letter-spacing:.16em;color:var(--muted)}.themes{display:flex;gap:7px;overflow-x:auto}.theme{border:1px solid var(--line);border-radius:999px;padding:8px 10px;background:rgba(255,255,255,.12);color:var(--ink);font-size:12px;font-weight:900;white-space:nowrap}.theme.on{background:linear-gradient(135deg,var(--a),var(--b));color:#fff}.hero{position:relative;overflow:hidden;border-radius:32px;padding:24px;background:linear-gradient(135deg,rgba(7,12,35,.84),rgba(18,55,131,.7));min-height:154px}.hero:after{content:"";position:absolute;right:-80px;bottom:-110px;width:310px;height:220px;border-radius:50%;background:rgba(255,255,255,.1)}.hero-row{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center;gap:12px}.titlebox{display:flex;align-items:center;gap:15px}.emblem{width:64px;height:64px;border-radius:22px;display:grid;place-items:center;background:rgba(255,255,255,.15);border:1px solid var(--line);font-size:31px;box-shadow:0 0 26px rgba(79,220,255,.22)}.kicker{color:#e8f1ff;font-size:11px;font-weight:900;letter-spacing:.2em;margin-bottom:5px}.hero h1{font-size:clamp(31px,5vw,48px);line-height:1.04;font-weight:900}.subtitle{color:#e7edff;font-size:13px;font-weight:800;margin-top:7px}.tag{padding:9px 14px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.12);font-size:13px;font-weight:900;white-space:nowrap}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.nav{min-height:104px;padding:16px 17px;border-radius:28px;text-decoration:none;color:#fff;background:linear-gradient(135deg,var(--a),var(--b));box-shadow:0 15px 30px rgba(0,0,0,.22);display:flex;align-items:center;gap:15px;position:relative;overflow:hidden}.nav:after{content:"›";position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:30px;font-weight:900;opacity:.9}.ico{position:relative;z-index:1;width:56px;height:56px;border-radius:19px;display:grid;place-items:center;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.16);font-size:30px}.txt{position:relative;z-index:1;padding-right:24px}.txt strong{display:block;font-size:22px;letter-spacing:.03em}.txt small{display:block;margin-top:5px;color:rgba(255,255,255,.86);font-size:12px;font-weight:800}.ticket{background:linear-gradient(135deg,var(--c),var(--a))}.scan{background:linear-gradient(135deg,#2563eb,var(--a))}.wait{background:linear-gradient(135deg,#0f766e,var(--c))}.out{background:linear-gradient(135deg,#be5869,var(--rose))}.stats{background:linear-gradient(135deg,var(--gold),#b7791f)}.vip{background:linear-gradient(135deg,#6d28d9,#c084fc)}.subrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mini{padding:14px;border-radius:23px;text-align:center;text-decoration:none;color:var(--ink);font-size:14px;font-weight:900}footer{text-align:center;color:#d6def8;font-size:10px;letter-spacing:.12em;padding-bottom:3px}@media(max-width:720px){body{padding:10px}.app{gap:12px}.top{align-items:flex-start;flex-direction:column;border-radius:24px}.themes{width:100%;gap:7px}.hero{padding:21px 18px;border-radius:29px}.hero-row{align-items:flex-start;flex-direction:column}.emblem{width:62px;height:62px}.hero h1{font-size:clamp(31px,9vw,42px)}.tag{display:none}.grid{grid-template-columns:1fr;gap:10px}.nav{min-height:88px;padding:14px 16px;border-radius:24px}.ico{width:48px;height:48px;font-size:28px;border-radius:17px}.txt strong{font-size:20px}.txt small{font-size:12px}.subrow{grid-template-columns:1fr 1fr}.mini{padding:13px}}@media(max-width:390px){.nav{min-height:84px;padding:13px 14px;border-radius:22px}.txt strong{font-size:19px}.ico{width:45px;height:45px;font-size:27px}.subrow{grid-template-columns:1fr}}
</style>
</head>
<body data-theme="stitch">
<main class="app"><nav class="top"><div class="brand">HOUCIHU POS</div><div class="themes"><button class="theme" data-theme="stitch">💙史迪奇</button><button class="theme" data-theme="labubu">👾拉布布</button><button class="theme" data-theme="usagi">🐰烏薩奇</button><button class="theme" data-theme="snoopy">🐶史努比</button><button class="theme" data-theme="disney">✨迪士尼</button><button class="theme" data-theme="formal">湖畔</button></div></nav><section class="hero"><div class="hero-row"><div class="titlebox"><div class="emblem" id="themeIcon">💙</div><div><div class="kicker" id="themeKicker">STITCH GALAXY</div><h1>後慈湖整合系統</h1><p class="subtitle">星系主題・質感快速入口</p></div></div><div class="tag" id="themeName">史迪奇深藍</div></div></section><section class="grid"><a class="nav ticket" href="https://cihu2026.github.io/Pos/issue.html"><div class="ico">🎟️</div><div class="txt"><strong>售票</strong><small>POS 櫃台</small></div></a><a class="nav scan" href="https://cihu2026.github.io/ticket-scan/"><div class="ico">📱</div><div class="txt"><strong>驗票</strong><small>B 點 QR</small></div></a><a class="nav wait" href="https://cihu2026.github.io/houcihu-onsite-waitlist-system/"><div class="ico">📝</div><div class="txt"><strong>候補</strong><small>登記叫號</small></div></a><a class="nav out" href="https://cihu2026.github.io/Out/"><div class="ico">🚪</div><div class="txt"><strong>出園</strong><small>A 點離園</small></div></a><a class="nav stats" href="https://cihu2026.github.io/Monitor/"><div class="ico">📊</div><div class="txt"><strong>人流</strong><small>即時看板</small></div></a><a class="nav vip" href="https://cihu2026.github.io/VIP/"><div class="ico">🏛️</div><div class="txt"><strong>公務團</strong><small>接待行程</small></div></a></section><section class="subrow"><a class="mini" href="https://cihu2026.github.io/houcihu-onsite-waitlist-system/admin-login.html">候補後台</a><a class="mini" href="https://cihu2026.github.io/Monitor/">即時人流</a></section><footer>POS GALAXY PREMIUM PORTAL｜Designed & Developed by Abby Luo</footer></main>
<script>
var THEME_INFO={formal:{icon:'湖',name:'湖畔霧青',kicker:'PREMIUM GALAXY'},stitch:{icon:'💙',name:'史迪奇深藍',kicker:'STITCH GALAXY'},labubu:{icon:'👾',name:'Labubu 奶咖',kicker:'LABUBU GALAXY'},usagi:{icon:'🐰',name:'烏薩奇米粉',kicker:'USAGI GALAXY'},snoopy:{icon:'🐶',name:'史努比石墨',kicker:'SNOOPY GALAXY'},disney:{icon:'✨',name:'迪士尼紫金',kicker:'MAGIC GALAXY'}};function normalizeTheme(t){return t==='doraemon'||t==='chiikawa'?'usagi':(t==='lake'?'stitch':(THEME_INFO[t]?t:'stitch'))}function setTheme(t){var n=normalizeTheme(t);document.body.dataset.theme=n;try{localStorage.setItem('houcihu_pos_theme',n)}catch(e){}document.querySelectorAll('.theme').forEach(function(b){b.classList.toggle('on',b.dataset.theme===n)});document.getElementById('themeIcon').textContent=THEME_INFO[n].icon;document.getElementById('themeName').textContent=THEME_INFO[n].name;document.getElementById('themeKicker').textContent=THEME_INFO[n].kicker;document.querySelector('meta[name="theme-color"]').setAttribute('content',n==='formal'?'#0D6E73':'#08143f')}document.querySelectorAll('.theme').forEach(function(b){b.onclick=function(){setTheme(b.dataset.theme)}});try{setTheme(localStorage.getItem('houcihu_pos_theme')||'stitch')}catch(e){setTheme('stitch')}
</script>
</body>
</html>
