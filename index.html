<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#8e7bff">
<title>後慈湖整合系統｜舊版角色星空入口</title>
<style>
:root{--bg1:#3d2f86;--bg2:#8e7bff;--card:rgba(255,255,255,.19);--line:rgba(255,255,255,.32);--text:#fff;--soft:rgba(255,255,255,.78);--a:#4f8dff;--b:#7ad7ff;--shadow:0 18px 46px rgba(32,15,65,.32);--icon:"💙"}
body[data-theme=stitch]{--bg1:#3d2f86;--bg2:#8e7bff;--a:#4f8dff;--b:#7ad7ff;--icon:"💙"}
body[data-theme=labubu]{--bg1:#6b422c;--bg2:#d9a875;--a:#f2bd83;--b:#ffe4ba;--icon:"👾"}
body[data-theme=usagi]{--bg1:#7c3d76;--bg2:#e4a4c7;--a:#ff9ad5;--b:#ffe7f5;--icon:"🐰"}
body[data-theme=snoopy]{--bg1:#343a46;--bg2:#9aa4b2;--a:#7c8798;--b:#e5ebf3;--icon:"🐶"}
body[data-theme=disney]{--bg1:#503095;--bg2:#b28cff;--a:#8f63ff;--b:#ffd76d;--icon:"✨"}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{min-height:100svh;padding:14px;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',sans-serif;color:var(--text);background:radial-gradient(circle at 16% 10%,rgba(255,255,255,.28),transparent 18%),radial-gradient(circle at 86% 14%,rgba(255,255,255,.18),transparent 22%),radial-gradient(circle at 74% 76%,rgba(255,210,250,.17),transparent 26%),radial-gradient(circle at 20% 82%,rgba(122,215,255,.14),transparent 24%),linear-gradient(180deg,var(--bg2),var(--bg1));overflow-x:hidden;position:relative}body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(3px 3px at 32px 42px,rgba(255,255,255,.95),transparent 60%),radial-gradient(2px 2px at 116px 82px,rgba(255,255,255,.8),transparent 60%),radial-gradient(3px 3px at 205px 145px,rgba(255,255,255,.72),transparent 60%),radial-gradient(2px 2px at 295px 58px,rgba(255,255,255,.82),transparent 60%),radial-gradient(3px 3px at 418px 132px,rgba(255,255,255,.7),transparent 60%),radial-gradient(2px 2px at 520px 90px,rgba(255,255,255,.78),transparent 60%);background-size:560px 240px;opacity:.9;z-index:0}body:after{content:"✦     ✧       ✦      ✧        ✦";position:fixed;left:20px;right:20px;top:86px;pointer-events:none;color:rgba(255,255,255,.72);font-size:26px;letter-spacing:16px;white-space:nowrap;text-shadow:0 0 14px rgba(255,255,255,.75);opacity:.9;z-index:0}.app{position:relative;z-index:1;max-width:760px;margin:auto;display:grid;gap:16px}.panel{background:linear-gradient(180deg,rgba(255,255,255,.24),rgba(255,255,255,.12));border:1px solid rgba(255,255,255,.30);box-shadow:0 18px 46px rgba(32,15,65,.34),inset 0 1px 0 rgba(255,255,255,.22);backdrop-filter:blur(22px);border-radius:34px}.top{padding:18px 20px}.brand{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:900;letter-spacing:.18em}.dot{width:28px;height:28px;border-radius:50%;background:var(--a);box-shadow:0 0 24px var(--a),0 0 42px rgba(255,255,255,.24)}.themes{display:flex;gap:10px;margin-top:16px;overflow-x:auto}.theme{border:1px solid rgba(255,255,255,.30);border-radius:999px;padding:12px 18px;background:rgba(255,255,255,.16);color:#fff;font-size:17px;font-weight:900;white-space:nowrap;box-shadow:0 8px 22px rgba(0,0,0,.1)}.theme.on{background:linear-gradient(135deg,var(--a),var(--b));box-shadow:0 10px 26px rgba(0,0,0,.18),0 0 18px rgba(255,255,255,.18)}.hero{padding:34px 34px 30px;min-height:430px;position:relative;overflow:hidden;background:radial-gradient(circle at 20% 18%,rgba(255,255,255,.16),transparent 26%),radial-gradient(circle at 88% 26%,rgba(255,255,255,.12),transparent 22%),linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02))}.hero:before{content:"STAR CUTE V9";position:absolute;right:28px;bottom:28px;padding:9px 15px;border-radius:999px;border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.14);font-size:12px;font-weight:900;letter-spacing:.14em;color:rgba(255,255,255,.82)}.hero:after{content:var(--icon);position:absolute;right:38px;top:40px;font-size:66px;opacity:.9;text-shadow:0 0 22px rgba(255,255,255,.42)}.mark{width:112px;height:112px;border-radius:36px;display:grid;place-items:center;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.26);font-size:52px;margin-bottom:34px;box-shadow:0 10px 28px rgba(0,0,0,.14)}.kicker{display:inline-block;padding:12px 24px;border-radius:999px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.24);font-size:18px;font-weight:900;letter-spacing:.16em;margin-bottom:24px}.hero h1{font-size:52px;line-height:1.22;font-weight:900;letter-spacing:.03em;text-shadow:0 6px 22px rgba(0,0,0,.18)}.desc{margin-top:28px;color:rgba(255,255,255,.90);font-size:24px;font-weight:750;line-height:1.75}.info{padding:26px 34px}.label{color:var(--soft);font-size:18px;font-weight:900;margin-bottom:10px}.value{font-size:26px;font-weight:900}.grid{display:grid;gap:12px}.nav{min-height:92px;padding:20px 24px;border-radius:28px;text-decoration:none;color:#fff;background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.11));border:1px solid rgba(255,255,255,.28);box-shadow:0 14px 34px rgba(43,18,63,.24);display:flex;align-items:center;gap:18px}.ico{width:54px;height:54px;border-radius:18px;display:grid;place-items:center;background:rgba(255,255,255,.20);font-size:30px;box-shadow:inset 0 1px 0 rgba(255,255,255,.2)}.txt strong{display:block;font-size:24px}.txt small{display:block;margin-top:4px;color:rgba(255,255,255,.80);font-size:15px;font-weight:800}.sub{display:grid;grid-template-columns:1fr 1fr;gap:12px}.mini{padding:17px;border-radius:24px;text-align:center;text-decoration:none;color:#fff;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.24);font-weight:900;box-shadow:0 12px 30px rgba(43,18,63,.18)}footer{text-align:center;color:rgba(255,255,255,.75);font-size:12px;font-weight:800;letter-spacing:.12em;padding:6px 0 10px}@media(max-width:520px){body{padding:10px}body:after{font-size:22px;letter-spacing:10px;top:92px}.app{gap:14px}.top{padding:17px}.brand{font-size:16px}.theme{font-size:16px;padding:11px 16px}.hero{padding:34px 34px 28px;min-height:650px}.hero:after{right:34px;top:40px;font-size:60px}.hero:before{right:24px;bottom:24px}.mark{width:106px;height:106px;font-size:50px;margin-bottom:34px}.kicker{font-size:16px}.hero h1{font-size:50px}.desc{font-size:22px}.grid{gap:11px}.nav{min-height:88px}.txt strong{font-size:22px}.sub{grid-template-columns:1fr}}
</style>
</head>
<body data-theme="stitch">
<main class="app">
  <section class="panel top"><div class="brand"><span class="dot"></span>HOUCIHU PORTAL</div><div class="themes"><button class="theme" data-theme="stitch">💙 史迪奇</button><button class="theme" data-theme="labubu">👾 Labubu</button><button class="theme" data-theme="usagi">🐰 烏薩奇</button><button class="theme" data-theme="snoopy">🐶 史努比</button><button class="theme" data-theme="disney">✨ 迪士尼</button></div></section>
  <section class="panel hero"><div class="mark" id="themeIcon">💙</div><div class="kicker">ROLE THEME FIELD SYSTEM</div><h1>後慈湖<br>整合系統</h1><p class="desc">售票、驗票、候補、出園與即時人流整合入口。<br>可切換史迪奇、Labubu、烏薩奇、史努比、迪士尼等角色感色系。</p></section>
  <section class="panel info"><div class="label">入口模式</div><div class="value">一站式整合</div></section>
  <section class="panel info"><div class="label">色系模式</div><div class="value" id="themeName">史迪奇</div></section>
  <section class="grid"><a class="nav" href="https://cihu2026.github.io/Pos/issue.html"><div class="ico">🎟️</div><div class="txt"><strong>售票</strong><small>POS 櫃台</small></div></a><a class="nav" href="https://cihu2026.github.io/ticket-scan/"><div class="ico">📱</div><div class="txt"><strong>驗票</strong><small>B 點 QR</small></div></a><a class="nav" href="https://cihu2026.github.io/houcihu-onsite-waitlist-system/"><div class="ico">📝</div><div class="txt"><strong>候補</strong><small>登記叫號</small></div></a><a class="nav" href="https://cihu2026.github.io/Out/"><div class="ico">🚪</div><div class="txt"><strong>出園</strong><small>A 點離園</small></div></a><a class="nav" href="https://cihu2026.github.io/Monitor/"><div class="ico">📊</div><div class="txt"><strong>人流</strong><small>即時看板</small></div></a><a class="nav" href="https://cihu2026.github.io/VIP/"><div class="ico">🏛️</div><div class="txt"><strong>公務團</strong><small>接待行程</small></div></a></section>
  <section class="sub"><a class="mini" href="https://cihu2026.github.io/houcihu-onsite-waitlist-system/admin-login.html">候補後台</a><a class="mini" href="https://cihu2026.github.io/Monitor/">即時人流</a></section><footer>Designed & Developed by Abby Luo</footer>
</main>
<script>
const info={stitch:['💙','史迪奇'],labubu:['👾','Labubu'],usagi:['🐰','烏薩奇'],snoopy:['🐶','史努比'],disney:['✨','迪士尼']};
function setTheme(t){if(!info[t])t='stitch';document.body.dataset.theme=t;document.getElementById('themeIcon').textContent=info[t][0];document.getElementById('themeName').textContent=info[t][1];document.querySelectorAll('.theme').forEach(b=>b.classList.toggle('on',b.dataset.theme===t));try{localStorage.setItem('houcihu_portal_old_theme',t)}catch(e){}}
document.querySelectorAll('.theme').forEach(b=>b.onclick=()=>setTheme(b.dataset.theme));setTheme(localStorage.getItem('houcihu_portal_old_theme')||'stitch');
</script>
</body>
</html>
