<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#08143f">
<title>後慈湖整合系統｜POS Quick</title>
<style>
:root{--ink:#18343a;--muted:#6f8588;--paper:#fffdf8;--mist:#eef6f3;--a:#0D6E73;--b:#0B4D57;--c:#1A7F5A;--gold:#B58A45;--rose:#C94B63;--line:#d9e8e4;--shadow:0 18px 48px rgba(15,79,95,.14);--icon:"湖"}
body[data-theme=stitch]{--ink:#f7fbff;--muted:#cbd9ff;--paper:rgba(255,255,255,.13);--mist:#07133a;--a:#4fdcff;--b:#123783;--c:#72efb1;--gold:#ffe66d;--rose:#ff6fa6;--line:rgba(139,214,255,.34);--shadow:0 22px 58px rgba(5,10,38,.32);--icon:"💙"}
body[data-theme=labubu]{--ink:#fff7ea;--muted:#ffe0bd;--paper:rgba(255,248,235,.14);--mist:#2f211a;--a:#f7dba8;--b:#8a5b3a;--c:#a8ffbf;--gold:#ffe58a;--rose:#ff9bb8;--line:rgba(255,232,199,.42);--shadow:0 22px 58px rgba(47,33,26,.34);--icon:"👾"}
body[data-theme=usagi]{--ink:#553041;--muted:#976778;--paper:rgba(255,253,246,.88);--mist:#fff8ed;--a:#ff8fbd;--b:#ffd8ec;--c:#47c985;--gold:#ffe38a;--rose:#ffaccf;--line:rgba(255,155,196,.46);--shadow:0 20px 46px rgba(255,143,189,.16);--icon:"🐰"}
body[data-theme=snoopy]{--ink:#111827;--muted:#475569;--paper:#fff;--mist:#f8fafc;--a:#111827;--b:#334155;--c:#22c55e;--gold:#ffd166;--rose:#ef4444;--line:rgba(15,23,42,.18);--shadow:0 20px 46px rgba(15,23,42,.12);--icon:"🐶"}
body[data-theme=disney]{--ink:#fff;--muted:#efe5ff;--paper:rgba(255,255,255,.14);--mist:#130b3f;--a:#8bd9ff;--b:#6d28d9;--c:#a7f3d0;--gold:#fbbf24;--rose:#f9a8d4;--line:rgba(251,191,36,.35);--shadow:0 22px 58px rgba(19,11,63,.34);--icon:"✨"}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{min-height:100svh;padding:14px;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',sans-serif;color:var(--ink);background:radial-gradient(circle at 10% 6%,color-mix(in srgb,var(--a) 24%,transparent),transparent 30%),radial-gradient(circle at 90% 8%,color-mix(in srgb,var(--gold) 18%,transparent),transparent 28%),linear-gradient(180deg,#f9fcfa,var(--mist));overflow-x:hidden}body[data-theme=stitch],body[data-theme=labubu],body[data-theme=disney]{background:radial-gradient(circle at 10% 6%,color-mix(in srgb,var(--a) 30%,transparent),transparent 30%),radial-gradient(circle at 88% 4%,color-mix(in srgb,var(--gold) 18%,transparent),transparent 28%),linear-gradient(145deg,var(--mist),var(--b) 58%,#050817)}.app{max-width:980px;margin:auto;min-height:calc(100svh - 28px);display:grid;grid-template-rows:auto auto 1fr auto;gap:12px}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-radius:24px;background:color-mix(in srgb,var(--paper) 92%,transparent);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(16px)}.brand{font-weight:900;letter-spacing:.14em;font-size:12px;color:var(--muted)}.themes{display:flex;gap:6px;overflow-x:auto}.theme{border:1px solid var(--line);border-radius:999px;padding:7px 9px;background:rgba(255,255,255,.16);color:var(--ink);font-weight:900;white-space:nowrap;font-size:12px}.theme.on{background:linear-gradient(135deg,var(--a),var(--b));color:#fff}.hero{position:relative;overflow:hidden;border-radius:30px;padding:22px;background:linear-gradient(135deg,var(--b),var(--a));color:#fff;box-shadow:var(--shadow)}.hero:after{content:"";position:absolute;right:-80px;bottom:-100px;width:290px;height:210px;border-radius:50%;background:rgba(255,255,255,.13)}.hero-row{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:12px}.titlebox{display:flex;align-items:center;gap:14px}.emblem{width:58px;height:58px;border-radius:19px;display:grid;place-items:center;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.28);font-size:27px}.kicker{color:#e8f8f5;font-size:11px;font-weight:900;letter-spacing:.18em;margin-bottom:4px}.hero h1{font-size:clamp(28px,5vw,46px);line-height:1.05;font-weight:900}.subtitle{color:#e5f6f2;font-weight:750;font-size:13px;margin-top:7px}.tag{padding:9px 13px;border-radius:999px;border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.13);font-weight:900;white-space:nowrap}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.nav{min-height:116px;padding:16px;border-radius:28px;text-decoration:none;color:#fff;background:linear-gradient(135deg,var(--a),var(--b));box-shadow:0 14px 28px rgba(0,0,0,.15);display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}.nav:after{content:"";position:absolute;right:-42px;bottom:-58px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.18)}.ico{position:relative;z-index:1;font-size:31px}.txt{position:relative;z-index:1}.txt strong{display:block;font-size:21px}.txt small{display:block;margin-top:4px;color:rgba(255,255,255,.86);font-weight:800}.ticket{background:linear-gradient(135deg,var(--c),var(--a))}.scan{background:linear-gradient(135deg,#2563eb,var(--a))}.wait{background:linear-gradient(135deg,#0f766e,var(--c))}.out{background:linear-gradient(135deg,#be5869,var(--rose))}.stats{background:linear-gradient(135deg,var(--gold),#b7791f)}.vip{background:linear-gradient(135deg,#6d28d9,#c084fc)}.subrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mini{padding:13px;border-radius:22px;text-align:center;text-decoration:none;color:var(--ink);font-weight:900;border:1px solid var(--line);background:color-mix(in srgb,var(--paper) 92%,transparent);box-shadow:var(--shadow)}footer{text-align:center;color:var(--muted);font-size:11px;letter-spacing:.1em}@media(max-width:720px){body{padding:10px}.app{min-height:calc(100svh - 20px);gap:10px}.top{align-items:flex-start;flex-direction:column}.themes{width:100%}.hero{padding:18px;border-radius:26px}.hero-row{align-items:flex-start;flex-direction:column}.tag{display:none}.grid{grid-template-columns:repeat(2,1fr);gap:10px}.nav{min-height:104px;padding:14px;border-radius:24px}.txt strong{font-size:18px}.subrow{grid-template-columns:1fr 1fr}}@media(max-width:390px){.grid{grid-template-columns:1fr}.nav{min-height:92px}.subrow{grid-template-columns:1fr}}</style>
</head>
<body data-theme="stitch">
<main class="app">
  <nav class="top"><div class="brand">HOUCIHU POS</div><div class="themes"><button class="theme" data-theme="stitch">💙史迪奇</button><button class="theme" data-theme="labubu">👾拉布布</button><button class="theme" data-theme="usagi">🐰烏薩奇</button><button class="theme" data-theme="snoopy">🐶史努比</button><button class="theme" data-theme="disney">✨迪士尼</button><button class="theme" data-theme="formal">湖畔</button></div></nav>
  <section class="hero"><div class="hero-row"><div class="titlebox"><div class="emblem" id="themeIcon">💙</div><div><div class="kicker" id="themeKicker">STITCH DEEP BLUE</div><h1>後慈湖整合系統</h1><p class="subtitle">現場作業快速入口</p></div></div><div class="tag" id="themeName">史迪奇深藍</div></div></section>
  <section class="grid">
    <a class="nav ticket" href="https://cihu2026.github.io/Pos/issue.html"><div class="ico">🎟️</div><div class="txt"><strong>售票</strong><small>POS 櫃台</small></div></a>
    <a class="nav scan" href="https://cihu2026.github.io/ticket-scan/"><div class="ico">📱</div><div class="txt"><strong>驗票</strong><small>B 點 QR</small></div></a>
    <a class="nav wait" href="https://cihu2026.github.io/houcihu-onsite-waitlist-system/"><div class="ico">📝</div><div class="txt"><strong>候補</strong><small>登記叫號</small></div></a>
    <a class="nav out" href="https://cihu2026.github.io/Out/"><div class="ico">🚪</div><div class="txt"><strong>出園</strong><small>A 點離園</small></div></a>
    <a class="nav stats" href="https://cihu2026.github.io/Monitor/"><div class="ico">📊</div><div class="txt"><strong>人流</strong><small>即時看板</small></div></a>
    <a class="nav vip" href="https://cihu2026.github.io/VIP/"><div class="ico">🏛️</div><div class="txt"><strong>公務團</strong><small>接待行程</small></div></a>
  </section>
  <section class="subrow"><a class="mini" href="https://cihu2026.github.io/houcihu-onsite-waitlist-system/admin-login.html">候補後台</a><a class="mini" href="https://cihu2026.github.io/Monitor/">即時人流</a></section>
  <footer>POS QUICK PORTAL｜Designed & Developed by Abby Luo</footer>
</main>
<script>
var THEME_INFO={formal:{icon:'湖',name:'湖畔霧青',kicker:'PREMIUM LAKE'},stitch:{icon:'💙',name:'史迪奇深藍',kicker:'STITCH DEEP BLUE'},labubu:{icon:'👾',name:'Labubu 奶咖',kicker:'LABUBU CREAM'},usagi:{icon:'🐰',name:'烏薩奇米粉',kicker:'USAGI CREAM'},snoopy:{icon:'🐶',name:'史努比石墨',kicker:'SNOOPY GRAPHITE'},disney:{icon:'✨',name:'迪士尼紫金',kicker:'MAGIC GOLD'}};
function normalizeTheme(t){return t==='doraemon'||t==='chiikawa'?'usagi':(t==='lake'?'stitch':(THEME_INFO[t]?t:'stitch'))}
function setTheme(t){var next=normalizeTheme(t);document.body.dataset.theme=next;try{localStorage.setItem('houcihu_pos_theme',next)}catch(e){}document.querySelectorAll('.theme').forEach(function(b){b.classList.toggle('on',b.dataset.theme===next)});document.getElementById('themeIcon').textContent=THEME_INFO[next].icon;document.getElementById('themeName').textContent=THEME_INFO[next].name;document.getElementById('themeKicker').textContent=THEME_INFO[next].kicker;document.querySelector('meta[name="theme-color"]').setAttribute('content',next==='formal'?'#0D6E73':'#08143f')}
document.querySelectorAll('.theme').forEach(function(b){b.onclick=function(){setTheme(b.dataset.theme)}});try{setTheme(localStorage.getItem('houcihu_pos_theme')||'stitch')}catch(e){setTheme('stitch')}
</script>
</body>
</html>
