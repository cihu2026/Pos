<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#08143f">
<title>後慈湖整合系統｜星系長方版</title>
<style>
:root{--ink:#fff;--muted:#cbd9ff;--a:#4fdcff;--b:#123783;--c:#72efb1;--gold:#ffe66d;--rose:#ff6fa6;--line:rgba(255,255,255,.24);--glass:rgba(255,255,255,.12)}body[data-theme=labubu]{--a:#f7dba8;--b:#8a5b3a;--c:#a8ffbf;--gold:#ffe58a;--rose:#ff9bb8;--muted:#ffe0bd}body[data-theme=usagi]{--a:#ff8fbd;--b:#8c4b83;--c:#8fd9ff;--gold:#ffe38a;--rose:#ffaccf;--muted:#ffd5e9}body[data-theme=snoopy]{--a:#e5e7eb;--b:#111827;--c:#ffd166;--gold:#ffd166;--rose:#ef4444;--muted:#cbd5e1}body[data-theme=disney]{--a:#8bd9ff;--b:#6d28d9;--c:#fbbf24;--gold:#fbbf24;--rose:#f9a8d4;--muted:#efe5ff}body[data-theme=formal]{--a:#0D6E73;--b:#0B4D57;--c:#1A7F5A;--gold:#d9bf79;--rose:#C94B63;--muted:#d7f0ee}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{min-height:100svh;padding:14px;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',sans-serif;color:var(--ink);background:radial-gradient(circle at 18% 14%,rgba(79,220,255,.32),transparent 18%),radial-gradient(circle at 78% 12%,rgba(168,85,247,.24),transparent 20%),radial-gradient(circle at 70% 72%,rgba(255,111,166,.17),transparent 20%),linear-gradient(180deg,#040816,#0a1030 45%,#121b49);overflow-x:hidden}body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(2px 2px at 22px 30px,rgba(255,255,255,.95),transparent),radial-gradient(1.5px 1.5px at 120px 80px,rgba(255,255,255,.85),transparent),radial-gradient(2px 2px at 230px 145px,rgba(255,255,255,.8),transparent),radial-gradient(1.5px 1.5px at 360px 48px,rgba(255,255,255,.82),transparent),radial-gradient(2px 2px at 500px 130px,rgba(255,255,255,.78),transparent);background-size:560px 220px;opacity:.75}.app{position:relative;z-index:1;max-width:980px;margin:auto;display:grid;gap:12px}.top,.hero,.mini{background:var(--glass);border:1px solid var(--line);box-shadow:0 18px 48px rgba(0,0,0,.24);backdrop-filter:blur(14px)}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-radius:24px}.brand{font-size:12px;font-weight:900;letter-spacing:.14em;color:var(--muted)}.themes{display:flex;gap:6px;overflow-x:auto}.theme{border:1px solid var(--line);border-radius:999px;padding:7px 9px;background:rgba(255,255,255,.12);color:var(--ink);font-size:12px;font-weight:900;white-space:nowrap}.theme.on{background:linear-gradient(135deg,var(--a),var(--b));color:#fff}.hero{position:relative;overflow:hidden;border-radius:30px;padding:22px;background:linear-gradient(135deg,rgba(10,16,48,.78),rgba(18,55,131,.68))}.hero:after{content:"";position:absolute;right:-80px;bottom:-100px;width:290px;height:210px;border-radius:50%;background:rgba(255,255,255,.08)}.hero-row{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center;gap:12px}.titlebox{display:flex;align-items:center;gap:14px}.emblem{width:58px;height:58px;border-radius:19px;display:grid;place-items:center;background:rgba(255,255,255,.14);border:1px solid var(--line);font-size:29px}.kicker{color:#e8f1ff;font-size:11px;font-weight:900;letter-spacing:.18em;margin-bottom:4px}.hero h1{font-size:clamp(29px,5vw,46px);line-height:1.04;font-weight:900}.subtitle{color:#e5ecff;font-size:13px;font-weight:750;margin-top:7px}.tag{padding:9px 13px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.12);font-size:13px;font-weight:900;white-space:nowrap}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.nav{min-height:116px;padding:16px;border-radius:28px;text-decoration:none;color:#fff;background:linear-gradient(135deg,var(--a),var(--b));box-shadow:0 14px 28px rgba(0,0,0,.18);display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}.nav:after{content:"";position:absolute;right:-42px;bottom:-58px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.18)}.ico,.txt{position:relative;z-index:1}.ico{font-size:31px}.txt strong{display:block;font-size:21px}.txt small{display:block;margin-top:4px;color:rgba(255,255,255,.86);font-size:12px;font-weight:800}.ticket{background:linear-gradient(135deg,var(--c),var(--a))}.scan{background:linear-gradient(135deg,#2563eb,var(--a))}.wait{background:linear-gradient(135deg,#0f766e,var(--c))}.out{background:linear-gradient(135deg,#be5869,var(--rose))}.stats{background:linear-gradient(135deg,var(--gold),#b7791f)}.vip{background:linear-gradient(135deg,#6d28d9,#c084fc)}.subrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mini{padding:13px;border-radius:22px;text-align:center;text-decoration:none;color:var(--ink);font-size:14px;font-weight:900}footer{text-align:center;color:#d6def8;font-size:10px;letter-spacing:.1em;padding-bottom:2px}@media(max-width:720px){body{padding:10px}.app{gap:12px}.top{align-items:flex-start;flex-direction:column}.themes{width:100%;gap:7px}.theme{padding:8px 10px}.hero{padding:20px 18px;border-radius:28px}.hero-row{align-items:flex-start;flex-direction:column}.emblem{width:62px;height:62px;font-size:31px}.hero h1{font-size:clamp(31px,9vw,42px)}.tag{display:none}.grid{grid-template-columns:1fr;gap:10px}.nav{min-height:86px;padding:14px 16px;border-radius:24px;flex-direction:row;align-items:center;justify-content:flex-start;gap:15px}.nav:after{right:-38px;bottom:-72px;width:130px;height:130px}.ico{font-size:31px;width:48px;text-align:center}.txt strong{font-size:20px}.txt small{font-size:12px}.subrow{grid-template-columns:1fr 1fr}.mini{padding:13px}}@media(max-width:390px){.grid{grid-template-columns:1fr}.nav{min-height:82px;padding:13px 15px;border-radius:23px}.txt strong{font-size:19px}.ico{font-size:29px;width:45px}.subrow{grid-template-columns:1fr}}
</style>
</head>
<body data-theme="stitch">
<main class="app">
<nav class="top"><div class="brand">HOUCIHU POS</div><div class="themes"><button class="theme" data-theme="stitch">💙史迪奇</button><button class="theme" data-theme="labubu">👾拉布布</button><button class="theme" data-theme="usagi">🐰烏薩奇</button><button class="theme" data-theme="snoopy">🐶史努比</button><button class="theme" data-theme="disney">✨迪士尼</button><button class="theme" data-theme="formal">湖畔</button></div></nav>
<section class="hero"><div class="hero-row"><div class="titlebox"><div class="emblem" id="themeIcon">💙</div><div><div class="kicker" id="themeKicker">STITCH GALAXY</div><h1>後慈湖整合系統</h1><p class="subtitle">星系主題・現場快速入口</p></div></div><div class="tag" id="themeName">史迪奇深藍</div></div></section>
<section class="grid"><a class="nav ticket" href="https://cihu2026.github.io/Pos/issue.html"><div class="ico">🎟️</div><div class="txt"><strong>售票</strong><small>POS 櫃台</small></div></a><a class="nav scan" href="https://cihu2026.github.io/ticket-scan/"><div class="ico">📱</div><div class="txt"><strong>驗票</strong><small>B 點 QR</small></div></a><a class="nav wait" href="https://cihu2026.github.io/houcihu-onsite-waitlist-system/"><div class="ico">📝</div><div class="txt"><strong>候補</strong><small>登記叫號</small></div></a><a class="nav out" href="https://cihu2026.github.io/Out/"><div class="ico">🚪</div><div class="txt"><strong>出園</strong><small>A 點離園</small></div></a><a class="nav stats" href="https://cihu2026.github.io/Monitor/"><div class="ico">📊</div><div class="txt"><strong>人流</strong><small>即時看板</small></div></a><a class="nav vip" href="https://cihu2026.github.io/VIP/"><div class="ico">🏛️</div><div class="txt"><strong>公務團</strong><small>接待行程</small></div></a></section>
<section class="subrow"><a class="mini" href="https://cihu2026.github.io/houcihu-onsite-waitlist-system/admin-login.html">候補後台</a><a class="mini" href="https://cihu2026.github.io/Monitor/">即時人流</a></section>
<footer>POS GALAXY RECTANGLE PORTAL｜Designed & Developed by Abby Luo</footer>
</main>
<script>
var THEME_INFO={formal:{icon:'湖',name:'湖畔霧青',kicker:'PREMIUM GALAXY'},stitch:{icon:'💙',name:'史迪奇深藍',kicker:'STITCH GALAXY'},labubu:{icon:'👾',name:'Labubu 奶咖',kicker:'LABUBU GALAXY'},usagi:{icon:'🐰',name:'烏薩奇米粉',kicker:'USAGI GALAXY'},snoopy:{icon:'🐶',name:'史努比石墨',kicker:'SNOOPY GALAXY'},disney:{icon:'✨',name:'迪士尼紫金',kicker:'MAGIC GALAXY'}};
function normalizeTheme(t){return t==='doraemon'||t==='chiikawa'?'usagi':(t==='lake'?'stitch':(THEME_INFO[t]?t:'stitch'))}
function setTheme(t){var next=normalizeTheme(t);document.body.dataset.theme=next;try{localStorage.setItem('houcihu_pos_theme',next)}catch(e){}document.querySelectorAll('.theme').forEach(function(b){b.classList.toggle('on',b.dataset.theme===next)});document.getElementById('themeIcon').textContent=THEME_INFO[next].icon;document.getElementById('themeName').textContent=THEME_INFO[next].name;document.getElementById('themeKicker').textContent=THEME_INFO[next].kicker;document.querySelector('meta[name="theme-color"]').setAttribute('content',next==='formal'?'#0D6E73':'#08143f')}
document.querySelectorAll('.theme').forEach(function(b){b.onclick=function(){setTheme(b.dataset.theme)}});try{setTheme(localStorage.getItem('houcihu_pos_theme')||'stitch')}catch(e){setTheme('stitch')}
</script>
</body>
</html>
