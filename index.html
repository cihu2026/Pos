<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>🎟️ 後慈湖售票系統 PRO</title>

<style>
:root {
    --glass-bg: rgba(255, 255, 255, 0.08);
    --glass-border: rgba(255, 255, 255, 0.15);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:"Microsoft JhengHei","PingFang TC",sans-serif;
    min-height:100vh;
    background: 
        radial-gradient(circle at 10% 10%, rgba(31, 163, 91, 0.1), transparent 40%),
        linear-gradient(rgba(8,18,34,0.75),rgba(8,18,34,0.9)),
        url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat fixed;
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
}

header{
    width:100%;
    text-align:center;
    padding:50px 18px 25px;
}

.logo{
    font-size:52px;
    margin-bottom:10px;
    animation: float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-8px)}
}

.title{
    font-size:34px;
    font-weight:900;
    letter-spacing:2px;
    background: linear-gradient(135deg, #fff, #ffd89b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.sub{
    margin-top:8px;
    font-size:13px;
    letter-spacing:4px;
    color:rgba(255,255,255,.4);
}

.panel{
    width:100%;
    max-width:420px;
    padding:0 22px;
}

.menu{
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius:30px;
    padding:24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    border: 1px solid var(--glass-border);
}

.nav-btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    padding:20px 22px;
    margin-bottom:15px;
    border-radius:20px;
    text-decoration:none;
    color:#fff;
    font-size:21px;
    font-weight:800;
    transition: all 0.2s ease;
    position:relative;
    overflow:hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.nav-btn:last-child { margin-bottom: 0; }

.nav-btn:active{
    transform: scale(0.96);
}

/* 🎨 四色明確區分 */
.main{
    background: linear-gradient(135deg, #1fa35b, #38d996); /* 綠 */
}

.verify-b{
    background: linear-gradient(135deg, #1b6ed8, #4fa3ff); /* 藍 */
}

.verify-a{
    background: linear-gradient(135deg, #6d28d9, #a855f7); /* 紫 - 明確區分 */
}

.stats{
    background: linear-gradient(135deg, #c58a00, #ffd34d); /* 黃 */
    color:#2b1c00;
}

.left{
    display:flex;
    align-items:center;
}

.icon{
    font-size:26px;
    margin-right:14px;
}

.arrow{
    font-size:22px;
    opacity:.5;
}

.quick{
    margin-top:20px;
    text-align:center;
    font-size:14px;
    color:rgba(255,255,255,.5);
    line-height:1.7;
}

.badges{
    margin-top:18px;
    display:flex;
    justify-content:center;
    gap:8px;
}

.badge{
    padding:6px 12px;
    border-radius:10px;
    background: rgba(255,255,255,.08);
    font-size:11px;
    border: 1px solid rgba(255,255,255,.1);
}

footer{
    margin-top:auto;
    padding:25px;
    font-size:11px;
    color:rgba(255,255,255,.3);
    letter-spacing:2px;
}
</style>
</head>

<body>

<header>
    <div class="logo">🏞️</div>
    <div class="title">後慈湖售票系統</div>
    <div class="sub">PRO SYSTEM</div>
</header>

<div class="panel">
    <div class="menu">

        <a href="https://script.google.com/macros/s/AKfycbw5VQi-dtLodRQbKTgzueGGXgMBBedA_Th93Skr_Dia3-JYbxtd00shnZ24axbznDY/exec" class="nav-btn main">
            <div class="left">
                <span class="icon">🎟️</span>
                開始售票
            </div>
            <span class="arrow">›</span>
        </a>

        <a href="https://cihu2026.github.io/ticket-scan/" class="nav-btn verify-b">
            <div class="left">
                <span class="icon">📱</span>
                驗票入口 B 點
            </div>
            <span class="arrow">›</span>
        </a>

        <a href="https://cihu2026.github.io/Out/" class="nav-btn verify-a">
            <div class="left">
                <span class="icon">🚪</span>
                出園 / A 點
            </div>
            <span class="arrow">›</span>
        </a>

        <a href="https://cihu2026.github.io/Monitor/" class="nav-btn stats">
            <div class="left">
                <span class="icon">📊</span>
                今日統計
            </div>
            <span class="arrow">›</span>
        </a>

        <div class="quick">
            ⚡ 即時營運系統<br>
            支援多設備同步
        </div>

        <div class="badges">
            <div class="badge">QR 驗票</div>
            <div class="badge">POS 系統</div>
            <div class="badge">Realtime</div>
        </div>
    </div>
</div>

<footer>
Houcihu Scenic Area Ticket System
</footer>

</body>
</html>
