<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#f6a8d8">
<title>後慈湖整合系統｜手機夢幻可愛入口</title>
<style>
:root{--bg1:#ffb6df;--bg2:#9fc8ff;--bg3:#7b5de8;--card:rgba(255,255,255,.24);--line:rgba(255,255,255,.38);--text:#fff;--soft:rgba(255,255,255,.84);--a:#62a8ff;--b:#ff8fd6;--chip:rgba(255,255,255,.22);--icon:"💙"}
body[data-theme=stitch]{--bg1:#91d8ff;--bg2:#a58cff;--bg3:#5240b8;--a:#58bfff;--b:#7f8cff;--icon:"💙"}
body[data-theme=labubu]{--bg1:#ffd8a8;--bg2:#e7a66f;--bg3:#8a5b3a;--a:#ffc36f;--b:#ff8fb1;--icon:"👾"}
body[data-theme=usagi]{--bg1:#ffd6ee;--bg2:#f39ccc;--bg3:#9b548f;--a:#ff8fd2;--b:#ffd6ef;--icon:"🐰"}
body[data-theme=snoopy]{--bg1:#ffffff;--bg2:#d8e1ef;--bg3:#6f7b8d;--a:#8ea2bf;--b:#ffe072;--text:#fff;--icon:"🐶"}
body[data-theme=disney]{--bg1:#f2dcff;--bg2:#b895ff;--bg3:#6240b8;--a:#b088ff;--b:#ffd76d;--icon:"✨"}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{min-height:100svh;padding:14px;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',sans-serif;color:var(--text);background:radial-gradient(circle at 18% 8%,rgba(255,255,255,.40),transparent 18%),radial-gradient(circle at 88% 12%,rgba(255,255,255,.22),transparent 20%),radial-gradient(circle at 70% 86%,rgba(255,255,255,.18),transparent 24%),linear-gradient(180deg,var(--bg1),var(--bg2) 46%,var(--bg3));overflow-x:hidden;position:relative}body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(2px 2px at 32px 44px,rgba(255,255,255,.8),transparent 60%),radial-gradient(1.5px 1.5px at 106px 108px,rgba(255,255,255,.58),transparent 60%),radial-gradient(2px 2px at 190px 72px,rgba(255,255,255,.72),transparent 60%),radial-gradient(1.5px 1.5px at 282px 148px,rgba(255,255,255,.54),transparent 60%),radial-gradient(2px 2px at 388px 96px,rgba(255,255,255,.68),transparent 60%),radial-gradient(1.5px 1.5px at 520px 132px,rgba(255,255,255,.58),transparent 60%);background-size:560px 230px;opacity:.85;z-index:0}body:after{content:"♡  ✦   ✧   ♡   ✦";position:fixed;left:18px;right:18px;top:78px;pointer-events:none;color:rgba(255,255,255,.54);font-size:22px;letter-spacing:18px;white-space:nowrap;text-shadow:0 0 12px rgba(255,255,255,.7);z-index:0}.app{position:relative;z-index:1;max-width:760px;margin:auto;display:grid;gap:16px}.panel{background:linear-gradient(180deg,rgba(255,255,255,.28),rgba(255,255,255,.15));border:1px solid var(--line);box-shadow:0 18px 42px rgba(76,38,112,.20),inset 0 1px 0 rgba(255,255,255,.26);backdrop-filter:blur(20px);border-radius:34px}.top{padding:18px 20px}.brand{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:900;letter-spacing:.18em}.dot{width:28px;height:28px;border-radius:50%;background:var(--b);box-shadow:0 0 20px var(--b),0 0 32px rgba(255,255,255,.25)}.themes{display:flex;gap:10px;margin-top:16px;overflow-x:auto}.theme{border:1px solid rgba(255,255,255,.32);border-radius:999px;padding:12px 18px;background:rgba(255,255,255,.20);color:#fff;font-size:17px;font-weight:900;white-space:nowrap;box-shadow:0 8px 18px rgba(0,0,0,.08)}.theme.on{background:linear-gradient(135deg,var(--a),var(--b));box-shadow:0 10px 24px rgba(0,0,0,.14),0 0 18px rgba(255,255,255,.25)}.hero{padding:34px 34px 30px;min-height:430px;position:relative;overflow:hidden;background:linear-gradient(160deg,rgba(255,255,255,.26),rgba(255,255,255,.12));color:#fff}.hero:before{content:"";position:absolute;right:-44px;bottom:-48px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.14)}.hero:after{content:var(--icon);position:absolute;right:38px;top:40px;font-size:64px;opacity:.9;text-shadow:0 0 18px rgba(255,255,255,.35)}.mark{width:112px;height:112px;border-radius:36px;display:grid;place-items:center;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.30);font-size:52px;margin-bottom:34px;box-shadow:0 12px 30px rgba(0,0,0,.10)}.kicker{display:inline-block;padding:12px 24px;border-radius:999px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);font-size:18px;font-weight:900;letter-spacing:.16em;margin-bottom:24px}.hero h1{font-size:52px;line-height:1.22;font-weight:900;letter-spacing:.03em;text-shadow:0 6px 20px rgba(0,0,0,.14)}.desc{margin-top:28px;color:rgba(255,255,255,.92);font-size:24px;font-weight:750;line-height:1.75}.info{padding:26px 34px}.label{color:var(--soft);font-size:18px;font-weight:900;margin-bottom:10px}.value{font-size:26px;font-weight:900}.grid{display:grid;gap:12px}.nav{min-height:92px;padding:20px 24px;border-radius:28px;text-decoration:none;color:#fff;background:linear-gradient(135deg,rgba(255,255,255,.24),rgba(255,255,255,.13));border:1px solid rgba(255,255,255,.28);box-shadow:0 14px 30px rgba(76,38,112,.16);display:flex;align-items:center;gap:18px}.ico{width:54px;height:54px;border-radius:18px;display:grid;place-items:center;background:rgba(255,255,255,.22);font-size:30px}.txt strong{display:block;font-size:24px}.txt small{display:block;margin-top:4px;color:rgba(255,255,255,.84);font-size:15px;font-weight:800}.sub{display:grid;grid-template-columns:1fr 1fr;gap:12px}.mini{padding:17px;border-radius:24px;text-align:center;text-decoration:none;color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.26);font-weight:900;box-shadow:0 12px 26px rgba(76,38,112,.14)}footer{text-align:center;color:rgba(255,255,255,.78);font-size:12px;font-weight:800;letter-spacing:.12em;padding:6px 0 10px}@media(max-width:520px){body{padding:10px}body:after{top:82px;font-size:19px;letter-spacing:11px}.app{gap:12px}.top{padding:15px;border-radius:28px}.brand{font-size:15px}.theme{font-size:15px;padding:10px 15px}.hero{padding:26px 24px 24px;min-height:360px;border-radius:30px}.hero:before{width:95px;height:95px;right:-28px;bottom:-30px}.hero:after{right:24px;top:26px;font-size:48px}.mark{width:76px;height:76px;border-radius:25px;font-size:38px;margin-bottom:22px}.kicker{font-size:12px;padding:9px 15px;margin-bottom:18px;letter-spacing:.12em}.hero h1{font-size:38px;line-height:1.16}.desc{font-size:17px;line-height:1.65;margin-top:18px}.info{padding:20px 24px}.label{font-size:15px}.value{font-size:22px}.grid{gap:10px}.nav{min-height:78px;padding:15px 18px;border-radius:24px}.ico{width:46px;height:46px;border-radius:16px;font-size:26px}.txt strong{font-size:20px}.txt small{font-size:13px}.sub{grid-template-columns:1fr}.mini{padding:15px;border-radius:22px}}
</style>
</head>
<body data-theme="stitch">
<main class="app">
  <section class="panel top"><div class="brand"><span class="dot"></span>HOUCIHU PORTAL</div><div class="themes"><button class="theme" data-theme="stitch">💙 史迪奇</button><button class="theme" data-theme="labubu">👾 Labubu</button><button class="theme" data-theme="usagi">🐰 烏薩奇</button><button class="theme" data-theme="snoopy">🐶 史努比</button><button class="theme" data-theme="disney">✨ 迪士尼</button></div></section>
  <section class="panel hero"><div class="mark" id="themeIcon">💙</div><div class="kicker">ROLE THEME FIELD SYSTEM</div><h1>後慈湖<br>整合系統</h1><p class="desc">售票、驗票、候補、出園與即時人流整合入口。<br>可切換史迪奇、Labubu、烏薩奇、史努比、迪士尼等角色感色系。</p></section>
  <section class="panel info"><div class="label">入口模式</div><div class="value">一站式整合</div></section>
  <section class="panel info"><div class="label">色系模式</div><div class="value" id="themeName">史迪奇</div></section>
  <section class="grid"><a class="nav" href="https://cihu2026.github.io/Pos/issue.html"><div class="ico">🎟️</div><div class="txt"><strong>售票</strong><small>POS 櫃台</small></div></a><a class="nav" href="https://cihu2026.github.io/ticket-scan/"><div class="ico">📱</div><div class="txt"><strong>驗票</strong><small>B 點 QR</small></div></a><a class="nav" href="https://cihu2026.github.io/houcihu-onsite-waitlist-system/"><div class="ico">📝</div><div class="txt"><strong>候補</strong><small>登記叫號</small></div></a><a class="nav" href="https://cihu2026.github.io/Out/"><div class="ico">🚪</div><div class="txt"><strong>出園</strong><small>A 點離園</small></div></a><a class="nav" href="https://cihu2026.github.io/Monitor/"><div class="ico">📊</div><div class="txt"><strong>人流</strong><small>即時看板</small></div></a><a class="nav" href="https://cihu2026.github.io/VIP/"><div class="ico">🏛️</div><div class="txt"><strong>公務團</strong><small>接待行程</small></div></a></section>
  <section class="sub"><a class="mini" href="https://cihu2026.github.io/houcihu-onsite-waitlist-system/admin-login.html">候補後台</a><a class="mini" href="https://cihu2026.github.io/Monitor/">即時人流</a></section><footer>Designed & Developed by Abby Luo</footer>
</main>
<script>
const info={stitch:['💙','史迪奇'],labubu:['👾','Labubu'],usagi:['🐰','烏薩奇'],snoopy:['🐶','史努比'],disney:['✨','迪士尼']};
function setTheme(t){if(!info[t])t='stitch';document.body.dataset.theme=t;document.getElementById('themeIcon').textContent=info[t][0];document.getElementById('themeName').textContent=info[t][1];document.querySelectorAll('.theme').forEach(b=>b.classList.toggle('on',b.dataset.theme===t));try{localStorage.setItem('houcihu_portal_old_theme',t)}catch(e){}}
document.querySelectorAll('.theme').forEach(b=>b.onclick=()=>setTheme(b.dataset.theme));setTheme(localStorage.getItem('houcihu_portal_old_theme')||'stitch');
</script>
</body>
</html>
