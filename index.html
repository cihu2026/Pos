<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#08143f">
<title>後慈湖整合系統｜Galaxy Quick</title>
<style>
:root{--ink:#f7fbff;--muted:#cbd9ff;--paper:rgba(255,255,255,.12);--a:#4fdcff;--b:#123783;--c:#72efb1;--gold:#ffe66d;--rose:#ff6fa6;--line:rgba(139,214,255,.34);--shadow:0 18px 46px rgba(5,10,38,.32);--icon:"💙"}
body[data-theme=labubu]{--ink:#fff7ea;--muted:#ffe0bd;--paper:rgba(255,248,235,.13);--a:#f7dba8;--b:#8a5b3a;--c:#a8ffbf;--gold:#ffe58a;--rose:#ff9bb8;--line:rgba(255,232,199,.4);--shadow:0 18px 46px rgba(47,33,26,.34);--icon:"👾"}
body[data-theme=usagi]{--ink:#fff4fb;--muted:#ffd5e9;--paper:rgba(255,253,246,.15);--a:#ff8fbd;--b:#8c4b83;--c:#8fd9ff;--gold:#ffe38a;--rose:#ffaccf;--line:rgba(255,155,196,.42);--shadow:0 18px 46px rgba(255,143,189,.18);--icon:"🐰"}
body[data-theme=snoopy]{--ink:#f8fafc;--muted:#cbd5e1;--paper:rgba(255,255,255,.14);--a:#e5e7eb;--b:#111827;--c:#ffd166;--gold:#ffd166;--rose:#ef4444;--line:rgba(226,232,240,.3);--shadow:0 18px 46px rgba(15,23,42,.28);--icon:"🐶"}
body[data-theme=disney]{--ink:#fff;--muted:#efe5ff;--paper:rgba(255,255,255,.13);--a:#8bd9ff;--b:#6d28d9;--c:#fbbf24;--gold:#fbbf24;--rose:#f9a8d4;--line:rgba(251,191,36,.34);--shadow:0 18px 46px rgba(19,11,63,.34);--icon:"✨"}
body[data-theme=formal]{--ink:#f7fbff;--muted:#d7f0ee;--paper:rgba(255,255,255,.12);--a:#0D6E73;--b:#0B4D57;--c:#1A7F5A;--gold:#d9bf79;--rose:#C94B63;--line:rgba(217,232,228,.3);--shadow:0 18px 46px rgba(15,79,95,.22);--icon:"湖"}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{min-height:100svh;padding:12px;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Microsoft JhengHei',sans-serif;color:var(--ink);background:radial-gradient(circle at 16% 14%,color-mix(in srgb,var(--a) 34%,transparent),transparent 17%),radial-gradient(circle at 78% 12%,rgba(56,189,248,.22),transparent 18%),radial-gradient(circle at 70% 74%,color-mix(in srgb,var(--rose) 18%,transparent),transparent 19%),radial-gradient(circle at 30% 78%,rgba(168,85,247,.16),transparent 17%),linear-gradient(180deg,#040816 0%,#0a1030 44%,#121b49 100%);overflow-x:hidden;position:relative}body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(2px 2px at 22px 30px,rgba(255,255,255,.95),transparent 58%),radial-gradient(1.4px 1.4px at 120px 80px,rgba(255,255,255,.82),transparent 58%),radial-gradient(2px 2px at 220px 140px,rgba(255,255,255,.76),transparent 58%),radial-gradient(1.5px 1.5px at 320px 40px,rgba(255,255,255,.86),transparent 58%),radial-gradient(2px 2px at 430px 120px,rgba(255,255,255,.82),transparent 58%),radial-gradient(1.4px 1.4px at 540px 70px,rgba(255,255,255,.78),transparent 58%);background-size:560px 220px;opacity:.72;z-index:0}body:after{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 52% 18%,rgba(255,255,255,.07),transparent 31%),radial-gradient(ellipse at 70% 62%,rgba(139,92,246,.13),transparent 30%),radial-gradient(ellipse at 30% 56%,rgba(34,211,238,.10),transparent 28%);z-index:0}.app{max-width:940px;margin:auto;min-height:calc(100svh - 24px);display:grid;grid-template-rows:auto auto 1fr auto;gap:9px;position:relative;z-index:1}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 11px;border-radius:21px;background:color-mix(in srgb,var(--paper) 88%,transparent);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(14px)}.brand{font-weight:900;letter-spacing:.14em;font-size:11px;color:var(--muted)}.themes{display:flex;gap:5px;overflow-x:auto}.theme{border:1px solid var(--line);border-radius:999px;padding:6px 8px;background:rgba(255,255,255,.13);color:var(--ink);font-weight:900;white-space:nowrap;font-size:11px}.theme.on{background:linear-gradient(135deg,var(--a),var(--b));color:#fff}.hero{position:relative;overflow:hidden;border-radius:25px;padding:17px 18px;background:linear-gradient(135deg,rgba(10,16,48,.84),color-mix(in srgb,var(--b) 78%,transparent));color:#fff;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.12)}.hero:after{content:"";position:absolute;right:-68px;bottom:-88px;width:245px;height:176px;border-radius:50%;background:rgba(255,255,255,.08)}.hero-row{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:12px}.titlebox{display:flex;align-items:center;gap:13px}.emblem{width:54px;height:54px;border-radius:18px;display:grid;place-items:center;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.26);font-size:26px}.kicker{color:#e8f1ff;font-size:10px;font-weight:900;letter-spacing:.18em;margin-bottom:4px}.hero h1{font-size:clamp(26px,4.6vw,40px);line-height:1.04;font-weight:900}.subtitle{color:#e5ecff;font-weight:750;font-size:12px;margin-top:5px}.tag{padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.12);font-size:12px;font-weight:900;white-space:nowrap}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.nav{min-height:91px;padding:12px 13px;border-radius:22px;text-decoration:none;color:#fff;background:linear-gradient(135deg,var(--a),var(--b));box-shadow:0 12px 24px rgba(0,0,0,.16);display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}.nav:after{content:"";position:absolute;right:-44px;bottom:-64px;width:118px;height:118px;border-radius:50%;background:rgba(255,255,255,.18)}.ico{position:relative;z-index:1;font-size:27px}.txt{position:relative;z-index:1}.txt strong{display:block;font-size:18px}.txt small{display:block;margin-top:3px;color:rgba(255,255,255,.86);font-weight:800;font-size:12px}.ticket{background:linear-gradient(135deg,var(--c),var(--a))}.scan{background:linear-gradient(135deg,#2563eb,var(--a))}.wait{background:linear-gradient(135deg,#0f766e,var(--c))}.out{background:linear-gradient(135deg,#be5869,var(--rose))}.stats{background:linear-gradient(135deg,var(--gold),#b7791f)}.vip{background:linear-gradient(135deg,#6d28d9,#c084fc)}.subrow{display:grid;grid-template-columns:1fr 1fr;gap:8px}.mini{padding:10px;border-radius:17px;text-align:center;text-decoration:none;color:var(--ink);font-weight:900;border:1px solid var(--line);background:color-mix(in srgb,var(--paper) 88%,transparent);box-shadow:var(--shadow);font-size:13px}footer{text-align:center;color:#d6def8;font-size:10px;letter-spacing:.1em;padding-bottom:1px}@media(max-width:720px){body{padding:9px}.app{min-height:calc(100svh - 18px);gap:8px}.top{align-items:flex-start;flex-direction:column}.themes{width:100%}.hero{padding:15px;border-radius:22px}.hero-row{align-items:flex-start;flex-direction:column}.tag{display:none}.grid{grid-template-columns:repeat(2,1fr);gap:8px}.nav{min-height:84px;padding:11px;border-radius:20px}.ico{font-size:25px}.txt strong{font-size:17px}.txt small{font-size:11px}.subrow{grid-template-columns:1fr 1fr}}@media(max-width:390px){.grid{grid-template-columns:1fr}.nav{min-height:78px}.subrow{grid-template-columns:1fr}}
</style>
</head>
<body data-theme="stitch">
<main class="app">
  <nav class="top"><div class="brand">HOUCIHU POS</div><div class="themes"><button class="theme" data-theme="stitch">💙史迪奇</button><button class="theme" data-theme="labubu">👾拉布布</button><button class="theme" data-theme="usagi">🐰烏薩奇</button><button class="theme" data-theme="snoopy">🐶史努比</button><button class="theme" data-theme="disney">✨迪士尼</button><button class="theme" data-theme="formal">湖畔</button></div></nav>
  <section class="hero"><div class="hero-row"><div class="titlebox"><div class="emblem" id="themeIcon">💙</div><div><div class="kicker" id="themeKicker">STITCH GALAXY</div><h1>後慈湖整合系統</h1><p class="subtitle">星系主題・現場快速入口</p></div></div><div class="tag" id="themeName">史迪奇深藍</div></div></section>
  <section class="grid">
    <a class="nav ticket" href="https://cihu2026.github.io/Pos/issue.html"><div class="ico">🎟️</div><div class="txt"><strong>售票</strong><small>POS 櫃台</small></div></a>
    <a class="nav scan" href="https://cihu2026.github.io/ticket-scan/"><div class="ico">📱</div><div class="txt"><strong>驗票</strong><small>B 點 QR</small></div></a>
    <a class="nav wait" href="https://cihu2026.github.io/houcihu-onsite-waitlist-system/"><div class="ico">📝</div><div class="txt"><strong>候補</strong><small>登記叫號</small></div></a>
    <a class="nav out" href="https://cihu2026.github.io/Out/"><div class="ico">🚪</div><div class="txt"><strong>出園</strong><small>A 點離園</small></div></a>
    <a class="nav stats" href="https://cihu2026.github.io/Monitor/"><div class="ico">📊</div><div class="txt"><strong>人流</strong><small>即時看板</small></div></a>
    <a class="nav vip" href="https://cihu2026.github.io/VIP/"><div class="ico">🏛️</div><div class="txt"><strong>公務團</strong><small>接待行程</small></div></a>
  </section>
  <section class="subrow"><a class="mini" href="https://cihu2026.github.io/houcihu-onsite-waitlist-system/admin-login.html">候補後台</a><a class="mini" href="https://cihu2026.github.io/Monitor/">即時人流</a></section>
  <footer>POS GALAXY QUICK PORTAL｜Designed & Developed by Abby Luo</footer>
</main>
<script>
var THEME_INFO={formal:{icon:'湖',name:'湖畔霧青',kicker:'PREMIUM GALAXY'},stitch:{icon:'💙',name:'史迪奇深藍',kicker:'STITCH GALAXY'},labubu:{icon:'👾',name:'Labubu 奶咖',kicker:'LABUBU GALAXY'},usagi:{icon:'🐰',name:'烏薩奇米粉',kicker:'USAGI GALAXY'},snoopy:{icon:'🐶',name:'史努比石墨',kicker:'SNOOPY GALAXY'},disney:{icon:'✨',name:'迪士尼紫金',kicker:'MAGIC GALAXY'}};
function normalizeTheme(t){return t==='doraemon'||t==='chiikawa'?'usagi':(t==='lake'?'stitch':(THEME_INFO[t]?t:'stitch'))}
function setTheme(t){var next=normalizeTheme(t);document.body.dataset.theme=next;try{localStorage.setItem('houcihu_pos_theme',next)}catch(e){}document.querySelectorAll('.theme').forEach(function(b){b.classList.toggle('on',b.dataset.theme===next)});document.getElementById('themeIcon').textContent=THEME_INFO[next].icon;document.getElementById('themeName').textContent=THEME_INFO[next].name;document.getElementById('themeKicker').textContent=THEME_INFO[next].kicker;document.querySelector('meta[name="theme-color"]').setAttribute('content',next==='formal'?'#0D6E73':'#08143f')}
document.querySelectorAll('.theme').forEach(function(b){b.onclick=function(){setTheme(b.dataset.theme)}});try{setTheme(localStorage.getItem('houcihu_pos_theme')||'stitch')}catch(e){setTheme('stitch')}
</script>
</body>
</html>
